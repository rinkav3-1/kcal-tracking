    {/* Description */}
    <div style={{marginTop:10}}><div style={{fontSize:10,color:C.muted,fontFamily:"monospace",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:4}}>Description <span style={{textTransform:"none",color:C.lime}}>← describe ingredients + weights for accurate AI estimate</span></div><textarea value={desc} onChange={e=>setDesc(e.target.value)} rows={3} placeholder={"e.g. 400g cooked chicken breast\nor: 500g raw chicken, 200g dry rice, 80g peas, 30ml soy sauce\nor: homemade cheesecake, 200g cream cheese, 150g biscuits, 50g butter"} style={{width:"100%",boxSizing:"border-box",background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:"9px 11px",color:C.text,fontSize:13,outline:"none",resize:"none",fontFamily:"inherit"}}/></div>

    {/* Analyze — works with or without photos */}
    {!result&&!showPanel&&!buildMode&&<button onClick={analyze} disabled={loading||(!imgs.length&&!desc.trim())} style={{width:"100%",padding:"14px 0",borderRadius:10,background:loading?C.faint:(imgs.length||desc.trim())?C.lime:C.faint,color:"#000",fontWeight:800,border:"none",cursor:(loading||(!imgs.length&&!desc.trim()))?"default":"pointer",fontSize:15,marginTop:10,boxShadow:(!loading&&(imgs.length||desc.trim()))?`0 0 12px ${C.lime}40`:"none"}}>{loading?"Analyzing…":imgs.length?`🔍 Analyze ${imgs.length} photo${imgs.length!==1?"s":""}${desc.trim()?" + description":""}`:desc.trim()?"🔍 Estimate from description":"Add photos or a description first"}</button>}
    {!result&&!showPanel&&!buildMode&&<button onClick={()=>{setBuildMode("labels");setLabelIngs([]);setPickedProd(null);setPickSearch("");}} style={{width:"100%",padding:"10px 0",borderRadius:10,background:"none",border:`1px dashed ${C.border}`,color:C.muted,cursor:"pointer",fontSize:12,marginTop:8}}>🏷️ Build from product labels manually</button>}
    {err&&<div style={{background:"#1e0a0a",border:"1px solid #5a1a1a",borderRadius:8,padding:"8px 12px",fontSize:12,color:"#ff8080",margin:"10px 0",wordBreak:"break-word"}}>{err}</div>}

    {/* Label builder UI */}
    {buildMode==="labels"&&!showPanel&&<div style={{marginTop:12,background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"12px 14px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <span style={{fontSize:12,color:C.text,fontWeight:600}}>Build from labels</span>
        <button onClick={()=>{setBuildMode(null);setLabelIngs([]);setPickedProd(null);}} style={{fontSize:11,color:C.muted,background:"none",border:"none",cursor:"pointer"}}>✕</button>
      </div>
      <div style={{fontSize:11,color:C.muted,marginBottom:10}}>Pick each ingredient from your label database and enter raw/dry weight. We'll combine them into a meal prep.</div>
      {labelIngs.length>0&&<div style={{display:"flex",flexDirection:"column",gap:5,marginBottom:10}}>
        {labelIngs.map((ing,i)=>(<div key={ing.id} style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:"7px 10px",display:"flex",alignItems:"center",gap:8}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:12,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{ing.name}</div>
            <div style={{fontSize:10,color:C.muted,fontFamily:"monospace",marginTop:2}}>{Math.round(ing.weightG)}g · {Math.round(ing.kcal100*ing.weightG/100)} kcal · {Math.round(ing.p100*ing.weightG/100*10)/10}P</div>
          </div>
          <button onClick={()=>setLabelIngs(p=>p.filter((_,j)=>j!==i))} style={{background:"none",border:"none",color:C.faint,fontSize:14,cursor:"pointer",padding:"0 2px",lineHeight:1}}>×</button>
        </div>))}
      </div>}
      {!pickedProd?(<>
        <input value={pickSearch} onChange={e=>setPickSearch(e.target.value)} placeholder="Search labels (chicken, rice, oats…)" style={{width:"100%",boxSizing:"border-box",background:C.bg,border:`1px solid ${C.border}`,borderRadius:6,padding:"7px 10px",color:C.text,fontSize:13,outline:"none",marginBottom:7}}/>
        <div style={{display:"flex",flexDirection:"column",gap:5,maxHeight:220,overflowY:"auto"}}>
          {(products||[]).filter(p=>!pickSearch||p.name.toLowerCase().includes(pickSearch.toLowerCase())).slice(0,15).map(prod=>(
            <button key={prod.name} type="button" onClick={()=>{setPickedProd(prod);setPickedG(prod.servingG||prod.packageG?String(prod.servingG||prod.packageG):"100");}} style={{padding:"8px 11px",borderRadius:7,background:C.bg,border:`1px solid ${C.border}`,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",textAlign:"left"}}>
              <span style={{fontSize:12,color:C.text,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{prod.name}</span>
              <span style={{fontFamily:"monospace",fontSize:10,color:C.muted,flexShrink:0,marginLeft:8}}>{prod.kcal}k {prod.p}P</span>
            </button>
          ))}
          {(products||[]).filter(p=>!pickSearch||p.name.toLowerCase().includes(pickSearch.toLowerCase())).length===0&&<div style={{fontSize:11,color:C.muted,padding:"4px 0"}}>No labels match — add the product in Food tab first.</div>}
        </div>
      </>):(<div>
        <div style={{fontSize:12,color:C.lime,marginBottom:4,fontWeight:600}}>{pickedProd.name}</div>
        <div style={{fontSize:10,color:C.muted,marginBottom:6,fontFamily:"monospace"}}>{pickedProd.kcal} kcal · {pickedProd.p}g P · {pickedProd.c}g C · {pickedProd.f}g F per 100g</div>
        {(pickedProd.servingG||pickedProd.packageG)&&<div style={{fontSize:10,color:C.lime,marginBottom:6,fontStyle:"italic"}}>🍽 Usual serving: {pickedProd.servingG||pickedProd.packageG}g</div>}
        {!(pickedProd.servingG||pickedProd.packageG)&&<div style={{fontSize:10,color:C.muted,marginBottom:6}}>Serving: {pickedProd.servingG||pickedProd.packageG}g <button type="button" onClick={()=>setPickedG(String(pickedProd.servingG||pickedProd.packageG))} style={{background:"none",border:`1px solid ${C.border}`,color:C.lime,fontSize:9,cursor:"pointer",padding:"1px 6px",borderRadius:4,marginLeft:4}}>use</button></div>}
        <div style={{display:"flex",gap:7,alignItems:"center"}}>
          <input type="text" inputMode="decimal" pattern="[0-9]*[.]?[0-9]*" value={pickedG} onChange={e=>setPickedG(e.target.value.replace(",","."))} placeholder="100" style={{width:80,background:C.bg,border:`1px solid ${C.lime}`,borderRadius:6,padding:"6px 9px",color:C.lime,fontSize:14,fontFamily:"monospace",fontWeight:700,outline:"none"}} autoFocus/>
          <span style={{fontSize:11,color:C.muted}}>g (raw/dry)</span>
          {(()=>{const g=parseFloat(pickedG)||0;const s=g/100;return(<div style={{display:"flex",gap:7,marginLeft:"auto"}}><Chip val={Math.round(pickedProd.kcal*s)} label="kcal" color={C.lime}/><Chip val={Math.round(pickedProd.p*s*10)/10} label="P" color={C.blue}/></div>);})()}
        </div>
        <div style={{display:"flex",gap:6,marginTop:8}}>
          <button onClick={()=>setPickedProd(null)} style={{flex:1,padding:"7px 0",borderRadius:6,background:"none",border:`1px solid ${C.border}`,color:C.muted,cursor:"pointer",fontSize:11}}>← Back</button>
          <button onClick={()=>{const g=parseFloat(pickedG)||0;if(g<=0)return;setLabelIngs(p=>[...p,{id:Date.now()+Math.random(),name:pickedProd.name,weightG:g,kcal100:pickedProd.kcal,p100:pickedProd.p,c100:pickedProd.c,f100:pickedProd.f}]);setPickedProd(null);setPickedG("");setPickSearch("");}} disabled={!parseFloat(pickedG)} style={{flex:2,padding:"7px 0",borderRadius:6,background:parseFloat(pickedG)?C.lime:C.faint,border:"none",color:"#000",fontWeight:700,cursor:parseFloat(pickedG)?"pointer":"default",fontSize:12}}>+ Add</button>
        </div>
      </div>)}
      {labelIngs.length>0&&!pickedProd&&<button onClick={()=>{
        const ings=labelIngs.map(ing=>({name:ing.name,weightG:String(ing.weightG),kcal:ing.kcal100,protein:ing.p100,carbs:ing.c100,fat:ing.f100}));
        const totalK=labelIngs.reduce((s,i)=>s+i.kcal100*i.weightG/100,0);
        const totalP=labelIngs.reduce((s,i)=>s+i.p100*i.weightG/100,0);
        const totalC=labelIngs.reduce((s,i)=>s+i.c100*i.weightG/100,0);
        const totalF=labelIngs.reduce((s,i)=>s+i.f100*i.weightG/100,0);
        const totalG=labelIngs.reduce((s,i)=>s+i.weightG,0);
        setResult({ingredients:ings,totalKcal:totalK,totalProtein:totalP,totalCarbs:totalC,totalFat:totalF,estimatedWeightG:totalG,notes:""});
        setForm({kcal:String(Math.round(totalK)),protein:String(Math.round(totalP)),carbs:String(Math.round(totalC)),fat:String(Math.round(totalF))});
        if(!wt)setWt(String(Math.round(totalG)));
        setPrepIngredients(ings);
        setBuildMode(null);
      }} style={{width:"100%",marginTop:10,padding:"10px 0",borderRadius:8,background:C.lime,color:"#000",fontWeight:700,border:"none",cursor:"pointer",fontSize:13}}>Use these {labelIngs.length} ingredient{labelIngs.length!==1?"s":""} →</button>}
    </div>}

    {showPanel?(<div style={{marginTop:12}}><IngredientConfirmPanel ingredients={prepIngredients} setIngredients={setPrepIngredients} products={products} apiKey={apiKey} confirmLabel="Use These Weights →" onSkip={()=>setIngConfirmed(true)} onConfirm={(ings,totals)=>{const totalG=ings.reduce((s,i)=>s+(parseFloat(i.weightG)||0),0);setForm({kcal:String(Math.round(totals.kcal)),protein:String(Math.round(totals.protein)),carbs:String(Math.round(totals.carbs)),fat:String(Math.round(totals.fat))});if(!wt&&totalG>0)setWt(String(Math.round(totalG)));setIngConfirmed(true);}}/></div>):!result?(<>
      {(!imgs.length&&!desc.trim())&&<div style={{textAlign:"center",fontSize:11,color:C.muted,marginTop:14,marginBottom:6}}>Add photos or describe what's in the prep to let AI estimate macros, or skip to manual entry</div>}
      <button onClick={()=>setResult(true)} style={{width:"100%",padding:"9px 0",borderRadius:10,background:"none",border:`1px solid ${C.border}`,color:C.muted,fontWeight:500,cursor:"pointer",fontSize:13,marginTop:(imgs.length||desc.trim())?0:4}}>Enter macros manually</button>
    </>):(<>
      {prepIngredients&&<button onClick={()=>setIngConfirmed(false)} style={{width:"100%",padding:"8px 0",borderRadius:8,background:"none",border:`1px solid ${C.border}`,color:C.muted,fontWeight:500,cursor:"pointer",fontSize:12,marginTop:12,marginBottom:0}}>← Adjust ingredients</button>}
      <div style={{marginTop:12,display:"grid",gridTemplateColumns:"1fr 1fr",gap:9}}>
        <Field label="Total Kcal" value={form.kcal} onChange={f("kcal")} type="number" placeholder="0"/>
        <Field label="Total Protein g" value={form.protein} onChange={f("protein")} type="number" placeholder="0"/>
        <Field label="Total Carbs g" value={form.carbs} onChange={f("carbs")} type="number" placeholder="0"/>
        <Field label="Total Fat g" value={form.fat} onChange={f("fat")} type="number" placeholder="0"/>
      </div>
      {totalsZero&&<div style={{background:"#1a1400",border:`1px solid ${C.yellow}40`,borderRadius:8,padding:"8px 12px",marginTop:8,fontSize:12,color:C.yellow}}>⚠ Macros are all zero — fill them in or re-analyze before saving.</div>}
      {parseFloat(form.kcal)>0&&portN>0&&(<div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"10px 14px",marginTop:10}}><div style={{fontSize:11,color:C.muted,marginBottom:4}}>Per portion ({portN}) · {wt?Math.round(parseFloat(wt)/portN):"?"}g each</div><div style={{display:"flex",gap:10}}><Chip val={(parseFloat(form.kcal)||0)/portN} label="kcal" color={C.lime}/><Chip val={(parseFloat(form.protein)||0)/portN} label="P" color={C.blue}/><Chip val={(parseFloat(form.carbs)||0)/portN} label="C" color={C.orange}/><Chip val={(parseFloat(form.fat)||0)/portN} label="F" color={C.purple}/></div></div>)}
      {saveErr&&<div style={{background:"#1e0a0a",border:"1px solid #5a1a1a",borderRadius:8,padding:"8px 12px",fontSize:12,color:"#ff8080",marginTop:10,wordBreak:"break-word"}}>{saveErr}</div>}
      <div style={{display:"flex",gap:8,marginTop:14}}>
        <button onClick={onClose} style={{flex:1,padding:"11px 0",borderRadius:10,background:C.card,border:`1px solid ${C.border}`,color:C.text,fontWeight:600,cursor:"pointer"}}>Cancel</button>
        <button onClick={save} style={{flex:2,padding:"11px 0",borderRadius:10,background:totalsZero?C.faint:C.lime,color:"#000",fontWeight:700,border:"none",cursor:"pointer",fontSize:15}}>Save Prep</button>
      </div>
    </>)}
  </Sheet>);
}
// ── Today Tab ─────────────────────────────────────────────────────────────────
function TodayTab({dayData,setDayData,mealPreps,setMealPreps,products,setProducts,profile,latestWeight,weights,setWeights,onGoToSettings}){
  const [modal,setModal]=useState(null);const [wInput,setWInput]=useState("");
  const [expandedMealId,setExpandedMealId]=useState(null);
  const [editingMealId,setEditingMealId]=useState(null);
  const extraBurn=(dayData.activities||[]).reduce((s,a)=>s+a.kcal,0)+(dayData.burnedExtra||0);
  const hasLoggedAct=(dayData.activities||[]).length>0||(dayData.burnedExtra||0)>0;
  const dailySteps=dayData.dailySteps||0;
  const dt=getDT(profile,dayData.dayType,latestWeight,extraBurn,hasLoggedAct,dailySteps);
  const maint=getMaint(profile,dayData.dayType,latestWeight,extraBurn,hasLoggedAct,dailySteps);
  const tot=dayData.meals.reduce((a,m)=>({kcal:a.kcal+m.kcal,protein:a.protein+m.protein,carbs:a.carbs+m.carbs,fat:a.fat+m.fat}),{kcal:0,protein:0,carbs:0,fat:0});
  const remKcal=dt.kcal-tot.kcal,remProt=dt.protein-tot.protein;
  const profileOK=profile.birthday&&profile.heightCm;const gc=gCol(profile.goal);
  const activePreps=mealPreps.filter(p=>p.remaining>0);
  const todayW=weights.find(w=>w.date===TODAY());const prevW=weights.find(w=>w.date!==TODAY());
  const wDelta=todayW&&prevW?todayW.weight-prevW.weight:null;
  const logWeight=()=>{const w=parseNum(wInput);if(!w)return;const e={date:TODAY(),weight:w};setWeights(p=>[e,...p.filter(x=>x.date!==e.date)].sort((a,b)=>b.date.localeCompare(a.date)));setWInput("");};
  const handleAdd=entry=>{
    if(entry.type==="activity_from_meal"){setDayData(p=>({...p,burnedExtra:(p.burnedExtra||0)+entry.burnedKcal,goalMode:profile.goal}));}
    else{const{newProduct,...meal}=entry;setDayData(p=>({...p,meals:[...p.meals,meal],goalMode:profile.goal}));if(newProduct)setProducts(p=>p.find(x=>x.name.toLowerCase()===newProduct.name.toLowerCase())?p:[...p,newProduct]);}
    setModal(null);
  };
  const updateMeal=updated=>{setDayData(p=>({...p,meals:p.meals.map(m=>m.id===updated.id?updated:m)}));setEditingMealId(null);};
  const deleteMeal=id=>{setDayData(p=>({...p,meals:p.meals.filter(m=>m.id!==id)}));setEditingMealId(null);setExpandedMealId(null);};
  const toggleTag=tagId=>{const tags=dayData.tags||[];setDayData(p=>({...p,tags:tags.includes(tagId)?tags.filter(t=>t!==tagId):[...tags,tagId]}));};
  return(<div style={{height:"100%",position:"relative"}}>
    <div style={{height:"100%",overflowY:"auto",padding:"0 16px 90px"}}>
      <div style={{padding:"18px 0 8px"}}>
        <div style={{fontSize:11,color:C.muted,fontFamily:"monospace",letterSpacing:"0.06em"}}>{new Date().toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long"}).toUpperCase()}</div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontSize:26,fontWeight:800,color:C.text,letterSpacing:"-0.03em",lineHeight:1.15}}>Today</div>
          {profile.goal&&<div style={{fontSize:11,background:`${gc}20`,color:gc,padding:"4px 10px",borderRadius:20,fontWeight:700}}>{profile.goal==="cut"?"Cut":profile.goal==="bulk"?"Bulk":"Maintain"}</div>}
        </div>
      </div>

      {/* Weight card */}
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"10px 14px",marginBottom:10}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
          <span style={{fontSize:11,color:C.muted,fontFamily:"monospace",textTransform:"uppercase",letterSpacing:"0.08em"}}>Weight today</span>
          {todayW&&<div style={{display:"flex",alignItems:"baseline",gap:6}}><span style={{fontFamily:"monospace",fontSize:18,fontWeight:800,color:C.lime}}>{todayW.weight.toFixed(2)}</span><span style={{fontSize:12,color:C.muted}}>kg</span>{wDelta!==null&&<span style={{fontFamily:"monospace",fontSize:11,color:wDelta<0?C.lime:C.red}} title="Difference from previous logged weight">{wDelta<0?"↓":"↑"}{Math.abs(wDelta).toFixed(2)} vs prev</span>}</div>}
        </div>
        <div style={{display:"flex",gap:8}}>

          <button onClick={logWeight} style={{padding:"7px 14px",borderRadius:8,background:C.lime,border:"none",color:"#000",fontWeight:700,cursor:"pointer",fontSize:12}}>Log</button>
        </div>
        {weights.slice(1,4).map(e=>(<div key={e.date} style={{display:"flex",justifyContent:"space-between",marginTop:3}}><span style={{fontSize:10,color:C.muted}}>{new Date(e.date+"T12:00:00").toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short"})}</span><span style={{fontFamily:"monospace",fontSize:10,color:C.muted}}>{e.weight.toFixed(2)} kg</span></div>))}
      </div>

      {!profileOK&&<button onClick={onGoToSettings} style={{width:"100%",marginBottom:10,background:"#1a1400",border:`1px solid ${C.yellow}40`,borderRadius:10,padding:"9px 14px",display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}}><span style={{fontSize:12,color:C.yellow}}>Complete profile for personalized targets</span><span style={{color:C.muted,fontSize:12}}>→</span></button>}

      {/* Maintenance */}
      {maint&&<div style={{marginBottom:10,background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"7px 14px",display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:11,color:C.muted}}>Maintenance {maint} kcal</span><span style={{fontFamily:"monospace",fontSize:12,color:C.text,fontWeight:600}}>Target: {dt.kcal}{profile.goal==="cut"?` (−${maint-dt.kcal})`:profile.goal==="bulk"?` (+${dt.kcal-maint})`:""}</span></div>}

      {/* Activity pills */}
      {(dayData.activities||[]).length>0&&<div style={{background:"#140e03",border:"1px solid #2e1e07",borderRadius:12,padding:"10px 14px",marginBottom:10}}>
        <div style={{fontSize:10,color:C.orange,fontFamily:"monospace",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:6}}>Activity</div>
        {(dayData.activities||[]).map(a=><div key={a.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
          <span style={{fontSize:13,color:C.text}}>{a.type==="gym"?"🏋️":a.type==="run"?"🏃":"🚶"} {a.label}{a.durationMin?` · ${a.durationMin}min`:""}</span>
          <span style={{fontFamily:"monospace",fontSize:13,fontWeight:700,color:C.orange}}>+{Math.round(a.kcal)} kcal</span>
        </div>)}
        {extraBurn>0&&(dayData.activities||[]).length>1&&<div style={{borderTop:"1px solid #2e1e07",marginTop:6,paddingTop:5,display:"flex",justifyContent:"space-between"}}><span style={{fontSize:11,color:C.muted}}>Total burn</span><span style={{fontFamily:"monospace",fontSize:12,fontWeight:800,color:C.orange}}>+{Math.round(extraBurn)} → target {Math.round(dt.kcal)}</span></div>}
      </div>}

      {/* Day type */}
      <div style={{marginBottom:10}}>
        <div style={{fontSize:10,color:C.muted,fontFamily:"monospace",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:7}}>Day Type</div>
        <div style={{display:"flex",gap:5}}>{Object.entries(DAY_TYPES).map(([key,val])=>{const active=dayData.dayType===key;const tKcal=getDT(profile,key,latestWeight,0,false,dailySteps).kcal;return(<button key={key} onClick={()=>setDayData(p=>({...p,dayType:key,goalMode:profile.goal}))} style={{flex:1,padding:"7px 3px",borderRadius:10,border:`1px solid ${active?C.lime:C.border}`,background:active?`${C.lime}18`:C.card,color:active?C.lime:C.muted,fontWeight:active?700:400,cursor:"pointer",fontSize:9.5,lineHeight:1.4,textAlign:"center"}}><div style={{fontSize:14}}>{val.icon}</div><div>{val.label}</div><div style={{fontFamily:"monospace",fontSize:10,opacity:0.75,marginTop:1}}>{tKcal}</div></button>);})}</div>
      </div>

      {/* Daily steps — optional but recalculates target when set */}
      <div style={{marginBottom:12,background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"10px 14px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
          <span style={{fontSize:10,color:C.muted,fontFamily:"monospace",textTransform:"uppercase",letterSpacing:"0.08em",display:"flex",alignItems:"center",gap:5}}>Daily Steps <InfoTip text="For background movement only — commuting, errands, walking around home. If you did a deliberate walk, log it as an Activity instead. Logging both double-counts."/></span>
          {dailySteps>0&&(()=>{const adj=stepsKcal(dailySteps,profile.activityLevel||"sedentary",latestWeight||70);if(adj===0)return <span style={{fontSize:10,color:C.muted,fontFamily:"monospace"}}>on baseline</span>;return <span style={{fontSize:10,color:adj>0?C.orange:C.muted,fontFamily:"monospace"}}>{adj>0?"+":"−"}{Math.abs(adj)} kcal {adj>0?"bonus":"vs baseline"}</span>;})()}
        </div>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          <input type="text" inputMode="numeric" pattern="[0-9]*" value={dailySteps||""} onChange={e=>{const v=parseInt(e.target.value.replace(/\D/g,""))||0;setDayData(p=>({...p,dailySteps:v}));}} placeholder="0" style={{width:90,background:C.bg,border:`1px solid ${C.border}`,borderRadius:7,padding:"7px 10px",color:C.text,fontSize:14,fontFamily:"monospace",fontWeight:700,outline:"none"}}/>
          <span style={{fontSize:11,color:C.muted}}>steps</span>
          <div style={{display:"flex",gap:5,marginLeft:"auto"}}>{[2000,5000,8000,10000].map(n=>(<button key={n} onClick={()=>setDayData(p=>({...p,dailySteps:n}))} style={{padding:"4px 8px",borderRadius:6,border:`1px solid ${dailySteps===n?C.orange:C.border}`,background:dailySteps===n?`${C.orange}18`:C.bg,color:dailySteps===n?C.orange:C.muted,cursor:"pointer",fontSize:10,fontFamily:"monospace"}}>{n>=1000?`${n/1000}k`:n}</button>))}</div>
        </div>
        <div style={{fontSize:10,color:C.muted,marginTop:5,lineHeight:1.4}}>Your activity level ({ACT_LEVELS.find(l=>l.id===(profile.activityLevel||"sedentary"))?.label||"?"}) assumes ~{(STEP_BASELINE[profile.activityLevel||"sedentary"]||6500).toLocaleString()} steps/day. Logging your actual steps adjusts today's target up or down from there. Change your base level in Settings.</div>
      </div>

      {/* Macro rings */}
      <div style={{background:C.card,borderRadius:14,padding:"16px 8px 14px",border:`1px solid ${C.border}`,marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-around"}}><Ring value={tot.kcal} max={dt.kcal} color={C.lime} label="kcal"/><Ring value={tot.protein} max={dt.protein} color={C.blue} label="protein"/><Ring value={tot.carbs} max={dt.carbs} color={C.orange} label="carbs"/><Ring value={tot.fat} max={dt.fat} color={C.purple} label="fat"/></div>
        <div style={{marginTop:14,paddingTop:12,borderTop:`1px solid ${C.border}`,display:"flex",justifyContent:"space-around",textAlign:"center"}}>
          <div><div style={{fontSize:22,fontWeight:800,fontFamily:"monospace",color:remKcal<0?C.red:C.lime,lineHeight:1}}>{Math.abs(Math.round(remKcal))}</div><div style={{fontSize:9,color:C.muted,fontFamily:"monospace",textTransform:"uppercase",letterSpacing:"0.08em",marginTop:3}}>{remKcal<0?"over":"left"} kcal</div></div>
          <div style={{width:1,background:C.border}}/>
          <div><div style={{fontSize:22,fontWeight:800,fontFamily:"monospace",color:remProt<0?C.lime:C.blue,lineHeight:1}}>{Math.abs(Math.round(remProt))}g</div><div style={{fontSize:9,color:C.muted,fontFamily:"monospace",textTransform:"uppercase",letterSpacing:"0.08em",marginTop:3}}>{remProt<0?"💪 extra":"left"} protein</div></div>
          <div style={{width:1,background:C.border}}/>
          <div><div style={{fontSize:22,fontWeight:800,fontFamily:"monospace",color:C.text,lineHeight:1}}>{Math.round(tot.kcal)}</div><div style={{fontSize:9,color:C.muted,fontFamily:"monospace",textTransform:"uppercase",letterSpacing:"0.08em",marginTop:3}}>consumed</div></div>
        </div>
      </div>

      {/* Tags */}
      <div style={{marginBottom:12}}><div style={{fontSize:10,color:C.muted,fontFamily:"monospace",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:6}}>Tag today</div><div style={{display:"flex",flexWrap:"wrap",gap:5}}>{DAY_TAGS.map(tag=>{const active=(dayData.tags||[]).includes(tag.id);return(<button key={tag.id} onClick={()=>toggleTag(tag.id)} style={{padding:"5px 10px",borderRadius:20,border:`1px solid ${active?C.lime:C.border}`,background:active?`${C.lime}18`:C.bg,color:active?C.lime:C.muted,cursor:"pointer",fontSize:11}}>{tag.emoji} {tag.label}</button>);})}</div></div>

      {/* Active preps */}
      {activePreps.length>0&&<div style={{marginBottom:12}}><div style={{fontSize:10,color:C.muted,fontFamily:"monospace",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:8}}>Active Preps</div><div style={{display:"flex",flexDirection:"column",gap:6}}>{activePreps.map(prep=>{const remGrams=Math.round(prep.remainingWeightG??prep.totalWeightG??0);const remPortions=Math.max(prep.remaining||1,1);const liveSuggested=remPortions>0?Math.round(remGrams/remPortions):0;return(<div key={prep.id} style={{background:C.card,border:`1px solid ${C.dim}`,borderRadius:10,padding:"10px 14px",display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontSize:13,fontWeight:600,color:C.text}}>{prep.name}</div><div style={{fontSize:10,color:C.muted,marginTop:2}}>{remGrams}g left · {remPortions} portion{remPortions!==1?"s":""} · <span style={{fontFamily:"monospace",color:C.lime}}>~{liveSuggested}g each</span></div></div><button onClick={()=>setModal("mealprep")} style={{padding:"7px 13px",borderRadius:8,background:C.lime,border:"none",color:"#000",fontWeight:700,cursor:"pointer",fontSize:12}}>+ Eat</button></div>);})}</div></div>}

      {/* Meals */}
      <div><div style={{fontSize:10,color:C.muted,fontFamily:"monospace",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:8}}>{dayData.meals.length} meals</div>
        <div style={{display:"flex",flexDirection:"column",gap:7}}>
          {dayData.meals.map(m=>{
            const isExp=expandedMealId===m.id;
            const isEditing=editingMealId===m.id;
            const isCanteen=m.source==="canteen";
            const mealEmoji=["🌅","☀️","🌙","🍎","🥤"][["breakfast","lunch","dinner","snack","drink"].indexOf(m.mealType)]||"";
            if(isEditing){
              return(<div key={m.id} style={{background:C.card,border:`1px solid ${C.lime}`,borderRadius:12,padding:"10px 12px"}}>
                <EditMealInline meal={m} onSave={updateMeal} onCancel={()=>setEditingMealId(null)} products={products} apiKey={profile.apiKey}/>
              </div>);
            }
            return(<div key={m.id} style={{background:C.card,border:`1px solid ${isExp?C.lime+"40":C.border}`,borderRadius:12,overflow:"hidden"}}>
              <button onClick={()=>setExpandedMealId(isExp?null:m.id)} style={{width:"100%",padding:"10px 14px",background:"none",border:"none",cursor:"pointer",display:"flex",gap:10,textAlign:"left"}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",alignItems:"baseline",gap:8,marginBottom:4}}>
                    <span style={{fontSize:14,fontWeight:600,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{mealEmoji} {m.name}</span>
                    {isCanteen&&<span style={{fontSize:9,color:C.yellow,background:C.yellow+"15",padding:"1px 6px",borderRadius:6,flexShrink:0,fontWeight:600}}>🍴 canteen</span>}
                    <span style={{fontSize:10,color:C.muted,fontFamily:"monospace",flexShrink:0,marginLeft:"auto"}}>{m.time}</span>
                  </div>
                  <div style={{display:"flex",gap:10}}><Chip val={m.kcal} label="kcal" color={C.lime}/><Chip val={m.protein} label="P" color={C.blue}/><Chip val={m.carbs} label="C" color={C.orange}/><Chip val={m.fat} label="F" color={C.purple}/></div>
                </div>
                <span style={{color:C.muted,fontSize:11,alignSelf:"center"}}>{isExp?"▲":"▼"}</span>
              </button>
              {isExp&&<div style={{padding:"0 14px 12px",borderTop:`1px solid ${C.border}`}}>
                {m.notes?<div style={{fontSize:11,color:C.muted,lineHeight:1.5,marginTop:9,marginBottom:9,wordBreak:"break-word"}}>{isCanteen?"🍴 ":"📋 "}<span style={{color:C.text}}>{m.notes}</span></div>:<div style={{fontSize:11,color:C.muted,marginTop:9,marginBottom:9,fontStyle:"italic"}}>No ingredient breakdown saved.</div>}
                <div style={{display:"flex",gap:6,marginTop:6}}>
                  <button onClick={()=>setEditingMealId(m.id)} style={{flex:1,padding:"7px 0",borderRadius:7,background:C.bg,border:`1px solid ${C.border}`,color:C.text,fontWeight:500,cursor:"pointer",fontSize:12}}>✎ Edit</button>
                  <button onClick={()=>deleteMeal(m.id)} style={{padding:"7px 14px",borderRadius:7,background:"none",border:`1px solid ${C.red}40`,color:C.red,fontWeight:500,cursor:"pointer",fontSize:12}}>Delete</button>
                </div>
              </div>}
            </div>);
          })}
          {!dayData.meals.length&&<div style={{textAlign:"center",padding:"28px 0",color:C.muted,fontSize:14}}>Nothing logged yet.</div>}
        </div>
      </div>
    </div>
    <button onClick={()=>setModal("meal")} style={{position:"absolute",bottom:16,right:16,width:54,height:54,borderRadius:"50%",background:C.lime,border:"none",cursor:"pointer",fontSize:28,color:"#000",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:`0 0 20px ${C.lime}55`,zIndex:10}}>+</button>
    {(modal==="meal"||modal==="mealprep")&&<AddMealSheet products={products} mealPreps={mealPreps} setMealPreps={setMealPreps} onAdd={handleAdd} onClose={()=>setModal(null)} apiKey={profile.apiKey} initialMode={modal==="mealprep"?"mealprep":"photos"}/>}
  </div>);
}

// ── Activity Tab ──────────────────────────────────────────────────────────────
function ActivityTab({dayData,setDayData,profile,weights,setWeights,weightPhases,setWeightPhases}){
  const [modal,setModal]=useState(false);const [view,setView]=useState("today");const [histDates,setHistDates]=useState([]);const [histLogs,setHistLogs]=useState({});const [histLoaded,setHistLoaded]=useState(false);
  const activities=dayData.activities||[];const totalBurned=activities.reduce((s,a)=>s+a.kcal,0)+(dayData.burnedExtra||0);
  useEffect(()=>{if(view==="history"&&!histLoaded){store.get("fit_dates",[]).then(async ds=>{const e={};for(const d of ds){const log=await store.get(`fit_day_${d}`,null);if(log&&(log.activities||[]).length>0)e[d]=log;}setHistLogs(e);setHistDates(Object.keys(e).sort((a,b)=>b.localeCompare(a)));setHistLoaded(true);});}},[view]);
  const addActivity=act=>{setDayData(p=>({...p,activities:[...(p.activities||[]),act]}));setModal(false);};
  const delActivity=id=>{setDayData(p=>({...p,activities:(p.activities||[]).filter(a=>a.id!==id)}));};
  const [wInput,setWInput]=useState("");const [editWIdx,setEditWIdx]=useState(null);const [editWVal,setEditWVal]=useState("");const [wDate,setWDate]=useState(TODAY());const [showAllW,setShowAllW]=useState(false);
  const [undoEntry,setUndoEntry]=useState(null);
  const deleteWeight=(idx)=>{
    const entry = weights[idx];
    if (!entry) return;
    setWeights(p=>p.filter((_,j)=>j!==idx));
    if (undoEntry?.timeout) clearTimeout(undoEntry.timeout);
    const t = setTimeout(()=>setUndoEntry(null), 5000);
    setUndoEntry({entry, timeout: t});
  };
  const undoDelete=()=>{
    if (!undoEntry) return;
    clearTimeout(undoEntry.timeout);
    const e = undoEntry.entry;
    setWeights(p => [e, ...p.filter(x=>x.date!==e.date)].sort((a,b)=>b.date.localeCompare(a.date)));
    setUndoEntry(null);
  };
  const latestW=weights[0];
  const firstW=weights.length>=2?weights[weights.length-1]:null;
  const overallDelta=firstW&&latestW?latestW.weight-firstW.weight:null;
  const logWeight=()=>{const w=parseNum(wInput);if(!w)return;const date=wDate||TODAY();const e={date,weight:w};setWeights(p=>[e,...p.filter(x=>x.date!==date)].sort((a,b)=>b.date.localeCompare(a.date)));setWInput("");setWDate(TODAY());};
  const saveEditW=i=>{const w=parseNum(editWVal);if(!w)return;setWeights(p=>{const n=[...p];n[i]={...n[i],weight:w};return n.sort((a,b)=>b.date.localeCompare(a.date));});setEditWIdx(null);};
  const wSpark=[...weights].reverse().slice(-20);
  const wVals=wSpark.map(w=>w.weight);
  const wMin=wVals.length?Math.min(...wVals)-0.5:65;const wMax=wVals.length?Math.max(...wVals)+0.5:70;
  const WW=310,WH=80;
  const wpx=i=>wSpark.length>1?(i/(wSpark.length-1))*WW:WW/2;
  const wpy=v=>WH-((v-wMin)/(wMax-wMin))*(WH-12)-6;
  const wTrend=weeklyTrend(weights);

  // ── Weight phases ──────────────────────────────────────────────────────────
  const [showPhases,setShowPhases]=useState(false);
  const [newPhaseOpen,setNewPhaseOpen]=useState(false);
  const [newPhaseLabel,setNewPhaseLabel]=useState("");
  const [newPhaseGoal,setNewPhaseGoal]=useState(profile?.goal||"cut");
  const wp=weightPhases||[];
  const activePhase=wp.find(p=>!p.endDate)||null;
  const closedPhases=wp.filter(p=>!!p.endDate).sort((a,b)=>b.startDate.localeCompare(a.startDate));

  const phaseDuration=(startDate,endDate)=>{
    const days=Math.round((new Date((endDate||TODAY())+"T12:00:00")-new Date(startDate+"T12:00:00"))/(86400000));
    if(days<14)return days+"d";
    if(days<60)return Math.round(days/7)+"wk";
    return (days/30.44).toFixed(1)+"mo";
  };
  const phaseGoalColor=g=>g==="cut"?C.red:g==="bulk"?C.blue:C.lime;
  const phaseGoalLabel=g=>g==="cut"?"Cut 🔻":g==="bulk"?"Bulk 📈":"Maintain ⚖";

  const startNewPhase=()=>{
    if(!newPhaseLabel.trim())return;
    const today=TODAY();
    const curW=latestW?.weight||null;
    // Close the currently active phase if there is one
    setWeightPhases(prev=>{
      const closed=prev.map(p=>(!p.endDate?{...p,endDate:today,endWeight:curW}:p));
      const newP={id:Date.now(),label:newPhaseLabel.trim(),goal:newPhaseGoal,startDate:today,startWeight:curW,endDate:null,endWeight:null};
      return[...closed,newP];
    });
    setNewPhaseLabel("");setNewPhaseOpen(false);
  };

  const deletePhase=id=>setWeightPhases(p=>p.filter(x=>x.id!==id));

  const PhaseCard=({phase})=>{
    const isCurrent=!phase.endDate;
    const curW=isCurrent?latestW?.weight:null;
    const endW=phase.endWeight??curW;
    const delta=endW!=null&&phase.startWeight!=null?endW-phase.startWeight:null;
    const dur=phaseDuration(phase.startDate,phase.endDate);
    const gc=phaseGoalColor(phase.goal);
    return(<div style={{background:C.bg,border:`1px solid ${isCurrent?gc:C.border}`,borderRadius:10,padding:"10px 14px",marginBottom:6}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
            <span style={{fontSize:13,fontWeight:700,color:isCurrent?gc:C.text}}>{phase.label}</span>
            <span style={{fontSize:10,background:gc+"20",color:gc,padding:"2px 8px",borderRadius:12,fontWeight:600}}>{phaseGoalLabel(phase.goal)}</span>
            {isCurrent&&<span style={{fontSize:10,background:C.lime+"20",color:C.lime,padding:"2px 8px",borderRadius:12,fontWeight:600}}>● Active</span>}
          </div>
          <div style={{fontSize:11,color:C.muted,marginTop:3}}>
            {new Date(phase.startDate+"T12:00:00").toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"})}
            {" → "}{isCurrent?"now":new Date(phase.endDate+"T12:00:00").toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"})}
            {" · "}<span style={{fontFamily:"monospace"}}>{dur}</span>
          </div>
          <div style={{display:"flex",gap:10,marginTop:5,flexWrap:"wrap"}}>
            {phase.startWeight!=null&&<div style={{fontFamily:"monospace",fontSize:11,color:C.muted}}>Start: <span style={{color:C.text,fontWeight:700}}>{phase.startWeight.toFixed(2)} kg</span></div>}
            {endW!=null&&<div style={{fontFamily:"monospace",fontSize:11,color:C.muted}}>{isCurrent?"Now":"End"}: <span style={{color:C.text,fontWeight:700}}>{endW.toFixed(2)} kg</span></div>}
            {delta!=null&&<div style={{fontFamily:"monospace",fontSize:12,fontWeight:800,color:delta<0?C.lime:C.red}}>{delta<0?"↓":"↑"}{Math.abs(delta).toFixed(2)} kg</div>}
          </div>
        </div>
        <button onClick={()=>deletePhase(phase.id)} style={{background:"none",border:"none",color:C.faint,fontSize:16,cursor:"pointer",padding:"0 2px",flexShrink:0,marginLeft:6}}>×</button>
      </div>
    </div>);
  };

  return(<div style={{height:"100%",position:"relative"}}>
    <div style={{height:"100%",overflowY:"auto",padding:"0 16px 90px"}}>
      <div style={{padding:"18px 0 8px"}}><div style={{fontSize:26,fontWeight:800,color:C.text,letterSpacing:"-0.03em"}}>Activity</div></div>
      {/* Weight section */}
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"10px 14px",marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
          <span style={{fontSize:11,color:C.muted,fontFamily:"monospace",textTransform:"uppercase",letterSpacing:"0.08em"}}>Weight Log</span>
          {latestW&&<div style={{display:"flex",alignItems:"baseline",gap:6,flexWrap:"wrap",justifyContent:"flex-end"}}><span style={{fontFamily:"monospace",fontSize:18,fontWeight:800,color:C.lime}}>{latestW.weight.toFixed(2)}</span><span style={{fontSize:12,color:C.muted}}>kg</span>{overallDelta!==null&&<span style={{fontFamily:"monospace",fontSize:11,color:overallDelta<0?C.lime:C.red}} title={"Total change since first log on "+firstW.date}>{overallDelta<0?"↓":"↑"}{Math.abs(overallDelta).toFixed(2)} since start</span>}</div>}
        </div>
        {wSpark.length>=4&&(<svg width={WW} height={WH} style={{display:"block",marginBottom:6,overflow:"visible"}}>
          {wTrend!==null&&wSpark.length>=4&&(()=>{const startV=wSpark[0].weight;const endV=wSpark[wSpark.length-1].weight+(wTrend/7*(wSpark.length-1));return<line x1={0} y1={wpy(startV)} x2={WW} y2={wpy(Math.min(wMax-0.1,Math.max(wMin+0.1,endV)))} stroke={wTrend<0?C.lime+"60":C.red+"60"} strokeWidth={1} strokeDasharray="3 3"/>;})()}
          <polyline points={wSpark.map((d,i)=>wpx(i)+","+wpy(d.weight)).join(" ")} fill="none" stroke={C.lime+"50"} strokeWidth={1.5} strokeLinecap="round" strokeLinejoin="round"/>
          <polyline points={wSpark.map((d,i)=>wpx(i)+","+wpy(d.weight)).join(" ")} fill="none" stroke={C.lime} strokeWidth={2} strokeLinecap="round" strokeLinejoin="round"/>
          {wSpark.map((d,i)=>{const isFirst=i===0;const isLast=i===wSpark.length-1;const showLabel=isFirst||isLast||i%Math.ceil(wSpark.length/4)===0;return(<g key={i}><circle cx={wpx(i)} cy={wpy(d.weight)} r={isLast?4:2.5} fill={isLast?C.lime:C.lime+"80"}/>{showLabel&&<text x={wpx(i)} y={wpy(d.weight)-7} textAnchor={i===0?"start":i===wSpark.length-1?"end":"middle"} fontSize={8} fill={C.muted} fontFamily="monospace">{d.weight.toFixed(1)}</text>}</g>);})}
        </svg>)}
        {wSpark.length<4&&wSpark.length>0&&<div style={{fontSize:11,color:C.muted,marginBottom:6,fontFamily:"monospace"}}>Log {4-wSpark.length} more weight{4-wSpark.length!==1?"s":""} to see trend graph</div>}
        <div style={{display:"flex",gap:6,marginBottom:6,flexWrap:"wrap"}}>
          <input type="text" inputMode="decimal" pattern="[0-9]*[.]?[0-9]*" step="0.05" placeholder="Weight kg" value={wInput} onChange={e=>setWInput(e.target.value.replace(",","."))} onKeyDown={e=>e.key==="Enter"&&logWeight()} style={{flex:"1 1 100px",minWidth:90,background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:"7px 10px",color:C.text,fontSize:14,fontFamily:"monospace",outline:"none"}}/>
          <input type="date" value={wDate} max={TODAY()} onChange={e=>setWDate(e.target.value)} style={{flex:"1 1 130px",background:C.bg,border:`1px solid ${wDate===TODAY()?C.border:C.lime}`,borderRadius:8,padding:"7px 10px",color:wDate===TODAY()?C.muted:C.lime,fontSize:13,fontFamily:"monospace",outline:"none"}}/>
          <button onClick={logWeight} style={{padding:"7px 14px",borderRadius:8,background:C.lime,border:"none",color:"#000",fontWeight:700,cursor:"pointer",fontSize:12}}>Log</button>
        </div>
        {wDate!==TODAY()&&<div style={{fontSize:10,color:C.lime,marginBottom:6,fontFamily:"monospace"}}>↳ logging for {new Date(wDate+"T12:00:00").toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short"})}{weights.find(w=>w.date===wDate)?" (will overwrite existing)":""}</div>}

div style={{fontSize:10,color:C.lime,marginTop:4,fontStyle:"italic"}}>🍽 Will default to {pForm.servingG}g when you log this item.</div>}</div><div style={{marginTop:4}}><div style={{fontSize:10,color:C.muted,fontFamily:"monospace",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:6}}>Categories (tap to toggle)</div><div style={{display:"flex",flexWrap:"wrap",gap:5}}>{PRODUCT_CATEGORIES.map(cat=>{const on=(pForm.categories||[]).includes(cat.id);return(<button key={cat.id} type="button" onClick={()=>toggleCat(cat.id)} style={{padding:"5px 9px",borderRadius:16,border:`1px solid ${on?C.lime:C.border}`,background:on?`${C.lime}18`:C.bg,color:on?C.lime:C.muted,cursor:"pointer",fontSize:10.5,fontWeight:on?600:400}}>{cat.emoji} {cat.label}</button>);})}</div></div><Field label="Supermarket (optional)" value={pForm.supermarket} onChange={pff("supermarket")} placeholder="e.g. Lidl, Rimi, Maxima"/>{supermarkets.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:5,marginTop:5}}>{supermarkets.map(m=>(<button key={m} type="button" onClick={()=>setPForm(p=>({...p,supermarket:p.supermarket===m?"":m}))} style={{padding:"3px 9px",borderRadius:12,border:`1px solid ${pForm.supermarket===m?C.blue:C.border}`,background:pForm.supermarket===m?`${C.blue}18`:C.bg,color:pForm.supermarket===m?C.blue:C.muted,cursor:"pointer",fontSize:10}}>{m}</button>))}</div>}{(()=>{const k=parseFloat(pForm.kcal)||0,p=parseFloat(pForm.p)||0,c=parseFloat(pForm.c)||0,fv=parseFloat(pForm.f)||0;if(k<10)return null;const calc=Math.round(p*4+c*4+fv*9);const diff=Math.abs(k-calc);const pct=k>0?diff/k:0;if(pct<=0.25)return null;return(<div style={{background:"#1a1400",border:`1px solid ${C.yellow}40`,borderRadius:8,padding:"7px 11px",fontSize:11,color:C.yellow,lineHeight:1.4}}>⚠ Numbers don't add up: macros suggest <span style={{fontFamily:"monospace",fontWeight:700}}>~{calc} kcal</span> but you entered <span style={{fontFamily:"monospace",fontWeight:700}}>{k}</span> ({Math.round(pct*100)}% off). Double-check the label — likely one row was misread.</div>);})()}<div style={{display:"flex",gap:8}}><button onClick={()=>{setShowAdd(false);setEditPIdx(null);setPForm({name:"",kcal:"",p:"",c:"",f:"",servingG:"",categories:[],supermarket:""});setScanImgs([]);setTimeout(()=>window.scrollTo({top:savedScrollRef.current,behavior:"smooth"}),60);}} style={{flex:1,padding:"9px 0",borderRadius:8,background:C.bg,border:`1px solid ${C.border}`,color:C.muted,cursor:"pointer",fontSize:13}}>Cancel</button><button onClick={editPIdx!==null?saveEditP:addProduct} style={{flex:2,padding:"9px 0",borderRadius:8,background:C.lime,border:"none",color:"#000",fontWeight:700,cursor:"pointer",fontSize:13}}>{editPIdx!==null?"Save":"Save Product"}</button></div></div></div>}
      <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:8}}>
        <button onClick={()=>setCatFilter(null)} style={{padding:"4px 9px",borderRadius:14,border:`1px solid ${!catFilter?C.lime:C.border}`,background:!catFilter?`${C.lime}18`:C.bg,color:!catFilter?C.lime:C.muted,cursor:"pointer",fontSize:10,fontWeight:!catFilter?600:400}}>All</button>
        {PRODUCT_CATEGORIES.filter(cat=>products.some(p=>(p.categories||[]).includes(cat.id))).map(cat=>{const on=catFilter===cat.id;return(<button key={cat.id} onClick={()=>setCatFilter(on?null:cat.id)} style={{padding:"4px 9px",borderRadius:14,border:`1px solid ${on?C.lime:C.border}`,background:on?`${C.lime}18`:C.bg,color:on?C.lime:C.muted,cursor:"pointer",fontSize:10,fontWeight:on?600:400}}>{cat.emoji} {cat.label}</button>);})}
        {uncategorizedCount>0&&<button onClick={()=>setCatFilter(catFilter==="uncategorized"?null:"uncategorized")} style={{padding:"4px 9px",borderRadius:14,border:`1px solid ${catFilter==="uncategorized"?C.yellow:C.border}`,background:catFilter==="uncategorized"?`${C.yellow}18`:C.bg,color:catFilter==="uncategorized"?C.yellow:C.muted,cursor:"pointer",fontSize:10,fontWeight:catFilter==="uncategorized"?600:400}}>⚠ No category ({uncategorizedCount})</button>}
      </div>
      {supermarkets.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:8,alignItems:"center"}}><span style={{fontSize:9,color:C.muted,fontFamily:"monospace",textTransform:"uppercase"}}>🏪</span>{supermarkets.map(m=>{const on=martFilter===m;return(<button key={m} onClick={()=>setMartFilter(on?null:m)} style={{padding:"4px 9px",borderRadius:14,border:`1px solid ${on?C.blue:C.border}`,background:on?`${C.blue}18`:C.bg,color:on?C.blue:C.muted,cursor:"pointer",fontSize:10,fontWeight:on?600:400}}>{m}</button>);})}</div>}
      {confirmDelete!==null&&<div style={{background:"#1e0a0a",border:"1px solid #5a1a1a",borderRadius:10,padding:"10px 14px",marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center",gap:10}}>
        <span style={{fontSize:12,color:"#ff8080",flex:1,minWidth:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>Delete <b>{products[confirmDelete]?.name}</b>?</span>
        <div style={{display:"flex",gap:7,flexShrink:0}}>
          <button onClick={()=>setConfirmDelete(null)} style={{padding:"5px 11px",borderRadius:6,background:C.card,border:`1px solid ${C.border}`,color:C.muted,cursor:"pointer",fontSize:12}}>Cancel</button>
          <button onClick={()=>{setProducts(prev=>prev.filter((_,j)=>j!==confirmDelete));if(editPIdx===confirmDelete){clearForm();setEditPIdx(null);}setConfirmDelete(null);}} style={{padding:"5px 11px",borderRadius:6,background:"#3a0a0a",border:"1px solid #ff4040",color:"#ff6060",fontWeight:700,cursor:"pointer",fontSize:12}}>Delete</button>
        </div>
      </div>}
      <div style={{display:"flex",flexDirection:"column",gap:5}}>{filtered.map((p,i)=>{const ri=products.indexOf(p);return(<div key={i} style={{background:C.card,border:`1px solid ${editPIdx===ri?C.lime:confirmDelete===ri?"#5a1a1a":C.border}`,borderRadius:10,padding:"9px 14px",display:"flex",justifyContent:"space-between",alignItems:"center"}}><div style={{flex:1,marginRight:8,minWidth:0}}><span style={{fontSize:12,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",display:"block"}}>{p.name}</span><div style={{display:"flex",gap:5,alignItems:"center",marginTop:2,flexWrap:"wrap"}}>{(p.servingG||p.packageG)&&<span style={{fontSize:9,color:C.lime,fontFamily:"monospace"}}>🍽{p.servingG||p.packageG}g</span>}{(p.categories||[]).map(cid=>{const cat=catById(cid);return cat?<span key={cid} style={{fontSize:9}} title={cat.label}>{cat.emoji}</span>:null;})}{p.supermarket&&<span style={{fontSize:8.5,color:C.blue,fontFamily:"monospace"}}>🏪{p.supermarket}</span>}</div></div><div style={{display:"flex",gap:5,alignItems:"center",flexShrink:0}}><div style={{display:"flex",gap:6}}><Chip val={p.kcal} label="k" color={C.lime}/><Chip val={p.p} label="P" color={C.blue}/><Chip val={p.c} label="C" color={C.orange}/><Chip val={p.f} label="F" color={C.purple}/></div><button onClick={()=>startEditP(ri)} style={{background:"none",border:`1px solid ${C.border}`,color:C.muted,fontSize:11,cursor:"pointer",padding:"3px 6px",borderRadius:5,marginLeft:3}}>✎</button><button onClick={()=>setConfirmDelete(confirmDelete===ri?null:ri)} style={{background:"none",border:"none",color:confirmDelete===ri?"#ff4040":C.faint,fontSize:14,cursor:"pointer",padding:"0 2px",lineHeight:1}}>×</button></div></div>);})}</div></div>}
    </div>
    <button onClick={()=>setModal(true)} style={{position:"absolute",bottom:16,right:16,width:54,height:54,borderRadius:"50%",background:C.lime,border:"none",cursor:"pointer",fontSize:28,color:"#000",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:`0 0 20px ${C.lime}55`,zIndex:10}}>+</button>
    {modal&&<CreatePrepSheet products={products} onSave={prep=>{setMealPreps(p=>[prep,...p]);setModal(false);}} onClose={()=>setModal(false)} apiKey={profile.apiKey}/>}
    {editPrep&&<EditPrepSheet prep={editPrep} onSave={updated=>{setMealPreps(p=>p.map(x=>x.id===updated.id?updated:x));setEditPrep(null);}} onClose={()=>setEditPrep(null)}/>}
  </div>);
}

// ── Analysis Tab ──────────────────────────────────────────────────────────────
// ── Coach Panel — free-form Q&A with full app context ───────────────────────
function CoachPanel({profile, weights, products, mealPreps, weightPhases}) {
  const [question, setQuestion] = useState("");
  const [history, setHistory] = useState([]); // [{role, content}]
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState(null);
  const [recentLogs, setRecentLogs] = useState({});
  const scrollRef = useRef(null);
  const apiKey = profile?.apiKey;

  // Load recent logs on mount — also refreshed before each question so coach
  // always sees meals logged earlier in the same session.
  const loadLogs = async () => {
    const ds = await store.get("fit_dates", []);
    const out = {};
    for (const d of ds.slice(0, 7)) {
      const log = await store.get(`fit_day_${d}`, null);
      if (log) out[d] = log;
    }
    setRecentLogs(out);
    return out;
  };

  useEffect(() => { loadLogs(); }, []);

  // Auto-scroll history when new messages added
  useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [history, loading]);

  // Build the context string the coach sees with every question.
  const buildContext = () => {
    const latest = weights[0]?.weight;
    const trend = weeklyTrend(weights);
    const today = TODAY();
    const todayLog = recentLogs[today];
    const tdee = latest ? getTDEE(profile, latest) : null;
    const age = calcAge(profile?.birthday) || 27;
    let ctx = "";
    ctx += "User: " + age + "yo " + (profile?.sex||"male") + ", " + (profile?.heightCm||178) + "cm, latest weight " + (latest?latest.toFixed(2)+"kg":"unknown") + ".\n";
    ctx += "Goal mode: " + (profile?.goal||"cut") + (profile?.goalNote?" — \""+profile.goalNote+"\"":"") + ".\n";
    if (profile?.targetWeightKg) ctx += "Target weight: " + profile.targetWeightKg + "kg.\n";
    if (tdee) ctx += "Estimated TDEE: " + tdee + " kcal/day.\n";
    if (trend !== null) ctx += "Recent weekly trend: " + (trend<0?"-":"+") + Math.abs(trend).toFixed(2) + "kg/week.\n";
    // Day type targets
    ctx += "Day-type targets (kcal): ";
    ctx += Object.entries(DAY_TYPES).map(([k,v]) => v.label + " " + getDT(profile,k,latest,0,false).kcal).join(", ") + ".\n";
    // Today's status
    if (todayLog) {
      const tot = (todayLog.meals||[]).reduce((a,m)=>({k:a.k+m.kcal,p:a.p+m.protein,c:a.c+m.carbs,f:a.f+m.fat}),{k:0,p:0,c:0,f:0});
      const burn = (todayLog.activities||[]).reduce((s,a)=>s+a.kcal,0)+(todayLog.burnedExtra||0);
      ctx += "TODAY ("+today+", " + (DAY_TYPES[todayLog.dayType]?.label||"Rest") + " day): consumed " + Math.round(tot.k) + " kcal / " + Math.round(tot.p) + "g P / " + Math.round(tot.c) + "g C / " + Math.round(tot.f) + "g F across " + (todayLog.meals||[]).length + " meals; activity burn " + Math.round(burn) + " kcal.\n";
      if ((todayLog.tags||[]).length) ctx += "Tags today: " + todayLog.tags.join(", ") + ".\n";
    }
    // Last 7 days summary (compact)
    const lastWeekDates = Object.keys(recentLogs).sort((a,b)=>b.localeCompare(a)).slice(0,7);
    if (lastWeekDates.length > 1) {
      ctx += "\nLAST " + lastWeekDates.length + " DAYS:\n";
      for (const d of lastWeekDates) {
        const l = recentLogs[d];
        if (!l) continue;
        const tot = (l.meals||[]).reduce((a,m)=>({k:a.k+m.kcal,p:a.p+m.protein}),{k:0,p:0});
        const burn = (l.activities||[]).reduce((s,a)=>s+a.kcal,0)+(l.burnedExtra||0);
        const acts = (l.activities||[]).map(a=>a.label).join(", ") || "no recorded activity";
        ctx += "  " + d + " (" + (DAY_TYPES[l.dayType]?.label||"rest") + "): " + Math.round(tot.k) + " kcal, " + Math.round(tot.p) + "g P, burned " + Math.round(burn) + " · " + acts + "\n";
      }
    }
    // Active meal preps
    const active = (mealPreps||[]).filter(p => (p.remainingWeightG||p.totalWeightG||0) > 0);
    if (active.length) {
      ctx += "\nACTIVE MEAL PREPS (available right now):\n";
      for (const p of active.slice(0, 5)) {
        const remG = Math.round(p.remainingWeightG ?? p.totalWeightG ?? 0);
        ctx += "  - " + p.name + ": " + remG + "g left, " + (p.per100Kcal||0) + " kcal/100g, " + (p.per100Protein||0) + "g P/100g\n";
      }
    }
    // Notable products from pantry
    if ((products||[]).length) {
      const high = products.filter(p => (p.p||0) >= 15).slice(0,12);
      if (high.length) {
        ctx += "\nHIGH-PROTEIN PANTRY ITEMS: " + high.map(p => p.name + " ("+p.kcal+"k/"+p.p+"P per 100g)").join("; ") + "\n";
      }
    }
    // Weight phases — gives coach timeline context for goal transitions
    if ((weightPhases||[]).length) {
      ctx += "\nWEIGHT PHASES:\n";
      const sorted = [...weightPhases].sort((a,b) => b.startDate.localeCompare(a.startDate)).slice(0,5);
      for (const p of sorted) {
        const isCurrent = !p.endDate;
        const endW = p.endWeight ?? (isCurrent ? weights[0]?.weight : null);
        const delta = (endW != null && p.startWeight != null) ? (endW - p.startWeight).toFixed(2) : "?";
        const dur = p.endDate
          ? Math.round((new Date(p.endDate+"T12:00:00") - new Date(p.startDate+"T12:00:00")) / 86400000) + "d"
          : Math.round((Date.now() - new Date(p.startDate+"T12:00:00")) / 86400000) + "d so far";
        ctx += "  " + (isCurrent?"[ACTIVE] ":"") + p.label + " (" + p.goal + "): " + p.startDate + " → " + (p.endDate||"now") + " (" + dur + "), " + (p.startWeight||"?") + "kg → " + (endW||"?") + "kg = " + (parseFloat(delta)>0?"+":"") + delta + "kg\n";
      }
    }
    return ctx;
  };

  const ask = async (q) => {
    if (!q.trim() || loading) return;
    setErr(null);
    setQuestion("");
    // Refresh logs so coach sees any meals logged since the tab was opened
    const freshLogs = await loadLogs();
    const ctx = buildContext();
    const newUserMsg = { role: "user", content: q };
    const updatedHistory = [...history, newUserMsg];
    setHistory(updatedHistory);
    setLoading(true);
    try {
      const reply = await aCoach({ question: q, context: ctx, history: history }, apiKey);
      setHistory(h => [...h, { role: "assistant", content: reply }]);
    } catch (e) {
      setErr(String(e.message || e));
      // Roll back the user message so they can retry
      setHistory(h => h.slice(0, -1));
      setQuestion(q);
    }
    setLoading(false);
  };

  const suggestions = [
    "What should I eat tomorrow morning before a 10km run?",
    "Am I on track for my goal? Any adjustments?",
    "Suggest a high-protein dinner from what's in my pantry.",
    "How's my last week of training and nutrition looking?",
  ];

  return(<div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:"14px 16px",marginBottom:12}}>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
      <div style={{fontSize:14,fontWeight:600,color:C.text}}>💬 Ask Coach</div>
      {history.length>0&&<button onClick={()=>setHistory([])} style={{fontSize:10,color:C.muted,background:"none",border:`1px solid ${C.border}`,borderRadius:5,padding:"3px 8px",cursor:"pointer"}}>Clear</button>}
    </div>
    <div style={{fontSize:11,color:C.muted,marginBottom:10}}>Free-form questions about training, nutrition, recovery. The coach sees your weight trend, recent meals, activities, and pantry.</div>
    {history.length>0&&<div ref={scrollRef} style={{maxHeight:380,overflowY:"auto",display:"flex",flexDirection:"column",gap:8,marginBottom:10,padding:"4px 2px"}}>
      {history.map((m,i)=>(
        <div key={i} style={{alignSelf:m.role==="user"?"flex-end":"flex-start",maxWidth:"85%"}}>
          <div style={{
            background: m.role==="user"?C.lime+"18":C.bg,
            border: `1px solid ${m.role==="user"?C.lime+"40":C.border}`,
            borderRadius: 10,
            padding: "8px 11px",
            fontSize: 13,
            lineHeight: 1.5,
            color: C.text,
            whiteSpace: "pre-wrap",
            wordBreak: "break-word"
          }}>{m.content}</div>
        </div>
      ))}
      {loading&&<div style={{alignSelf:"flex-start",fontSize:12,color:C.muted,padding:"6px 10px"}}>Thinking…</div>}
    </div>}
    {history.length===0&&<div style={{display:"flex",flexDirection:"column",gap:5,marginBottom:10}}>
      {suggestions.map((s,i)=>(

function TestAPIButton({apiKey}) {
  const [status, setStatus] = useState(null);
  const [loading, setLoading] = useState(false);
  const test = async () => {
    setLoading(true); setStatus(null);
    const headers = {"Content-Type":"application/json"};
    if (apiKey && !inClaudeAI()) {
      headers["x-api-key"] = apiKey;
      headers["anthropic-version"] = "2023-06-01";
      headers["anthropic-dangerous-direct-browser-access"] = "true";
    }
    const body = JSON.stringify({model: VISION_MODEL, max_tokens: 20, messages: [{role:"user",content:"Reply with just OK"}]});
    let data;
    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {method:"POST",headers,body});
      data = await response.json();
    } catch(e) { setStatus({ok:false,msg:"Connection error: " + e.message}); setLoading(false); return; }
    if (data.error) { setStatus({ok:false,msg:"API error: "+data.error.message+" (type: "+data.error.type+")"}); setLoading(false); return; }
    if (!data.content) { setStatus({ok:false,msg:"No content field. Raw: "+JSON.stringify(data).slice(0,120)}); setLoading(false); return; }
    setStatus({ok:true,msg:"Connected! Sonnet: "+VISION_MODEL+" | "+data.content[0]?.text}); setLoading(false);
  };
  return (<div>
    <button onClick={test} disabled={loading} style={{width:"100%",padding:"9px 0",borderRadius:8,background:loading?C.faint:C.blue,border:"none",color:"#000",fontWeight:700,cursor:loading?"default":"pointer",fontSize:13}}>{loading?"Testing…":"Test AI Connection"}</button>
    {status&&<div style={{marginTop:8,padding:"8px 12px",borderRadius:8,background:status.ok?"#0a1a0a":"#1e0a0a",border:`1px solid ${status.ok?"#1a4a1a":"#5a1a1a"}`,fontSize:12,color:status.ok?C.lime:"#ff8080",wordBreak:"break-word"}}>{status.msg}</div>}
  </div>);
}

function ImportScreen({onImport,onSkip}){
  const [err,setErr]=useState(null);const [dragging,setDragging]=useState(false);
  const load=file=>{if(!file)return;const r=new FileReader();r.onload=async e=>{try{const d=JSON.parse(e.target.result);const keys=Object.keys(d);if(!keys.some(k=>k.startsWith("fit_"))){setErr("Not a valid backup file — no fit_ keys found.");return;}let n=0;for(const[k,v]of Object.entries(d)){if(k.startsWith("fit_")){await store.set(k,v);n++;}}onImport(n);}catch(ex){setErr("Could not read file: "+String(ex.message||ex));}};r.readAsText(file);};
  return(<div style={{background:C.bg,height:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"32px 24px",fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"}}>

    <label onDragOver={e=>{e.preventDefault();setDragging(true);}} onDragLeave={()=>setDragging(false)} onDrop={e=>{e.preventDefault();setDragging(false);load(e.dataTransfer.files[0]);}} style={{display:"block",width:"100%",maxWidth:360,padding:"24px 16px",borderRadius:14,border:`2px dashed ${dragging?C.lime:C.border}`,background:dragging?`${C.lime}10`:C.card,cursor:"pointer",textAlign:"center",marginBottom:12}}>
      <input type="file" accept=".json" onChange={e=>load(e.target.files[0])} style={{display:"none"}}/>
      <div style={{fontSize:28,marginBottom:6}}>📁</div>
      <div style={{fontSize:13,color:C.lime,fontWeight:600}}>Tap to select backup file</div>
      <div style={{fontSize:11,color:C.muted,marginTop:4}}>Select the .json file exported from Settings</div>
    </label>
    {err&&<div style={{background:"#1e0a0a",border:"1px solid #5a1a1a",borderRadius:8,padding:"8px 12px",fontSize:12,color:"#ff8080",marginBottom:12,width:"100%",maxWidth:360,textAlign:"center"}}>{err}</div>}
    <button onClick={onSkip} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:13,padding:"8px 0"}}>This is a new account — continue setup →</button>
  </div>);
}

function App(){
  const [tab,setTab]=useState("today");const [dayData,setDayData_]=useState(null);const [weights,setWeights_]=useState([]);const [products,setProducts_]=useState([]);const [mealPreps,setMealPreps_]=useState([]);const [profile,setProfile_]=useState(null);const [progressPhotos,setProgressPhotos_]=useState([]);const [weightPhases,setWeightPhases_]=useState([]);const [ready,setReady]=useState(false);
  // `today` is reactive state, not a const. If we use a const, leaving the app open across
  // midnight means React renders with a NEW today value but dayData still holds yesterday's
  // meals — and the setDayData closure writes that stale payload to today's storage key,
  // duplicating activities/meals across days.
  const [today, setToday] = useState(TODAY());
  // The date we last loaded dayData for. Used to avoid double-loading after bootstrap.
  const lastLoadedDate = useRef(null);
  // Track whether a date-rollover banner should appear (user's old dayData was kept open).
  const [rolloverBanner, setRolloverBanner] = useState(null); // null | {fromDate, toDate}

  // Detect midnight rollover via interval + visibility/focus listeners.
  useEffect(() => {
    const check = () => {
      const t = TODAY();
      setToday(prev => {
        if (prev === t) return prev;
        // Date changed while app was open. Surface a banner so user knows.
        setRolloverBanner({fromDate: prev, toDate: t});
        return t;
      });
    };
    const id = setInterval(check, 30000); // every 30s
    const onVis = () => { if (document.visibilityState === 'visible') check(); };
    document.addEventListener('visibilitychange', onVis);
    window.addEventListener('focus', check);
    return () => {
      clearInterval(id);
      document.removeEventListener('visibilitychange', onVis);
      window.removeEventListener('focus', check);
    };
  }, []);

  useEffect(()=>{(async()=>{
    const norm = s => (s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/\s+/g," ").trim();
    let prods=await store.get("fit_products",null);
    // Track which preset names have ever been seeded so deletions stick.
    let seeded = await store.get("fit_seeded_presets", null);
    if(!prods){
      // First launch — seed with full preset list, record all names as seeded
      prods = [...PRESETS];
      await store.set("fit_products", prods);
      seeded = PRESETS.map(p => norm(p.name));
      await store.set("fit_seeded_presets", seeded);
    } else {
      // App update — only add presets that have NEVER been seeded.
      // If the user previously deleted a seeded preset, it won't come back.
      if (!Array.isArray(seeded)) {
        // Migration for users on old versions: assume all currently-present preset names are
        // already "seeded" (so we don't re-add them), but anything new in PRESETS not currently
        // present is still genuinely new and should be added.
        const existingNames = new Set(prods.map(p=>norm(p.name)));
        seeded = PRESETS.filter(p => existingNames.has(norm(p.name))).map(p => norm(p.name));
        await store.set("fit_seeded_presets", seeded);
      }
      const seededSet = new Set(seeded);
      const trulyNew = PRESETS.filter(p => !seededSet.has(norm(p.name)));
      if (trulyNew.length > 0) {
        prods = [...prods, ...trulyNew];
        await store.set("fit_products", prods);
        const updatedSeeded = [...seeded, ...trulyNew.map(p => norm(p.name))];
        await store.set("fit_seeded_presets", updatedSeeded);
        console.log("[update] Added " + trulyNew.length + " never-seeded preset products");
      }
    }
    // Use the date at the moment of bootstrap (in case midnight already passed during load).
    const bootDate = TODAY();
    const day=await store.get(`fit_day_${bootDate}`,{date:bootDate,dayType:"rest",meals:[],activities:[],burnedExtra:0,tags:[],goalMode:null});
    if(!day.activities)day.activities=[];if(!day.tags)day.tags=[];
    const wts=await store.get("fit_weights",[]);const preps=await store.get("fit_mealpreps",[]);
    const prof=await store.get("fit_profile",null)||DEFAULT_PROFILE;const photos=await store.get("fit_photos",[]);
    const phases=await store.get("fit_weight_phases",[]);
    setProducts_(prods);setDayData_(day);setWeights_(wts);setMealPreps_(preps);setProfile_(prof);setProgressPhotos_(photos);setWeightPhases_(Array.isArray(phases)?phases:[]);
    setToday(bootDate); // Make sure state matches what we just loaded
    lastLoadedDate.current = bootDate;
    setReady(true);
  })();},[]);

  // When the date rolls over after bootstrap, reload dayData for the new date.
  // Without this, dayData would still hold yesterday's meals and the setDayData callback
  // (which writes to `fit_day_${today}`) would overwrite today's data with yesterday's.
  useEffect(() => {
    if (!ready) return;
    if (lastLoadedDate.current === today) return;
    lastLoadedDate.current = today;
    (async () => {
      const day = await store.get(`fit_day_${today}`, {date:today,dayType:"rest",meals:[],activities:[],burnedExtra:0,tags:[],goalMode:null});
      if (!day.activities) day.activities = [];
      if (!day.tags) day.tags = [];
      setDayData_(day);
    })();
  }, [today, ready]);

  const setDayData=useCallback(upd=>{setDayData_(prev=>{const next=typeof upd==="function"?upd(prev):upd;store.set(`fit_day_${today}`,next);addToIndex(today);return next;});},[today]);
  const setWeights=useCallback(upd=>{setWeights_(p=>{const n=typeof upd==="function"?upd(p):upd;store.set("fit_weights",n);return n;});},[]);
  const setProducts=useCallback(upd=>{setProducts_(p=>{const n=typeof upd==="function"?upd(p):upd;store.set("fit_products",n);return n;});},[]);
  const setMealPreps=useCallback(upd=>{setMealPreps_(p=>{const n=typeof upd==="function"?upd(p):upd;store.set("fit_mealpreps",n);return n;});},[]);
  const setProfile=useCallback(upd=>{setProfile_(p=>{const n=typeof upd==="function"?upd(p):upd;store.set("fit_profile",n);return n;});},[]);
  const setProgressPhotos=useCallback(upd=>{setProgressPhotos_(p=>{const n=typeof upd==="function"?upd(p):upd;store.set("fit_photos",n);return n;});},[]);
  const setWeightPhases=useCallback(upd=>{setWeightPhases_(p=>{const n=typeof upd==="function"?upd(p):upd;store.set("fit_weight_phases",n);return n;});},[]);
  const latestWeight=weights[0]?.weight;
  const needsOnboarding=!profile?.birthday||!profile?.heightCm;
  const [showImport,setShowImport]=useState(null); // null=loading, true=show, false=skip
  // On first mount: if no profile exists at all, offer import before onboarding
  useEffect(()=>{if(ready){setShowImport(prev=>prev===null?(!profile?.birthday):prev);}}, [ready]);
  const handleImportDone=async(n)=>{setShowImport(false);window.location.reload();};
  if(!ready||!profile||showImport===null)return(<div style={{background:C.bg,height:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{color:C.muted,fontFamily:"monospace",fontSize:13}}>Loading…</div></div>);
  if(showImport===true)return(<ImportScreen onImport={handleImportDone} onSkip={()=>setShowImport(false)}/>);
  if(needsOnboarding)return(<OnboardingScreen onDone={p=>{setProfile(p);setTab("today");}}/>);
  return(<div style={{background:C.bg,height:"100vh",display:"flex",flexDirection:"column",fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif",maxWidth:520,margin:"0 auto"}}>
    <style>{`*{-webkit-tap-highlight-color:transparent;box-sizing:border-box}input,textarea{color-scheme:dark}::-webkit-scrollbar{display:none}button:active{opacity:0.82}`}</style>
    {rolloverBanner&&<div style={{background:`${C.lime}18`,borderBottom:`1px solid ${C.lime}`,padding:"10px 14px",display:"flex",alignItems:"center",gap:8}}>
      <span style={{fontSize:16}}>🌅</span>
      <div style={{flex:1,fontSize:12,color:C.lime,lineHeight:1.4}}>It's a new day — you're now logging for <b>{new Date(rolloverBanner.toDate+"T12:00:00").toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short"})}</b>. Late-night meals can be moved to yesterday from the History tab.</div>
      <button onClick={()=>setRolloverBanner(null)} style={{background:"none",border:"none",color:C.lime,fontSize:18,cursor:"pointer",padding:"0 4px",lineHeight:1}}>×</button>
    </div>}
    <div style={{flex:1,overflow:"hidden"}}>
      {tab==="today"&&<TodayTab dayData={dayData} setDayData={setDayData} mealPreps={mealPreps} setMealPreps={setMealPreps} products={products} setProducts={setProducts} profile={profile} latestWeight={latestWeight} weights={weights} setWeights={setWeights} onGoToSettings={()=>setTab("settings")}/>}
      {tab==="activity"&&<ActivityTab dayData={dayData} setDayData={setDayData} profile={profile} weights={weights} setWeights={setWeights} weightPhases={weightPhases||[]} setWeightPhases={setWeightPhases}/>}
      {tab==="food"&&<FoodTab mealPreps={mealPreps} setMealPreps={setMealPreps} products={products} setProducts={setProducts} profile={profile}/>}
      {tab==="analysis"&&<AnalysisTab weights={weights} profile={profile} setProfile={setProfile} progressPhotos={progressPhotos} setProgressPhotos={setProgressPhotos} products={products} mealPreps={mealPreps} weightPhases={weightPhases}/>}
      {tab==="history"&&<HistoryTab weights={weights} products={products} profile={profile}/>}
      {tab==="settings"&&<SettingsTab profile={profile} setProfile={setProfile} weights={weights} setWeights={setWeights}/>}
    </div>
    <Nav tab={tab} setTab={setTab}/>
  </div>);
}

const { createElement: ce } = React;
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(ce(App));
</script>
</body>
</html>
