// ── TDEE helpers ──────────────────────────────────────────────────────────────
function calcAge(b){if(!b)return null;return Math.floor((Date.now()-new Date(b))/(365.25*24*3600*1000));}
function getTDEE(profile,weight){
  const age=calcAge(profile?.birthday);if(!age||!profile?.heightCm||!weight)return null;
  const bmr=profile.sex==="female"?10*weight+6.25*profile.heightCm-5*age-161:10*weight+6.25*profile.heightCm-5*age+5;
  const lev=ACT_LEVELS.find(l=>l.id===(profile.activityLevel||"light"));
  return Math.round(bmr*(lev?.m||1.35));
}
const DAY_BURN={rest:0,gym:300,run_short:400,run_long:600};
const FB={rest:{kcal:1700,protein:140,carbs:165,fat:55},gym:{kcal:2000,protein:140,carbs:200,fat:60},run_short:{kcal:1950,protein:140,carbs:195,fat:58},run_long:{kcal:2150,protein:140,carbs:220,fat:62}};
function getDT(profile,dayType,weight,extraBurn=0,hasLoggedActivity=false){
  const tdee=getTDEE(profile,weight);if(!tdee)return FB[dayType]||FB.rest;
  // If user logged an actual activity, use that burn instead of the day-type estimate
  const estimatedBurn=hasLoggedActivity?0:(DAY_BURN[dayType]||0);
  const base=tdee+estimatedBurn+extraBurn;
  const adj={cut:-400,bulk:300,maintain:0}[profile.goal||"cut"];
  const kcal=Math.max(1200,Math.round(base+adj));
  const pPerKg={cut:2.2,bulk:1.8,maintain:2.0}[profile.goal||"cut"];
  const protein=Math.max(130,Math.round((weight||70)*pPerKg));
  const fat=Math.max(40,Math.round(kcal*0.27/9));
  const carbs=Math.max(50,Math.round((kcal-protein*4-fat*9)/4));
  return{kcal,protein,carbs,fat};
}
function getMaint(profile,dayType,weight,extraBurn=0,hasLoggedActivity=false){const tdee=getTDEE(profile,weight);if(!tdee)return null;const estimatedBurn=hasLoggedActivity?0:(DAY_BURN[dayType]||0);return Math.round(tdee+estimatedBurn+extraBurn);}
function weeklyTrend(weights){if(weights.length<4)return null;const r=weights.slice(0,Math.min(weights.length,14));const days=(new Date(r[0].date)-new Date(r[r.length-1].date))/(24*3600*1000);if(days<3)return null;return((r[0].weight-r[r.length-1].weight)/days)*7;}
function gCol(goal){return goal==="cut"?C.orange:goal==="bulk"?C.blue:C.lime;}

// ── Dual storage: window.storage (Claude.ai) OR localStorage (standalone) ────
// Data is stored per-device. Use Export/Import in Settings to move data
// between devices or back up.
const store = {
  async get(k, d=null) {
    if (typeof window.storage !== "undefined") {
      try { const r = await window.storage.get(k); return r ? JSON.parse(r.value) : d; } catch {}
    }
    try { const v = localStorage.getItem("fit_"+k); return v ? JSON.parse(v) : d; } catch { return d; }
  },
  async set(k, v) {
    const s = JSON.stringify(v);
    if (typeof window.storage !== "undefined") {
      try { await window.storage.set(k, s); } catch {}
    }
    try { localStorage.setItem("fit_"+k, s); } catch {}
  },
};
async function addToIndex(date){const d=await store.get("fit_dates",[]);if(!d.includes(date)){d.unshift(date);await store.set("fit_dates",d.slice(0,90));}}

// Resize image to max 1024px on longest side before encoding (phone photos are ~4000px)
async function resizeImg(dataUrl, maxPx=1024) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, maxPx / Math.max(img.width, img.height));
      const w = Math.round(img.width * scale), h = Math.round(img.height * scale);
      const c = document.createElement("canvas"); c.width = w; c.height = h;
      c.getContext("2d").drawImage(img, 0, 0, w, h);
      resolve(c.toDataURL("image/jpeg", 0.82));
    };
    img.onerror = () => resolve(dataUrl);
    img.src = dataUrl;
  });
}
async function prepImgs(imgs) {
  const out = [];
  for (const img of imgs.slice(0, 8)) {
    const resized = await resizeImg(img.preview);
    out.push({ data: resized.split(",")[1], mt: "image/jpeg", preview: resized });
  }
  return out;
}
const iBlks = imgs => imgs.map(i=>({type:"image",source:{type:"base64",media_type:i.mt,data:i.data}}));
const pCtx  = ps  => ps.slice(0,25).map(p=>`${p.name}:${p.kcal}kcal P${p.p}g C${p.c}g F${p.f}g`).join("; ");

function extractJSON(text) {
  if (!text) throw new Error("Empty response");
  // Try direct parse
  const clean = text.trim().replace(/^```json\s*/,"").replace(/^```\s*/,"").replace(/\s*```$/,"").trim();
  try { return JSON.parse(clean); } catch {}
  // Find outermost { ... }
  const start = text.indexOf("{");
  const end = text.lastIndexOf("}");
  if (start !== -1 && end > start) {
    try { return JSON.parse(text.slice(start, end+1)); } catch {}
  }
  // Find first complete JSON object with regex
  const m = text.match(/\{[^{}]*(?:\{[^{}]*\}[^{}]*)*\}/);
  if (m) { try { return JSON.parse(m[0]); } catch {} }
  throw new Error("AI returned text instead of JSON. Response: " + text.slice(0,120));
}

const inClaudeAI = () => { try { return typeof window.storage !== "undefined"; } catch { return false; } };
// Model — must be exactly this string for Claude.ai artifact proxy
const AI_MODEL = "claude-haiku-4-5-20251001";
async function callAI(content, apiKey) {
  // Claude.ai artifact proxy: no extra headers, just Content-Type + .json() response
  // Standalone with API key: add auth headers
  const headers = { "Content-Type": "application/json" };
  if (apiKey && !inClaudeAI()) {
    headers["x-api-key"] = apiKey;
    headers["anthropic-version"] = "2023-06-01";
    headers["anthropic-dangerous-direct-browser-access"] = "true";
  }
  const body = JSON.stringify({ model: AI_MODEL, max_tokens: 1000, messages: [{ role: "user", content }] });
  // Use the exact pattern from Claude.ai artifact docs: fetch then .json()
  let data;
  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", { method: "POST", headers, body });
    data = await response.json();
  } catch(e) {
    throw new Error("Connection error: " + e.message);
  }
  if (data.error) throw new Error("API: " + (data.error.message || JSON.stringify(data.error)));
  if (!data.content) throw new Error("No content in response: " + JSON.stringify(data).slice(0,100));
  const text = data.content.find(b => b.type === "text")?.text || "";
  return extractJSON(text);
}

// Food analysis
async function aFood(imgs, ps, mt, desc, apiKey) {
  const compressed = await prepImgs(imgs);
  const ctx = pCtx(ps);
  let prompt;
  if (mt === "canteen") {
    prompt = "You are a nutrition analyst. Estimate macros for this canteen/restaurant meal.\n"
      + "Description: " + desc + "\n"
      + (compressed.length ? compressed.length + " photo(s) attached.\n" : "")
      + "Known products: " + ctx + "\n\n"
      + "Reply ONLY with JSON, nothing else:\n"
      + '{"type":"meal","name":"","kcal":0,"protein":0,"carbs":0,"fat":0,"notes":"canteen estimate","newProduct":null}';
  } else {
    prompt = "You are a precision nutrition analyst reading food photos with kitchen scales.\n"
      + (desc ? "Dish: " + desc + "\n" : "")
      + "Known products per 100g: " + ctx + "\n\n"
      + "INSTRUCTIONS — follow these exactly:\n"
      + "1. Each photo shows ONE ingredient on a CAMRY digital scale that has been ZEROED/TARED first.\n"
      + "2. The scale reading in each photo = the EXACT weight of ONLY that ingredient. Do not subtract anything.\n"
      + "3. Read the digital display number carefully — it shows grams.\n"
      + "4. If you see an egg shell being held, the eggs have already been cracked in — the scale number IS the egg weight.\n"
      + "5. Identify EVERY ingredient across ALL " + compressed.length + " photos — do not skip any photo.\n"
      + "6. NEVER estimate weight — use only the number shown on the scale display.\n\n"
      + "Reply ONLY with this JSON and nothing else:\n"
      + '{"type":"meal","name":"","kcal":0,"protein":0,"carbs":0,"fat":0,"notes":"","newProduct":null,"ingredients":[{"name":"Ingredient name","weightG":0}]}';
  }
  return callAI([{ type:"text", text:prompt }, ...iBlks(compressed)], apiKey);
}

async function aAnalysis(imgs, profile, weight, trend, apiKey) {
  const c = await prepImgs(imgs.slice(0,2));
  const age = calcAge(profile?.birthday) || 27;
  const d = new Date();
  const mo = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][d.getMonth()];
  const dateStr = d.getDate() + " " + mo + " " + d.getFullYear();
  const trendStr = trend ? (Math.abs(trend).toFixed(2) + "kg/week " + (trend<0?"loss":"gain")) : "unknown";
  const prompt = "Fitness coach physique assessment. Analyze this photo.\n\n"
    + "Person: " + age + "yo " + (profile?.sex||"male") + ", " + (profile?.heightCm||178) + "cm, ~" + (weight||66) + "kg\n"
    + "Goal: \"" + (profile?.goalNote||"visible abs") + "\" (mode: " + (profile?.goal||"cut") + ")\n"
    + "Today: " + dateStr + "\n"
    + "Weight trend: " + trendStr + "\n\n"
    + "Tasks:\n"
    + "1. Estimate body fat %\n"
    + "2. Parse deadline from goal note (summer=Jun 21, spring=Mar 20, winter=Dec 21)\n"
    + "3. Estimate kg needed to reach visible abs (males ~10-12% BF)\n"
    + "4. Calculate if achievable given trend and weeks remaining\n"
    + "5. Give specific 2-sentence assessment and 2-3 tips\n\n"
    + "Reply ONLY with JSON:\n"
    + "{\"estimatedBfPct\":15,\"targetBfPct\":11,\"estimatedKgToGoal\":3,\"goalDateStr\":\"Jun 21 " + d.getFullYear() + "\","
    + "\"weeksToGoalDate\":8,\"neededKgPerWeek\":0.38,\"isAchievable\":true,\"verdict\":\"On track\","
    + "\"assessment\":\"text\",\"recommendations\":\"text\",\"targetWeight\":" + Math.round((weight||66)-3) + "}";
  return callAI([{ type:"text", text:prompt }, ...iBlks(c)], apiKey);
}

function Ring({value,max,color,label}){
  const s=70,r=27,circ=2*Math.PI*r,pct=max>0?Math.min(value/max,1.06):0,over=pct>1;
  return(<div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
    <div style={{position:"relative",width:s,height:s}}>
      <svg width={s} height={s} style={{transform:"rotate(-90deg)"}}>
        <circle cx={s/2} cy={s/2} r={r} fill="none" stroke={C.dim} strokeWidth={4.5}/>
        <circle cx={s/2} cy={s/2} r={r} fill="none" stroke={over?C.red:color} strokeWidth={4.5} strokeDasharray={`${pct*circ} ${circ}`} strokeLinecap="round" style={{transition:"stroke-dasharray 0.5s"}}/>
      </svg>
      <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
        <span style={{fontSize:13,fontWeight:700,color:over?C.red:C.text,fontFamily:"monospace",lineHeight:1}}>{Math.round(value)}</span>
        <span style={{fontSize:9,color:C.muted,fontFamily:"monospace"}}>/{Math.round(max)}</span>
      </div>
    </div>
    <span style={{fontSize:9,color:C.muted,fontFamily:"monospace",textTransform:"uppercase",letterSpacing:"0.1em"}}>{label}</span>
  </div>);
}
function Chip({val,label,color}){return <span style={{fontFamily:"monospace",fontSize:11}}><span style={{color}}>{Math.round(val)}</span><span style={{color:C.muted}}>{label}</span></span>;}
function Field({label,value,onChange,type="text",placeholder="",disabled=false}){
  return(<div><div style={{fontSize:10,color:C.muted,fontFamily:"monospace",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:4}}>{label}</div>
    <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} disabled={disabled}
      style={{display:"block",width:"100%",boxSizing:"border-box",background:disabled?C.card:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:"9px 11px",color:disabled?C.muted:C.text,fontSize:14,outline:"none",fontFamily:type==="number"?"monospace":"inherit"}}/>
  </div>);
}
function ImgZone({imgs,setImgs,compact=false,maxPhotos=10}){
  const ref=useRef();
  const read=files=>Array.from(files).slice(0,maxPhotos).forEach(f=>{const r=new FileReader();r.onload=e=>setImgs(p=>[...p,{data:e.target.result.split(",")[1],mt:f.type,preview:e.target.result}].slice(0,maxPhotos));r.readAsDataURL(f);});
  return(<>
    <div onDrop={e=>{e.preventDefault();read(e.dataTransfer.files);}} onDragOver={e=>e.preventDefault()} onClick={()=>ref.current?.click()}
      style={{border:`2px dashed ${imgs.length?C.lime:C.border}`,borderRadius:10,padding:compact?"10px 12px":"18px 16px",textAlign:"center",cursor:"pointer",background:C.card}}>
      <div style={{fontSize:compact?18:26}}>{"📸"}</div>
      <div style={{fontSize:compact?11:13,color:C.muted,marginTop:4}}>{imgs.length?`${imgs.length}/${maxPhotos} photos — tap to add more`:compact?"Add photos":`Drop or tap · up to ${maxPhotos}`}</div>
    </div>
    <input ref={ref} type="file" accept="image/*" multiple style={{display:"none"}} onChange={e=>read(e.target.files)}/>
    {imgs.length>0&&<div style={{display:"flex",gap:5,flexWrap:"wrap",marginTop:8}}>
      {imgs.map((img,i)=>(<div key={i} style={{position:"relative"}}>
        <img src={img.preview} alt="" style={{width:52,height:52,borderRadius:7,objectFit:"cover",border:`1px solid ${C.border}`}}/>
        <button onClick={()=>setImgs(p=>p.filter((_,j)=>j!==i))} style={{position:"absolute",top:-5,right:-5,width:17,height:17,borderRadius:"50%",background:C.red,border:"none",color:"#fff",fontSize:10,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
      </div>))}
    </div>}
  </>);
}

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>

      </div>
      {children}
    </div>
  </div>);
}

  return(<div style={{display:"flex",flexDirection:"column",gap:9}}>

    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9}}>
      <Field label="Kcal" value={form.kcal} onChange={f("kcal")} type="number" placeholder="0"/>

// ── AddIngredientRow — inline add with name + weight ──────────────────────────
function AddIngredientRow({onAdd,products}) {
  const [name,setName]=useState("");const [wg,setWg]=useState("");const [open,setOpen]=useState(false);
  const [suggestions,setSuggestions]=useState([]);
  const onNameChange=v=>{
    setName(v);
    if(v.length>1&&products){
      const q=v.toLowerCase();
      setSuggestions(products.filter(p=>p.name.toLowerCase().includes(q)).slice(0,4));
    } else { setSuggestions([]); }
  };
  const pick=prod=>{setName(prod.name);setSuggestions([]);};
  const submit=()=>{
    if(!name.trim()||!wg)return;
    // Find matching product for accurate macros
    const q=name.toLowerCase();
    const prod=products?.find(p=>p.name.toLowerCase().includes(q)||q.includes(p.name.toLowerCase().split(' ')[0]));
    onAdd({name:name.trim(),weightG:wg,kcal:prod?prod.kcal:0,protein:prod?prod.p:0,carbs:prod?prod.c:0,fat:prod?prod.f:0,_fromProduct:!!prod});
    setName("");setWg("");setOpen(false);setSuggestions([]);
  };
  if(!open) return(<button onClick={()=>setOpen(true)} style={{padding:"8px 0",borderRadius:8,background:"none",border:`1px dashed ${C.border}`,color:C.muted,cursor:"pointer",fontSize:12,width:"100%"}}>+ Add missing ingredient</button>);
  return(<div style={{background:C.faint,borderRadius:8,padding:"10px 12px"}}>
    <div style={{display:"flex",gap:8,alignItems:"center"}}>
      <div style={{flex:2,position:"relative"}}>
        <input value={name} onChange={e=>onNameChange(e.target.value)} placeholder="Ingredient name" style={{width:"100%",boxSizing:"border-box",background:C.bg,border:`1px solid ${C.border}`,borderRadius:6,padding:"7px 9px",color:C.text,fontSize:13,outline:"none"}}/>
        {suggestions.length>0&&<div style={{position:"absolute",top:"100%",left:0,right:0,background:C.surf,border:`1px solid ${C.border}`,borderRadius:6,zIndex:10,marginTop:2}}>
          {suggestions.map((p,i)=><button key={i} onClick={()=>pick(p)} style={{display:"block",width:"100%",padding:"7px 10px",background:"none",border:"none",color:C.text,fontSize:12,cursor:"pointer",textAlign:"left",borderBottom:i<suggestions.length-1?`1px solid ${C.border}`:"none"}}>{p.name}</button>)}
        </div>}
      </div>
      <input type="number" value={wg} onChange={e=>setWg(e.target.value)} placeholder="g" style={{width:60,background:C.bg,border:`1px solid ${C.border}`,borderRadius:6,padding:"7px 9px",color:C.text,fontSize:13,fontFamily:"monospace",outline:"none"}}/>
      <span style={{fontSize:12,color:C.muted,flexShrink:0}}>g</span>
    </div>
    {name&&products?.find(p=>p.name.toLowerCase().includes(name.toLowerCase()))&&<div style={{fontSize:11,color:C.lime,marginTop:4}}>✓ Matched product — exact macros will be used</div>}
    {name&&!products?.find(p=>p.name.toLowerCase().includes(name.toLowerCase()))&&name.length>2&&<div style={{fontSize:11,color:C.muted,marginTop:4}}>No match in products — AI estimate will be used</div>}
    <div style={{display:"flex",gap:8,marginTop:8}}>
      <button onClick={()=>{setOpen(false);setSuggestions([]);}} style={{flex:1,padding:"7px 0",borderRadius:6,background:"none",border:`1px solid ${C.border}`,color:C.muted,cursor:"pointer",fontSize:12}}>Cancel</button>
      <button onClick={submit} disabled={!name.trim()||!wg} style={{flex:2,padding:"7px 0",borderRadius:6,background:name.trim()&&wg?C.lime:C.faint,border:"none",color:"#000",fontWeight:700,cursor:name.trim()&&wg?"pointer":"default",fontSize:12}}>Add Ingredient</button>
    </div>
  </div>);
}

  const activePreps=mealPreps.filter(p=>p.remaining>0);
  const [ingredients,setIngredients]=useState(null); // detected ingredients for confirmation
  const analyze=async()=>{setLoading(true);setErr(null);try{
    const res=await aFood(imgs,products,mt,desc,apiKey);
    setResult(res);
    if(res.type!=="activity"){
      setForm({name:res.name||"",kcal:String(Math.round(res.kcal)||""),protein:String(Math.round(res.protein)||""),carbs:String(Math.round(res.carbs)||""),fat:String(Math.round(res.fat)||""),notes:res.notes||""});

    if(!ingredients)return;

      const grams=parseFloat(ing.weightG)||0;
      const scale=grams/100;
      // Look up product by fuzzy name match
      const nameLower=ing.name.toLowerCase();
      const prod=products.find(p=>{
        const pl=p.name.toLowerCase();
        const words=nameLower.split(/\s+/).filter(w=>w.length>2);
        return words.some(w=>pl.includes(w));
      });
      // Use product macros if found (accurate), else fall back to AI estimates scaled by weight
      const kcal   = prod ? prod.kcal*scale : (ing.kcal||0)*scale;
      const protein= prod ? prod.p*scale    : (ing.protein||0)*scale;
      const carbs  = prod ? prod.c*scale    : (ing.carbs||0)*scale;
      const fat    = prod ? prod.f*scale    : (ing.fat||0)*scale;
      return{kcal:acc.kcal+kcal,protein:acc.protein+protein,carbs:acc.carbs+carbs,fat:acc.fat+fat};
    },{kcal:0,protein:0,carbs:0,fat:0});
    setForm(f=>({...f,kcal:String(Math.round(totals.kcal)),protein:String(Math.round(totals.protein)),carbs:String(Math.round(totals.carbs)),fat:String(Math.round(totals.fat))}));

  const usePrep=prep=>{const n=prep.portions-prep.remaining+1;onAdd({id:Date.now(),name:prep.name,kcal:prep.perKcal,protein:prep.perProtein,carbs:prep.perCarbs,fat:prep.perFat,notes:`Prep ${n}/${prep.portions}`,time:new Date().toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"})});setMealPreps(ps=>ps.map(p=>p.id===prep.id?{...p,remaining:p.remaining-1}:p));};

        <div style={{fontSize:10,color:C.muted,fontFamily:"monospace",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:4}}>{mt==="canteen"?"Describe the meal (required)":"Meal name / description (optional)"}</div>

  const [type,setType]=useState("run");const [dist,setDist]=useState("");const [dur,setDur]=useState("");const [kcal,setKcal]=useState("");const [imgs,setImgs]=useState([]);const [loading,setLoading]=useState(false);const [err,setErr]=useState(null);

tSize:12,color:C.muted}}>Adds to daily target</span><span style={{fontFamily:"monospace",fontSize:18,fontWeight:800,color:C.orange}}>+{finalKcal} kcal</span></div>}<div style={{display:"flex",gap:8}}><button onClick={onClose} style={{flex:1,padding:"11px 0",borderRadius:10,background:C.card,border:`1px solid ${C.border}`,color:C.text,fontWeight:600,cursor:"pointer"}}>Cancel</button><button onClick={confirm} disabled={!finalKcal} style={{flex:2,padding:"11px 0",borderRadius:10,background:finalKcal?C.lime:C.faint,color:"#000",fontWeight:700,border:"none",cursor:finalKcal?"pointer":"default",fontSize:15}}>Log Activity</button></div></Sheet>);

function CreatePrepSheet({products,onSave,onClose,apiKey}){

  const f=k=>v=>setForm(p=>({...p,[k]:v}));

  const portN=parseInt(portions)||1;

  {!result?(<>{err&&<div style={{background:"#1e0a0a",border:"1px solid #5a1a1a",borderRadius:8,padding:"8px 12px",fontSize:12,color:"#ff8080",margin:"10px 0",wordBreak:"break-word"}}>{err}</div>}<button onClick={analyze} disabled={!imgs.length||loading} style={{width:"100%",padding:"11px 0",borderRadius:10,background:imgs.length&&!loading?C.lime:C.faint,color:"#000",fontWeight:700,border:"none",cursor:imgs.length?"pointer":"default",fontSize:14,marginTop:12}}>{loading?"Analyzing…":`Analyze ${imgs.length} photo${imgs.length!==1?"s":""}`}</button><button onClick={()=>setResult(true)} style={{width:"100%",padding:"9px 0",borderRadius:10,background:"none",border:`1px solid ${C.border}`,color:C.muted,fontWeight:500,cursor:"pointer",fontSize:13,marginTop:6}}>Enter manually</button></>):(<><div style={{marginTop:12,display:"grid",gridTemplateColumns:"1fr 1fr",gap:9}}><Field label="Total Kcal" value={form.kcal} onChange={f("kcal")} type="number" placeholder="0"/><Field label="Total Protein g" value={form.protein} onChange={f("protein")} type="number" placeholder="0"/><Field label="Total Carbs g" value={form.carbs} onChange={f("carbs")} type="number" placeholder="0"/><Field label="Total Fat g" value={form.fat} onChange={f("fat")} type="number" placeholder="0"/><Field label="Total weight g" value={wt} onChange={setWt} type="number" placeholder="1200"/><Field label="Portions" value={portions} onChange={setPortions} type="number" placeholder="4"/></div>{parseFloat(form.kcal)>0&&portN>0&&(<div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"10px 14px",marginTop:10}}><div style={{fontSize:11,color:C.muted,marginBottom:4}}>Per portion ({portN})</div><div style={{display:"flex",gap:10}}><Chip val={(parseFloat(form.kcal)||0)/portN} label="kcal" color={C.lime}/><Chip val={(parseFloat(form.protein)||0)/portN} label="P" color={C.blue}/><Chip val={(parseFloat(form.carbs)||0)/portN} label="C" color={C.orange}/><Chip val={(parseFloat(form.fat)||0)/portN} label="F" color={C.purple}/></div></div>)}<div style={{display:"flex",gap:8,marginTop:14}}><button onClick={onClose} style={{flex:1,padding:"11px 0",borderRadius:10,background:C.card,border:`1px solid ${C.border}`,color:C.text,fontWeight:600,cursor:"pointer"}}>Cancel</button><button onClick={save} style={{flex:2,padding:"11px 0",borderRadius:10,background:C.lime,color:"#000",fontWeight:700,border:"none",cursor:"pointer",fontSize:15}}>Save Prep</button></div></>)}
  </Sheet>);

// ── Analysis Tab ──────────────────────────────────────────────────────────────
function AnalysisTab({weights,profile,setProfile,progressPhotos,setProgressPhotos}){
  const [imgs,setImgs]=useState([]);const [analyzing,setAnalyzing]=useState(false);const [result,setResult]=useState(null);const [err,setErr]=useState(null);const [expanded,setExpanded]=useState(null);
  const latestWeight=weights[0]?.weight;const trend=weeklyTrend(weights);const gc=gCol(profile.goal);
  const spark=[...weights].reverse().slice(-20);const W=300,H=60;const vals=spark.map(w=>w.weight);const hasT=profile.targetWeightKg&&spark.length>1;const sMin=vals.length?Math.min(...vals,(hasT?profile.targetWeightKg:Infinity))-0.5:65;const sMax=vals.length?Math.max(...vals)+0.5:70;const px=i=>spark.length>1?(i/(spark.length-1))*W:W/2;const py=v=>H-((v-sMin)/(sMax-sMin))*(H-8)-4;
  const startW=weights[weights.length-1]?.weight||latestWeight;const totalLost=startW&&latestWeight?startW-latestWeight:null;const kgToGoal=profile.targetWeightKg&&latestWeight?latestWeight-profile.targetWeightKg:null;const weeksETA=trend&&kgToGoal&&Math.sign(kgToGoal)===Math.sign(trend)?Math.abs(kgToGoal/trend):null;const goalDate=weeksETA?new Date(Date.now()+weeksETA*7*24*3600*1000):null;const tdee=latestWeight?getTDEE(profile,latestWeight):null;
  const analyze=async()=>{if(!imgs.length)return;setAnalyzing(true);setErr(null);try{const res=await aAnalysis(imgs,profile,latestWeight,trend,profile.apiKey);setResult(res);const entry={id:Date.now(),date:TODAY(),preview:imgs[0].preview,analysis:res};setProgressPhotos(p=>[entry,...p].slice(0,50));setImgs([]);}catch(e){setErr(String(e.message||e));}setAnalyzing(false);};
  return(<div style={{height:"100%",overflowY:"auto",padding:"0 16px 20px"}}>
    <div style={{padding:"18px 0 12px"}}><div style={{fontSize:26,fontWeight:800,color:C.text,letterSpacing:"-0.03em"}}>Analysis</div></div>
    {latestWeight&&<div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:"14px 16px",marginBottom:12}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
        <div><div style={{fontSize:11,color:C.muted,fontFamily:"monospace",textTransform:"uppercase",letterSpacing:"0.08em"}}>{profile.goal==="cut"?"Cutting":profile.goal==="bulk"?"Bulking":"Maintaining"}</div><div style={{display:"flex",alignItems:"baseline",gap:5,marginTop:4}}><span style={{fontSize:36,fontWeight:900,fontFamily:"monospace",color:C.text,letterSpacing:"-0.03em",lineHeight:1}}>{latestWeight.toFixed(2)}</span><span style={{fontSize:14,color:C.muted}}>kg</span>{trend!==null&&<span style={{fontSize:13,color:trend<0?C.lime:C.red,fontFamily:"monospace",marginLeft:4}}>{trend<0?"↓":"↑"}{Math.abs(trend).toFixed(2)}/wk</span>}</div></div>
        <div style={{textAlign:"right"}}>{totalLost!==null&&<div><div style={{fontSize:10,color:C.muted,fontFamily:"monospace",textTransform:"uppercase"}}>Total {profile.goal==="bulk"?(totalLost<0?"gained":"lost"):(totalLost>0?"lost":"gained")}</div><div style={{fontSize:18,fontWeight:800,fontFamily:"monospace",color:(profile.goal==="bulk"?totalLost<0:totalLost>0)?C.lime:C.red}}>{(profile.goal==="bulk"?totalLost<0:totalLost>0)?"-":""}{Math.abs(totalLost).toFixed(2)}kg</div></div>}{tdee&&<div style={{marginTop:4}}><div style={{fontSize:10,color:C.muted,fontFamily:"monospace",textTransform:"uppercase"}}>TDEE</div><div style={{fontSize:14,fontWeight:700,fontFamily:"monospace",color:C.blue}}>{tdee} kcal</div></div>}</div>
      </div>
      {spark.length>=3&&<svg width="100%" viewBox={"0 0 "+W+" "+H} style={{display:"block",marginBottom:8}}>
        {hasT&&<line x1={0} y1={py(profile.targetWeightKg)} x2={W} y2={py(profile.targetWeightKg)} stroke={gc+"50"} strokeWidth={1} strokeDasharray="4 4"/>}
        <polyline points={spark.map((d,i)=>px(i)+","+py(d.weight)).join(" ")} fill="none" stroke={C.lime+"40"} strokeWidth={1.5} strokeLinecap="round" strokeLinejoin="round"/>
        <polyline points={spark.map((d,i)=>px(i)+","+py(d.weight)).join(" ")} fill="none" stroke={C.lime} strokeWidth={2.5} strokeLinecap="round" strokeLinejoin="round"/>

    </div>}
    <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:"14px 16px",marginBottom:12}}>

function TestAPIButton({apiKey}) {
  const [status, setStatus] = useState(null);
  const [loading, setLoading] = useState(false);
  const test = async () => {
    setLoading(true); setStatus(null);
    const headers = {"Content-Type":"application/json"};
    if (apiKey && !inClaudeAI()) {
      headers["x-api-key"] = apiKey;
      headers["anthropic-version"] = "2023-06-01";
      headers["anthropic-dangerous-direct-browser-access"] = "true";
    }
    const body = JSON.stringify({model: AI_MODEL, max_tokens: 20, messages: [{role:"user",content:"Reply with just OK"}]});
    let data;
    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {method:"POST",headers,body});
      data = await response.json();
    } catch(e) { setStatus({ok:false,msg:"Connection error: " + e.message}); setLoading(false); return; }
    if (data.error) { setStatus({ok:false,msg:"API error: "+data.error.message+" (type: "+data.error.type+")"}); setLoading(false); return; }
    if (!data.content) { setStatus({ok:false,msg:"No content field. Raw: "+JSON.stringify(data).slice(0,120)}); setLoading(false); return; }
    setStatus({ok:true,msg:"Connected! Model: "+AI_MODEL+" | "+data.content[0]?.text}); setLoading(false);
  };
  return (<div>
    <button onClick={test} disabled={loading} style={{width:"100%",padding:"9px 0",borderRadius:8,background:loading?C.faint:C.blue,border:"none",color:"#000",fontWeight:700,cursor:loading?"default":"pointer",fontSize:13}}>{loading?"Testing…":"Test AI Connection"}</button>
    {status&&<div style={{marginTop:8,padding:"8px 12px",borderRadius:8,background:status.ok?"#0a1a0a":"#1e0a0a",border:`1px solid ${status.ok?"#1a4a1a":"#5a1a1a"}`,fontSize:12,color:status.ok?C.lime:"#ff8080",wordBreak:"break-word"}}>{status.msg}</div>}
  </div>);
}

      <div style={{fontSize:14,fontWeight:600,color:C.text,marginBottom:4}}>Data Backup</div>

    </div>
  </div>);
}

function OnboardingScreen({onDone}){
  const [step,setStep]=useState(0);
  const [name,setName]=useState("");
  const [birthday,setBirthday]=useState("");
  const [heightCm,setHeightCm]=useState("");
  const [sex,setSex]=useState("male");
  const [activityLevel,setActivityLevel]=useState("light");
  const [goal,setGoal]=useState("cut");
  const [targetWeightKg,setTargetWeightKg]=useState("");
  const [goalNote,setGoalNote]=useState("");

  const steps=[
    {title:"Welcome",subtitle:"Let's set up your profile. This takes 1 minute."},
    {title:"About You",subtitle:"Used to calculate your personalized calorie targets."},
    {title:"Activity Level",subtitle:"Your daily life activity — NOT counting workouts."},
    {title:"Your Goal",subtitle:"This determines your calorie targets each day."},
  ];

  const canNext=[
    true,
    name.trim().length>0&&birthday.length>0&&heightCm>0,
    true,
    goal.length>0,
  ];

  const finish=()=>{onDone({name:name.trim()||"User",birthday,heightCm:parseFloat(heightCm)||null,sex,activityLevel,goal,targetWeightKg:parseFloat(targetWeightKg)||null,goalNote:goalNote.trim(),apiKey:""});};

  return(<div style={{background:C.bg,height:"100vh",display:"flex",flexDirection:"column",fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif",maxWidth:520,margin:"0 auto"}}>
    <style>{`*{-webkit-tap-highlight-color:transparent;box-sizing:border-box}input{color-scheme:dark}::-webkit-scrollbar{display:none}`}</style>
    {/* Progress bar */}
    <div style={{height:3,background:C.dim,flexShrink:0}}>

    </div>
    <div style={{flex:1,overflowY:"auto",padding:"32px 24px 20px"}}>

      <div style={{fontSize:28,fontWeight:800,color:C.text,letterSpacing:"-0.03em",marginBottom:6}}>{steps[step].title}</div>
      <div style={{fontSize:14,color:C.muted,marginBottom:32}}>{steps[step].subtitle}</div>

      {step===0&&(<div style={{display:"flex",flexDirection:"column",gap:20}}>
        <div style={{background:C.card,borderRadius:16,padding:"24px 20px",border:`1px solid ${C.border}`}}>
          <div style={{fontSize:40,textAlign:"center",marginBottom:16}}>{"🏋️"}</div>
          <div style={{fontSize:18,fontWeight:700,color:C.text,textAlign:"center",marginBottom:8}}>Kcal Tracker</div>
          <div style={{fontSize:13,color:C.muted,textAlign:"center",lineHeight:1.6}}>Track meals with AI photo analysis, log workouts, monitor your cut or bulk progress, and analyse your body composition over time.</div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {[["📸","AI photo meal logging — just snap your food"],["⚡","Activity tracking with kcal burn adjustment"],["📊","Body composition analysis with progress photos"],["📋","Full history with edit capability"]].map(([ic,txt])=>(<div key={txt} style={{display:"flex",alignItems:"center",gap:12,background:C.card,borderRadius:10,padding:"12px 14px",border:`1px solid ${C.border}`}}><span style={{fontSize:20}}>{ic}</span><span style={{fontSize:13,color:C.text}}>{txt}</span></div>))}
        </div>
      </div>)}

      {step===1&&(<div style={{display:"flex",flexDirection:"column",gap:16}}>
        <Field label="Your name" value={name} onChange={setName} placeholder="e.g. John"/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <Field label="Birthday" value={birthday} onChange={setBirthday} type="date" placeholder="YYYY-MM-DD"/>
          <Field label="Height (cm)" value={heightCm} onChange={setHeightCm} type="number" placeholder="178"/>
        </div>
        <div>
          <div style={{fontSize:10,color:C.muted,fontFamily:"monospace",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:8}}>Sex</div>
          <div style={{display:"flex",gap:8}}>{[["male","Male"],["female","Female"]].map(([val,lbl])=>(<button key={val} onClick={()=>setSex(val)} style={{flex:1,padding:"12px 0",borderRadius:10,border:`1px solid ${sex===val?C.lime:C.border}`,background:sex===val?`${C.lime}18`:C.bg,color:sex===val?C.lime:C.muted,fontWeight:sex===val?700:500,cursor:"pointer",fontSize:14}}>{lbl}</button>))}</div>
        </div>
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"10px 14px"}}><div style={{fontSize:11,color:C.muted}}>Used only to calculate your BMR and personalized kcal targets. Not shared with anyone.</div></div>
      </div>)}

      {step===2&&(<div style={{display:"flex",flexDirection:"column",gap:8}}>
        {ACT_LEVELS.map(({id,label,desc})=>{const active=activityLevel===id;return(<button key={id} onClick={()=>setActivityLevel(id)} style={{padding:"14px 16px",borderRadius:12,border:`1px solid ${active?C.lime:C.border}`,background:active?`${C.lime}12`:C.card,cursor:"pointer",textAlign:"left",display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontSize:14,fontWeight:active?700:500,color:active?C.lime:C.text}}>{label}</div><div style={{fontSize:12,color:C.muted,marginTop:2}}>{desc}</div></div>{active&&<span style={{color:C.lime,fontSize:20}}>✓</span>}</button>);})}
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"10px 14px",marginTop:4}}><div style={{fontSize:11,color:C.muted}}>Gym and run calories are added on top automatically per day type — don't count those here.</div></div>
      </div>)}

      {step===3&&(<div style={{display:"flex",flexDirection:"column",gap:12}}>
        {GOALS.map(({id,label,emoji,desc,col})=>{const active=goal===id;return(<button key={id} onClick={()=>setGoal(id)} style={{padding:"14px 16px",borderRadius:12,border:`1px solid ${active?col:C.border}`,background:active?col+"15":C.card,cursor:"pointer",textAlign:"left",display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontSize:15,fontWeight:active?700:500,color:active?col:C.text}}>{emoji} {label}</div><div style={{fontSize:12,color:C.muted,marginTop:2}}>{desc}</div></div>{active&&<span style={{color:col,fontSize:20}}>✓</span>}</button>);})}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:4}}>
          <Field label="Target weight (kg)" value={targetWeightKg} onChange={setTargetWeightKg} type="number" placeholder="e.g. 65"/>
          <Field label="Goal note" value={goalNote} onChange={setGoalNote} placeholder="e.g. Abs for summer"/>
        </div>
      </div>)}
    </div>

    <div style={{padding:"16px 24px 32px",flexShrink:0,borderTop:`1px solid ${C.border}`}}>
      <div style={{display:"flex",gap:10}}>
        {step>0&&<button onClick={()=>setStep(s=>s-1)} style={{flex:1,padding:"14px 0",borderRadius:12,background:C.card,border:`1px solid ${C.border}`,color:C.text,fontWeight:600,cursor:"pointer",fontSize:15}}>Back</button>}
        <button onClick={()=>{if(step<steps.length-1)setStep(s=>s+1);else finish();}} disabled={!canNext[step]} style={{flex:step>0?2:1,padding:"14px 0",borderRadius:12,background:canNext[step]?C.lime:C.faint,border:"none",color:"#000",fontWeight:800,cursor:canNext[step]?"pointer":"default",fontSize:15}}>
          {step===steps.length-1?"Get Started →":step===0?"Let's Go →":"Next →"}
        </button>
      </div>
    </div>
  </div>);
}

function Nav({tab,setTab}){

function App(){
  const [tab,setTab]=useState("today");const [dayData,setDayData_]=useState(null);const [weights,setWeights_]=useState([]);const [products,setProducts_]=useState([]);const [mealPreps,setMealPreps_]=useState([]);const [profile,setProfile_]=useState(null);const [progressPhotos,setProgressPhotos_]=useState([]);const [ready,setReady]=useState(false);
  const today=TODAY();
  useEffect(()=>{(async()=>{
    const prods=await store.get("fit_products",null)||PRESETS;
    const day=await store.get(`fit_day_${today}`,{date:today,dayType:"rest",meals:[],activities:[],burnedExtra:0,tags:[]});
    if(!day.activities)day.activities=[];if(!day.tags)day.tags=[];
    const wts=await store.get("fit_weights",[]);const preps=await store.get("fit_mealpreps",[]);
    const prof=await store.get("fit_profile",null)||DEFAULT_PROFILE;const photos=await store.get("fit_photos",[]);
    setProducts_(prods);setDayData_(day);setWeights_(wts);setMealPreps_(preps);setProfile_(prof);setProgressPhotos_(photos);setReady(true);
  })();},[]);
  const setDayData=useCallback(upd=>{setDayData_(prev=>{const next=typeof upd==="function"?upd(prev):upd;store.set(`fit_day_${today}`,next);addToIndex(today);return next;});},[today]);
  const setWeights=useCallback(upd=>{setWeights_(p=>{const n=typeof upd==="function"?upd(p):upd;store.set("fit_weights",n);return n;});},[]);
  const setProducts=useCallback(upd=>{setProducts_(p=>{const n=typeof upd==="function"?upd(p):upd;store.set("fit_products",n);return n;});},[]);
  const setMealPreps=useCallback(upd=>{setMealPreps_(p=>{const n=typeof upd==="function"?upd(p):upd;store.set("fit_mealpreps",n);return n;});},[]);
  const setProfile=useCallback(upd=>{setProfile_(p=>{const n=typeof upd==="function"?upd(p):upd;store.set("fit_profile",n);return n;});},[]);
  const setProgressPhotos=useCallback(upd=>{setProgressPhotos_(p=>{const n=typeof upd==="function"?upd(p):upd;store.set("fit_photos",n);return n;});},[]);
  const latestWeight=weights[0]?.weight;
  const needsOnboarding=!profile?.birthday||!profile?.heightCm;
  if(!ready||!profile)return(<div style={{background:C.bg,height:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{color:C.muted,fontFamily:"monospace",fontSize:13}}>Loading…</div></div>);
  if(needsOnboarding)return(<OnboardingScreen onDone={p=>{setProfile(p);setTab("today");}}/>);
  return(<div style={{background:C.bg,height:"100vh",display:"flex",flexDirection:"column",fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif",maxWidth:520,margin:"0 auto"}}>
    <style>{`*{-webkit-tap-highlight-color:transparent;box-sizing:border-box}input,textarea{color-scheme:dark}::-webkit-scrollbar{display:none}button:active{opacity:0.82}`}</style>
    <div style={{flex:1,overflow:"hidden"}}>
      {tab==="today"&&<TodayTab dayData={dayData} setDayData={setDayData} mealPreps={mealPreps} setMealPreps={setMealPreps} products={products} setProducts={setProducts} profile={profile} latestWeight={latestWeight} weights={weights} setWeights={setWeights} onGoToSettings={()=>setTab("settings")}/>}
      {tab==="activity"&&<ActivityTab dayData={dayData} setDayData={setDayData} profile={profile}/>}
      {tab==="food"&&<FoodTab mealPreps={mealPreps} setMealPreps={setMealPreps} products={products} setProducts={setProducts} profile={profile}/>}
      {tab==="analysis"&&<AnalysisTab weights={weights} profile={profile} setProfile={setProfile} progressPhotos={progressPhotos} setProgressPhotos={setProgressPhotos}/>}
      {tab==="history"&&<HistoryTab weights={weights}/>}
      {tab==="settings"&&<SettingsTab profile={profile} setProfile={setProfile} weights={weights} setWeights={setWeights}/>}
    </div>
    <Nav tab={tab} setTab={setTab}/>
  </div>);
}

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js")
          .then(r => console.log("SW registered"))
          .catch(e => console.log("SW failed:", e));
      });
    }
  </script>
