// ── History Tab (shows weight per day) ───────────────────────────────────────
function HistoryTab({weights,products,profile}){

  const createDay=async(date)=>{if(!date||logs[date])return;const newLog={date,dayType:"rest",meals:[],activities:[],burnedExtra:0,tags:[]};await store.set(`fit_day_${date}`,newLog);await addToIndex(date);setLogs(p=>({...p,[date]:newLog}));setDates(p=>[date,...p.filter(d=>d!==date)].sort((a,b)=>b.localeCompare(a)));setExpanded(date);setNewDayPicker(false);setNewDayDate("");};
  const updateLog=async(date,data)=>{await store.set(`fit_day_${date}`,data);setLogs(p=>({...p,[date]:data}));};
  const updateMeal=(date,meal)=>{const log=logs[date];updateLog(date,{...log,meals:log.meals.map(m=>m.id===meal.id?meal:m)});setEditMeal(null);};
  const deleteMeal=(date,id)=>{const log=logs[date];updateLog(date,{...log,meals:log.meals.filter(m=>m.id!==id)});};
  const updateAct=(date,act)=>{const log=logs[date];updateLog(date,{...log,activities:(log.activities||[]).map(a=>a.id===act.id?act:a)});setEditAct(null);};
  const deleteAct=(date,id)=>{const log=logs[date];updateLog(date,{...log,activities:(log.activities||[]).filter(a=>a.id!==id)});};

ton></div>}</div>)}{!log.meals?.length&&<div style={{fontSize:12,color:C.muted,padding:"4px 0"}}>No meals.</div>}</div></div>

iv style={{fontSize:12,color:C.muted,padding:"4px 0"}}>No activities.</div>}</div></div>

function TestAPIButton({apiKey}) {
  const [status, setStatus] = useState(null);
  const [loading, setLoading] = useState(false);
  const test = async () => {
    setLoading(true); setStatus(null);
    const headers = {"Content-Type":"application/json"};
    if (apiKey && !inClaudeAI()) {
      headers["x-api-key"] = apiKey;
      headers["anthropic-version"] = "2023-06-01";
      headers["anthropic-dangerous-direct-browser-access"] = "true";
    }
    const body = JSON.stringify({model: VISION_MODEL, max_tokens: 20, messages: [{role:"user",content:"Reply with just OK"}]});
    let data;
    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {method:"POST",headers,body});
      data = await response.json();
    } catch(e) { setStatus({ok:false,msg:"Connection error: " + e.message}); setLoading(false); return; }
    if (data.error) { setStatus({ok:false,msg:"API error: "+data.error.message+" (type: "+data.error.type+")"}); setLoading(false); return; }
    if (!data.content) { setStatus({ok:false,msg:"No content field. Raw: "+JSON.stringify(data).slice(0,120)}); setLoading(false); return; }
    setStatus({ok:true,msg:"Connected! Sonnet: "+VISION_MODEL+" | "+data.content[0]?.text}); setLoading(false);
  };
  return (<div>
    <button onClick={test} disabled={loading} style={{width:"100%",padding:"9px 0",borderRadius:8,background:loading?C.faint:C.blue,border:"none",color:"#000",fontWeight:700,cursor:loading?"default":"pointer",fontSize:13}}>{loading?"Testing…":"Test AI Connection"}</button>
    {status&&<div style={{marginTop:8,padding:"8px 12px",borderRadius:8,background:status.ok?"#0a1a0a":"#1e0a0a",border:`1px solid ${status.ok?"#1a4a1a":"#5a1a1a"}`,fontSize:12,color:status.ok?C.lime:"#ff8080",wordBreak:"break-word"}}>{status.msg}</div>}
  </div>);
}

      </>)}
    </div>

    {/* Standalone API key + test */}
    <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"14px 16px",marginBottom:12}}>
      <div style={{fontSize:14,fontWeight:600,color:C.text,marginBottom:4}}>AI Connection</div>
      <div style={{fontSize:11,color:C.muted,marginBottom:10}}>Vision: <span style={{fontFamily:"monospace",color:C.lime}}>{VISION_MODEL}</span> · Text: <span style={{fontFamily:"monospace",color:C.muted}}>{TEXT_MODEL}</span> · Running {inClaudeAI()?"inside Claude.ai (proxy auth)":"standalone (needs API key)"}</div>
      <TestAPIButton apiKey={profile.apiKey}/>
      <div style={{marginTop:10}}><div style={{fontSize:11,color:C.muted,marginBottom:4}}>API Key (standalone only — leave blank in Claude.ai)</div><Field label="" value={profile.apiKey||""} onChange={v=>setProfile(p=>({...p,apiKey:v}))} placeholder="sk-ant-api03-..." type="password"/></div>
    </div>

    {/* Export / Import */}
    <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"14px 16px"}}>
      <div style={{fontSize:14,fontWeight:600,color:C.text,marginBottom:4}}>Data Backup</div>
      <div style={{fontSize:11,color:C.muted,marginBottom:12,lineHeight:1.6}}>Export saves all your data as a JSON file. Import restores from a backup. Use this to transfer between devices or back up your logs.</div>
      <div style={{display:"flex",gap:8}}>
        <button onClick={exportData} style={{flex:1,padding:"10px 0",borderRadius:8,background:C.lime,border:"none",color:"#000",fontWeight:700,cursor:"pointer",fontSize:13}}>Export Data</button>
        <button onClick={()=>ref.current?.click()} style={{flex:1,padding:"10px 0",borderRadius:8,background:C.blue,border:"none",color:"#000",fontWeight:700,cursor:"pointer",fontSize:13}}>Import Data</button>
        <input ref={ref} type="file" accept=".json" style={{display:"none"}} onChange={importData}/>
      </div>
      {exportMsg&&<div style={{fontSize:12,color:C.lime,marginTop:8,textAlign:"center"}}>{exportMsg}</div>}
      <div style={{fontSize:11,color:C.muted,marginTop:12,lineHeight:1.6}}>Storage: inside Claude.ai this uses Anthropic cloud storage (per account). Outside Claude.ai it uses your browser localStorage (per device). Data does not sync automatically between devices.</div>
    </div>
  </div>);
}

// ── Nav ───────────────────────────────────────────────────────────────────────
// ── Onboarding Screen ─────────────────────────────────────────────────────────
function OnboardingScreen({onDone}){
  const [step,setStep]=useState(0);
  const [name,setName]=useState("");
  const [birthday,setBirthday]=useState("");
  const [heightCm,setHeightCm]=useState("");
  const [sex,setSex]=useState("male");
  const [activityLevel,setActivityLevel]=useState("light");
  const [goal,setGoal]=useState("cut");
  const [targetWeightKg,setTargetWeightKg]=useState("");
  const [goalNote,setGoalNote]=useState("");

  const steps=[
    {title:"Welcome",subtitle:"Let's set up your profile. This takes 1 minute."},
    {title:"About You",subtitle:"Used to calculate your personalized calorie targets."},
    {title:"Activity Level",subtitle:"Your daily life activity — NOT counting workouts."},
    {title:"Your Goal",subtitle:"This determines your calorie targets each day."},
  ];

  const canNext=[
    true,
    name.trim().length>0&&birthday.length>0&&heightCm>0,
    true,
    goal.length>0,
  ];

  const finish=()=>{onDone({name:name.trim()||"User",birthday,heightCm:parseFloat(heightCm)||null,sex,activityLevel,goal,targetWeightKg:parseFloat(targetWeightKg)||null,goalNote:goalNote.trim(),apiKey:""});};

  return(<div style={{background:C.bg,height:"100vh",display:"flex",flexDirection:"column",fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif",maxWidth:520,margin:"0 auto"}}>
    <style>{`*{-webkit-tap-highlight-color:transparent;box-sizing:border-box}input{color-scheme:dark}::-webkit-scrollbar{display:none}`}</style>
    {/* Progress bar */}
    <div style={{height:3,background:C.dim,flexShrink:0}}>
      <div style={{height:"100%",width:`${((step+1)/steps.length)*100}%`,background:C.lime,transition:"width 0.3s"}}/>
    </div>
    <div style={{flex:1,overflowY:"auto",padding:"32px 24px 20px"}}>
      <div style={{fontSize:11,color:C.muted,fontFamily:"monospace",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:8}}>Step {step+1} of {steps.length}</div>
      <div style={{fontSize:28,fontWeight:800,color:C.text,letterSpacing:"-0.03em",marginBottom:6}}>{steps[step].title}</div>
      <div style={{fontSize:14,color:C.muted,marginBottom:32}}>{steps[step].subtitle}</div>

      {step===0&&(<div style={{display:"flex",flexDirection:"column",gap:20}}>
        <div style={{background:C.card,borderRadius:16,padding:"24px 20px",border:`1px solid ${C.border}`}}>
          <div style={{fontSize:40,textAlign:"center",marginBottom:16}}>{"🏋️"}</div>
          <div style={{fontSize:18,fontWeight:700,color:C.text,textAlign:"center",marginBottom:8}}>Kcal Tracker</div>
          <div style={{fontSize:13,color:C.muted,textAlign:"center",lineHeight:1.6}}>Track meals with AI photo analysis, log workouts, monitor your cut or bulk progress, and analyse your body composition over time.</div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {[["📸","AI photo meal logging — just snap your food"],["⚡","Activity tracking with kcal burn adjustment"],["📊","Body composition analysis with progress photos"],["📋","Full history with edit capability"]].map(([ic,txt])=>(<div key={txt} style={{display:"flex",alignItems:"center",gap:12,background:C.card,borderRadius:10,padding:"12px 14px",border:`1px solid ${C.border}`}}><span style={{fontSize:20}}>{ic}</span><span style={{fontSize:13,color:C.text}}>{txt}</span></div>))}
        </div>
      </div>)}

      {step===1&&(<div style={{display:"flex",flexDirection:"column",gap:16}}>
        <Field label="Your name" value={name} onChange={setName} placeholder="e.g. John"/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <Field label="Birthday" value={birthday} onChange={setBirthday} type="date" placeholder="YYYY-MM-DD"/>
          <Field label="Height (cm)" value={heightCm} onChange={setHeightCm} type="number" placeholder="178"/>
        </div>
        <div>
          <div style={{fontSize:10,color:C.muted,fontFamily:"monospace",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:8}}>Sex</div>
          <div style={{display:"flex",gap:8}}>{[["male","Male"],["female","Female"]].map(([val,lbl])=>(<button key={val} onClick={()=>setSex(val)} style={{flex:1,padding:"12px 0",borderRadius:10,border:`1px solid ${sex===val?C.lime:C.border}`,background:sex===val?`${C.lime}18`:C.bg,color:sex===val?C.lime:C.muted,fontWeight:sex===val?700:500,cursor:"pointer",fontSize:14}}>{lbl}</button>))}</div>
        </div>
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"10px 14px"}}><div style={{fontSize:11,color:C.muted}}>Used only to calculate your BMR and personalized kcal targets. Not shared with anyone.</div></div>
      </div>)}

      {step===2&&(<div style={{display:"flex",flexDirection:"column",gap:8}}>
        {ACT_LEVELS.map(({id,label,desc})=>{const active=activityLevel===id;return(<button key={id} onClick={()=>setActivityLevel(id)} style={{padding:"14px 16px",borderRadius:12,border:`1px solid ${active?C.lime:C.border}`,background:active?`${C.lime}12`:C.card,cursor:"pointer",textAlign:"left",display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontSize:14,fontWeight:active?700:500,color:active?C.lime:C.text}}>{label}</div><div style={{fontSize:12,color:C.muted,marginTop:2}}>{desc}</div></div>{active&&<span style={{color:C.lime,fontSize:20}}>✓</span>}</button>);})}
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"10px 14px",marginTop:4}}><div style={{fontSize:11,color:C.muted}}>Gym and run calories are added on top automatically per day type — don't count those here.</div></div>
      </div>)}

      {step===3&&(<div style={{display:"flex",flexDirection:"column",gap:12}}>
        {GOALS.map(({id,label,emoji,desc,col})=>{const active=goal===id;return(<button key={id} onClick={()=>setGoal(id)} style={{padding:"14px 16px",borderRadius:12,border:`1px solid ${active?col:C.border}`,background:active?col+"15":C.card,cursor:"pointer",textAlign:"left",display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontSize:15,fontWeight:active?700:500,color:active?col:C.text}}>{emoji} {label}</div><div style={{fontSize:12,color:C.muted,marginTop:2}}>{desc}</div></div>{active&&<span style={{color:col,fontSize:20}}>✓</span>}</button>);})}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:4}}>
          <Field label="Target weight (kg)" value={targetWeightKg} onChange={setTargetWeightKg} type="number" placeholder="e.g. 65"/>
          <Field label="Goal note" value={goalNote} onChange={setGoalNote} placeholder="e.g. Abs for summer"/>
        </div>
      </div>)}
    </div>

    <div style={{padding:"16px 24px 32px",flexShrink:0,borderTop:`1px solid ${C.border}`}}>
      <div style={{display:"flex",gap:10}}>
        {step>0&&<button onClick={()=>setStep(s=>s-1)} style={{flex:1,padding:"14px 0",borderRadius:12,background:C.card,border:`1px solid ${C.border}`,color:C.text,fontWeight:600,cursor:"pointer",fontSize:15}}>Back</button>}
        <button onClick={()=>{if(step<steps.length-1)setStep(s=>s+1);else finish();}} disabled={!canNext[step]} style={{flex:step>0?2:1,padding:"14px 0",borderRadius:12,background:canNext[step]?C.lime:C.faint,border:"none",color:"#000",fontWeight:800,cursor:canNext[step]?"pointer":"default",fontSize:15}}>
          {step===steps.length-1?"Get Started →":step===0?"Let's Go →":"Next →"}
        </button>
      </div>
    </div>
  </div>);
}

function Nav({tab,setTab}){
  const tabs=[["today","◉","Today"],["activity","⚡","Activity"],["food","🍱","Food"],["analysis","📊","Analysis"],["history","▤","History"],["settings","⚙","Settings"]];
  return(<div style={{height:52,background:C.surf,borderTop:`1px solid ${C.border}`,display:"flex",flexShrink:0}}>{tabs.map(([id,icon,label])=>(<button key={id} onClick={()=>setTab(id)} style={{flex:1,background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:1,padding:"3px 0"}}><span style={{fontSize:13,color:tab===id?C.lime:C.muted,lineHeight:1}}>{icon}</span><span style={{fontSize:7.5,fontFamily:"monospace",textTransform:"uppercase",letterSpacing:"0.03em",color:tab===id?C.lime:C.muted,fontWeight:tab===id?700:400}}>{label}</span></button>))}</div>);
}

// ── App ───────────────────────────────────────────────────────────────────────
function App(){
  const [tab,setTab]=useState("today");const [dayData,setDayData_]=useState(null);const [weights,setWeights_]=useState([]);const [products,setProducts_]=useState([]);const [mealPreps,setMealPreps_]=useState([]);const [profile,setProfile_]=useState(null);const [progressPhotos,setProgressPhotos_]=useState([]);const [ready,setReady]=useState(false);
  const today=TODAY();
  useEffect(()=>{(async()=>{
    const prods=await store.get("fit_products",null)||PRESETS;
    const day=await store.get(`fit_day_${today}`,{date:today,dayType:"rest",meals:[],activities:[],burnedExtra:0,tags:[],goalMode:null});
    if(!day.activities)day.activities=[];if(!day.tags)day.tags=[];
    const wts=await store.get("fit_weights",[]);const preps=await store.get("fit_mealpreps",[]);
    const prof=await store.get("fit_profile",null)||DEFAULT_PROFILE;const photos=await store.get("fit_photos",[]);
    setProducts_(prods);setDayData_(day);setWeights_(wts);setMealPreps_(preps);setProfile_(prof);setProgressPhotos_(photos);setReady(true);
  })();},[]);
  const setDayData=useCallback(upd=>{setDayData_(prev=>{const next=typeof upd==="function"?upd(prev):upd;store.set(`fit_day_${today}`,next);addToIndex(today);return next;});},[today]);
  const setWeights=useCallback(upd=>{setWeights_(p=>{const n=typeof upd==="function"?upd(p):upd;store.set("fit_weights",n);return n;});},[]);
  const setProducts=useCallback(upd=>{setProducts_(p=>{const n=typeof upd==="function"?upd(p):upd;store.set("fit_products",n);return n;});},[]);
  const setMealPreps=useCallback(upd=>{setMealPreps_(p=>{const n=typeof upd==="function"?upd(p):upd;store.set("fit_mealpreps",n);return n;});},[]);
  const setProfile=useCallback(upd=>{setProfile_(p=>{const n=typeof upd==="function"?upd(p):upd;store.set("fit_profile",n);return n;});},[]);
  const setProgressPhotos=useCallback(upd=>{setProgressPhotos_(p=>{const n=typeof upd==="function"?upd(p):upd;store.set("fit_photos",n);return n;});},[]);
  const latestWeight=weights[0]?.weight;
  const needsOnboarding=!profile?.birthday||!profile?.heightCm;
  if(!ready||!profile)return(<div style={{background:C.bg,height:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{color:C.muted,fontFamily:"monospace",fontSize:13}}>Loading…</div></div>);
  if(needsOnboarding)return(<OnboardingScreen onDone={p=>{setProfile(p);setTab("today");}}/>);
  return(<div style={{background:C.bg,height:"100vh",display:"flex",flexDirection:"column",fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif",maxWidth:520,margin:"0 auto"}}>
    <style>{`*{-webkit-tap-highlight-color:transparent;box-sizing:border-box}input,textarea{color-scheme:dark}::-webkit-scrollbar{display:none}button:active{opacity:0.82}`}</style>
    <div style={{flex:1,overflow:"hidden"}}>
      {tab==="today"&&<TodayTab dayData={dayData} setDayData={setDayData} mealPreps={mealPreps} setMealPreps={setMealPreps} products={products} setProducts={setProducts} profile={profile} latestWeight={latestWeight} weights={weights} setWeights={setWeights} onGoToSettings={()=>setTab("settings")}/>}
      {tab==="activity"&&<ActivityTab dayData={dayData} setDayData={setDayData} profile={profile} weights={weights} setWeights={setWeights}/>}
      {tab==="food"&&<FoodTab mealPreps={mealPreps} setMealPreps={setMealPreps} products={products} setProducts={setProducts} profile={profile}/>}
      {tab==="analysis"&&<AnalysisTab weights={weights} profile={profile} setProfile={setProfile} progressPhotos={progressPhotos} setProgressPhotos={setProgressPhotos}/>}
      {tab==="history"&&<HistoryTab weights={weights} products={products} profile={profile}/>}
      {tab==="settings"&&<SettingsTab profile={profile} setProfile={setProfile} weights={weights} setWeights={setWeights}/>}
    </div>
    <Nav tab={tab} setTab={setTab}/>
  </div>);
}


        ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js")
          .then(r => console.log("SW registered"))
          .catch(e => console.log("SW failed:", e));
      });
    }
  </script>
</body>
