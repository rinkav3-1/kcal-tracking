function calcAge(b){if(!b)return null;return Math.floor((Date.now()-new Date(b))/(365.25*24*3600*1000));}
function getTDEE(profile,weight){
  const age=calcAge(profile?.birthday);if(!age||!profile?.heightCm||!weight)return null;
  const bmr=profile.sex==="female"?10*weight+6.25*profile.heightCm-5*age-161:10*weight+6.25*profile.heightCm-5*age+5;
  const lev=ACT_LEVELS.find(l=>l.id===(profile.activityLevel||"light"));
  return Math.round(bmr*(lev?.m||1.35));
}
const DAY_BURN={rest:0,gym:300,run_short:400,run_long:600};
const FB={rest:{kcal:1700,protein:140,carbs:165,fat:55},gym:{kcal:2000,protein:140,carbs:200,fat:60},run_short:{kcal:1950,protein:140,carbs:195,fat:58},run_long:{kcal:2150,protein:140,carbs:220,fat:62}};
function getDT(profile,dayType,weight,extraBurn=0,hasLoggedActivity=false){
  const tdee=getTDEE(profile,weight);if(!tdee)return FB[dayType]||FB.rest;
  // If user logged an actual activity, use that burn instead of the day-type estimate
  const estimatedBurn=hasLoggedActivity?0:(DAY_BURN[dayType]||0);
  const base=tdee+estimatedBurn+extraBurn;
  const adj=GOAL_DEFICIT[profile.goalSubmode||profile.goal||"cut"]??GOAL_DEFICIT[profile.goal||"cut"]??-400;
  const kcal=Math.max(1200,Math.round(base+adj));
  const pPerKg={cut:2.2,bulk:1.8,maintain:2.0}[profile.goal||"cut"];
  const protein=Math.max(130,Math.round((weight||70)*pPerKg));
  const fat=Math.max(40,Math.round(kcal*0.27/9));
  const carbs=Math.max(50,Math.round((kcal-protein*4-fat*9)/4));
  return{kcal,protein,carbs,fat};
}
function getMaint(profile,dayType,weight,extraBurn=0,hasLoggedActivity=false){const tdee=getTDEE(profile,weight);if(!tdee)return null;const estimatedBurn=hasLoggedActivity?0:(DAY_BURN[dayType]||0);return Math.round(tdee+estimatedBurn+extraBurn);}
function weeklyTrend(weights){if(weights.length<4)return null;const r=weights.slice(0,Math.min(weights.length,14));const days=(new Date(r[0].date)-new Date(r[r.length-1].date))/(24*3600*1000);if(days<3)return null;return((r[0].weight-r[r.length-1].weight)/days)*7;}

const store = {
  async get(k, d=null) {
    if (typeof window.storage !== "undefined") {
      try { const r = await window.storage.get(k); return r ? JSON.parse(r.value) : d; } catch {}
    }
    try { const v = localStorage.getItem("fit_"+k); return v ? JSON.parse(v) : d; } catch { return d; }
  },
  async set(k, v) {
    const s = JSON.stringify(v);
    if (typeof window.storage !== "undefined") {
      try { await window.storage.set(k, s); } catch {}
    }
    try { localStorage.setItem("fit_"+k, s); } catch {}
  },
};
async function addToIndex(date){const d=await store.get("fit_dates",[]);if(!d.includes(date)){d.unshift(date);await store.set("fit_dates",d.slice(0,90));}}

// Resize image to max 1024px on longest side before encoding (phone photos are ~4000px)
async function resizeImg(dataUrl, maxPx=1024) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, maxPx / Math.max(img.width, img.height));
      const w = Math.round(img.width * scale), h = Math.round(img.height * scale);
      const c = document.createElement("canvas"); c.width = w; c.height = h;
      c.getContext("2d").drawImage(img, 0, 0, w, h);
      resolve(c.toDataURL("image/jpeg", 0.82));
    };
    img.onerror = () => resolve(dataUrl);
    img.src = dataUrl;
  });
}
async function prepImgs(imgs) {
  const out = [];
  for (const img of imgs.slice(0, 8)) {
    const resized = await resizeImg(img.preview);
    out.push({ data: resized.split(",")[1], mt: "image/jpeg", preview: resized });
  }
  return out;
}
const iBlks = imgs => imgs.map(i=>({type:"image",source:{type:"base64",media_type:i.mt,data:i.data}}));
const pCtx  = ps  => ps.slice(0,30).map(p=>`${p.name}:${p.kcal}kcal P${p.p}g C${p.c}g F${p.f}g`).join("; ");

function extractJSON(text) {
  if (!text) throw new Error("Empty response");
  const clean = text.trim().replace(/^```json\s*/,"").replace(/^```\s*/,"").replace(/\s*```$/,"").trim();
  try { return JSON.parse(clean); } catch {}
  const start = text.indexOf("{"); const end = text.lastIndexOf("}");
  if (start !== -1 && end > start) { try { return JSON.parse(text.slice(start, end+1)); } catch {} }
  const m = text.match(/\{[^{}]*(?:\{[^{}]*\}[^{}]*)*\}/);
  if (m) { try { return JSON.parse(m[0]); } catch {} }
  // AI refused but may have mentioned product name — return partial so UI can show it
  const nameMatch = text.match(/["*]{0,2}([A-Z][\w\s&éàü\-]{3,50})["*]{0,2}/);
  const name = nameMatch ? nameMatch[1].trim() : "";
  // If it's a label read that failed, return empty label response so user can fill manually
  if (text.toLowerCase().includes("cannot read") || text.toLowerCase().includes("can\'t read") || text.toLowerCase().includes("unable to")) {
    return { name: name||"", kcal:0, p:0, c:0, f:0, _unreadable:true };
  }
  throw new Error("Could not parse AI response: " + text.slice(0,120));
}

const inClaudeAI = () => { try { return typeof window.storage !== "undefined"; } catch { return false; } };
// Vision model for scale/label reading, Haiku for simple text
const VISION_MODEL = "claude-sonnet-4-6";
const TEXT_MODEL   = "claude-haiku-4-5-20251001"; // text-only calls
async function callAI(content, apiKey, model, maxTokens) {
  // Claude.ai artifact proxy: no extra headers, just Content-Type + .json() response
  // Standalone with API key: add auth headers
  const headers = { "Content-Type": "application/json" };
  if (apiKey && !inClaudeAI()) {
    headers["x-api-key"] = apiKey;
    headers["anthropic-version"] = "2023-06-01";
    headers["anthropic-dangerous-direct-browser-access"] = "true";
  }
  const body = JSON.stringify({ model: model||AI_MODEL, max_tokens: maxTokens||1500, messages: [{ role: "user", content }] });
  // Use the exact pattern from Claude.ai artifact docs: fetch then .json()
  let data;
  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", { method: "POST", headers, body });
    data = await response.json();
  } catch(e) {
    throw new Error("Connection error: " + e.message);
  }
  if (data.error) throw new Error("API: " + (data.error.message || JSON.stringify(data.error)));
  if (!data.content) throw new Error("No content in response: " + JSON.stringify(data).slice(0,100));
  const text = data.content.find(b => b.type === "text")?.text || "";
  return extractJSON(text);
}

// Food analysis
async function aFood(imgs, ps, mt, desc, apiKey) {
  const compressed = await prepImgs(imgs);
  const ctx = pCtx(ps);
  let prompt;
  if (mt === "canteen") {
    // CRITICAL: For canteen meals we deliberately do NOT pass the user's product labels — those
    // are home pantry items, not what a canteen kitchen used. Use generic ingredient names so
    // the UI's fuzzy-matcher can't latch onto the wrong product (e.g. "duck breast" → "Lidl
    // Breaded Chicken Breast").
    prompt = "You are a nutrition analyst estimating a CANTEEN/CAFETERIA meal. You do NOT know what specific brands or products the kitchen used.\n"
      + "User description: " + (desc || "(none)") + "\n"
      + (compressed.length ? compressed.length + " photo(s) attached.\n" : "")
      + "\nRULES:\n"
      + "1. Use ONLY generic ingredient names — e.g. 'grilled chicken breast', 'cooked white rice', 'cucumber slices'. NEVER guess at brands.\n"
      + "2. Use REALISTIC, CONSERVATIVE per-100g values for canteen/workplace cafeteria food. Do NOT inflate as if it were heavy restaurant or fast-food cooking. Reference per-100g (cooked) values:\n"
      + "   • Cooked white/yellow rice (light butter/turmeric): 130–150 kcal\n"
      + "   • Cooked plain pasta: 130–160 kcal\n"
      + "   • Boiled potatoes: 85–100 kcal · roasted potatoes: 130–160 kcal\n"
      + "   • Buckwheat (cooked): 110–130 kcal\n"
      + "   • Grilled/baked chicken breast (no breading): 160–175 kcal\n"
      + "   • Breaded chicken/pork fillet: 200–230 kcal (the breading already includes fat — do NOT add extra cooking oil)\n"
      + "   • Beef goulash with sauce: 130–170 kcal\n"
      + "   • Vegetable salad (no mayo): 30–60 kcal\n"
      + "   • Korean carrot salad / cabbage salad with light dressing: 60–110 kcal\n"
      + "   • Mayo-based salads: 120–180 kcal\n"
      + "   • Cream/butter sauce: 150–250 kcal · tomato sauce: 60–100 kcal\n"
      + "3. DO NOT add 'cooking oil' as a separate ingredient unless the dish is clearly deep-fried with visible oil pooling. Frying oil for breaded items is already counted in their per-100g value.\n"
      + "4. Estimate weights honestly from the photo. A standard canteen plate of rice is ~150–200g, a meat portion ~120–160g, a side salad ~50–80g.\n"
      + "5. Per-ingredient kcal/protein/carbs/fat MUST be PER-100g standard values for that food. Top-level total kcal/protein/carbs/fat = sum of (per-100g × weight / 100) — i.e. actual meal totals.\n\n"
      + "Reply ONLY with JSON, nothing else:\n"
      + '{"type":"meal","name":"","kcal":0,"protein":0,"carbs":0,"fat":0,"notes":"canteen estimate — macros approximate","newProduct":null,"ingredients":[{"name":"generic component","weightG":0,"kcal":0,"protein":0,"carbs":0,"fat":0,"canteen":true}]}';
  } else {
    prompt = "Precision nutrition analyst with kitchen scale photos.\n"
      + (desc ? "MEAL DESCRIPTION — use this to identify ingredients and match products: " + desc + "\n" : "")
      + "Known products per 100g: " + ctx + "\n\n"
      + "CRITICAL RULES:\n"
      + "1. DESCRIPTION PRIORITY: if the description names a specific product or flavour, match it EXACTLY from known products list.\n"
      + "2. SCALE VISIBLE: the scale number is ABSOLUTE TRUTH. Always use it. Never override it with a packaging weight or an estimate. The scale is zeroed per ingredient.\n"
      + "3. NO SCALE but whole packaged product shown (bar, jar, sachet): use the FULL PACKAGE WEIGHT printed on packaging (e.g. 55g bar = 55g). Read it from the package.\n"
      + "4. Egg shell visible = eggs already cracked in, scale shows their weight.\n"
      + "5. Identify EVERY ingredient across ALL " + compressed.length + " photos. Skip none — small items like syrups, oils, sweeteners count.\n"
      + "6. Per ingredient: kcal/protein/carbs/fat MUST be PER-100g reference values for that ingredient (NOT scaled to weight). If matched to a known product, copy its per-100g values exactly. If not matched, give standard reference per-100g values for that food.\n"
      + "7. weightG = the actual scale/package gram weight.\n"
      + "8. Top-level kcal/protein/carbs/fat = meal totals (already scaled). totalGrams = sum of weightG.\n"
      + "9. Unknown product: if label visible in photo, read it and populate newProduct with brand name and per-100g macros.\n\n"
      + "Reply ONLY with this JSON:\n"
      + '{"type":"meal","name":"","kcal":0,"protein":0,"carbs":0,"fat":0,"totalGrams":0,"notes":"","newProduct":{"name":"","kcal":0,"p":0,"c":0,"f":0},"ingredients":[{"name":"","weightG":0,"kcal":0,"protein":0,"carbs":0,"fat":0}]}';
  }
  return callAI([{ type:"text", text:prompt }, ...iBlks(compressed)], apiKey, VISION_MODEL, 2500);
}

async function aAnalysis(imgs, profile, weight, trend, apiKey) {
  const c = await prepImgs(imgs.slice(0,2));
  const age = calcAge(profile?.birthday) || 27;
  const d = new Date();
  const mo = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][d.getMonth()];
  const dateStr = d.getDate() + " " + mo + " " + d.getFullYear();
  const trendStr = trend ? (Math.abs(trend).toFixed(2) + "kg/week " + (trend<0?"loss":"gain")) : "unknown";
  const prompt = "Fitness coach physique assessment. Analyze this photo.\n\n"

    + "Goal: \"" + (profile?.goalNote||"visible abs") + "\" (mode: " + (profile?.goal||"cut") + ")\n"
    + "Today: " + dateStr + "\n"

    + "2. Parse deadline from goal note (summer=Jun 21, spring=Mar 20, winter=Dec 21)\n"

    + "\"assessment\":\"text\",\"recommendations\":\"text\",\"targetWeight\":" + Math.round((weight||66)-3) + "}";

// ── IngredientConfirmPanel — shared between meal log and meal prep ─────────────
// Stop words: modifiers/brands/adjectives that should NOT be used to match foods on their own.
// Two ingredients sharing only stop words ("frozen blueberries" vs "frozen peas") must NOT match.
const STOP_WORDS = new Set([
  // Generic modifiers
  "frozen","fresh","raw","cooked","natural","organic","light","skinless","sliced","whole","reduced",
  "free","with","and","the","plain","style","mix","ice","cream","sour","mild","spicy","grilled","baked",
  "lean","brand","new","of","for","large","small","medium","extra",
  // Brand names from this user's product set
  "lidl","pilos","kania","kikkoman","nixe","crownfield","insanefits","julian","bakery","barebells",
  "propud","prowhey","hellmann","hellmanns","kedainiu","baresa","pikon","della","sante","freshona",
  "rimi","malsena","fitspo","selected","vemondo","bio",
]);
// Preparation-state words: when ONE name has these but the other doesn't, the foods are
// different products (e.g. "minced chicken" ≠ "breaded chicken"). Strong score penalty.
const PREP_WORDS = new Set([
  "breaded","minced","ground","raw","cooked","fried","grilled","baked","smoked","marinated",
  "pickled","cured","boiled","steamed","roasted","mashed","crispy","crunchy","dried",
]);
// Strip parens, punctuation, accents — produce comparable tokens
const normName = s => (s||"").toLowerCase()
  .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
  .replace(/[(),.!?:;\-+%]/g, " ")
  .replace(/\s+/g, " ").trim();

function IngredientConfirmPanel({ingredients, setIngredients, products, onConfirm, onSkip, confirmLabel="Confirm Weights →", apiKey}) {
  const [expandedIdx, setExpandedIdx] = useState(null);
  const [swapIdx, setSwapIdx] = useState(null);
  const [swapSearch, setSwapSearch] = useState("");
  const [estimatingIdx, setEstimatingIdx] = useState(null);
  const [rowErr, setRowErr] = useState({});

  // Match ingredient name to a product label using SPECIFIC food words, not modifiers.
  // Rules:
  //   1. Exact normalized match wins.
  //   2. If both names contain "specific" words (non-stop), at least one must overlap.
  //   3. Specific word overlaps score 4× more than stop-word overlaps.
  //   4. Final score must clear a meaningful threshold.
  const bestMatch = (ingName) => {
    if (!products?.length) return null;
    const nl = normName(ingName);
    if (!nl) return null;
    // Pass 1: exact normalized match
    for (const p of products) {
      if (normName(p.name) === nl) return p;
    }
    const tokens = s => s.split(" ").filter(w => w.length > 2);
    const ingToks = tokens(nl);
    const ingSpecific = ingToks.filter(w => !STOP_WORDS.has(w));
    const ingPrep = ingToks.filter(w => PREP_WORDS.has(w));
    let best = null, bestScore = 0;
    for (const p of products) {
      const pl = normName(p.name);
      const prodToks = tokens(pl);
      const prodSpecific = prodToks.filter(w => !STOP_WORDS.has(w));
      const prodPrep = prodToks.filter(w => PREP_WORDS.has(w));
      // Critical guard: if both names have specific words, at least one must match.
      // This blocks "frozen blueberries" → "frozen peas" via the shared modifier "frozen".
      if (ingSpecific.length > 0 && prodSpecific.length > 0) {
        const anySpecificOverlap = ingSpecific.some(w =>
          prodSpecific.some(pw => pw === w || (w.length >= 5 && pw.includes(w)) || (pw.length >= 5 && w.includes(pw)))
        );
        if (!anySpecificOverlap) continue;
      }
      let score = 0;
      for (const w of ingSpecific) {
        for (const pw of prodSpecific) {
          if (pw === w) score += w.length * 4;
          else if (w.length >= 5 && pw.includes(w)) score += w.length * 2;
          else if (pw.length >= 5 && w.includes(pw)) score += pw.length * 2;
        }
      }
      // Stop-word overlap = small bonus only
      for (const w of ingToks) {
        if (STOP_WORDS.has(w) && prodToks.includes(w)) score += 1;
      }
      // Preparation mismatch penalty: if one name has prep words like "minced" / "breaded"
      // and the other doesn't share them, the products are likely distinct.
      // Example: "minced breast chicken" should NOT match "Lidl Breaded Chicken Breast".
      if (ingPrep.length > 0 || prodPrep.length > 0) {
        const prepOverlap = ingPrep.filter(w => prodPrep.includes(w)).length;
        if (prepOverlap === 0) score -= 30;
      }
      if (score > bestScore) { bestScore = score; best = p; }
    }
    return bestScore >= 12 ? best : null;
  };

  const macrosFor = (ing) => {
    const g = parseFloat(ing.weightG) || 0;
    // Canteen: never auto-match. Pinned: user-chosen. Otherwise: try fuzzy match.
    const prod = (ing._canteen || ing._pinned) ? null : bestMatch(ing.name);
    let kcal100, p100, c100, f100, matched, source;
    if (prod) {
      kcal100 = prod.kcal; p100 = prod.p; c100 = prod.c; f100 = prod.f;
      matched = prod.name; source = "label";
    } else if (ing._pinned) {
      kcal100 = ing._kcal100 ?? 0; p100 = ing._p100 ?? 0; c100 = ing._c100 ?? 0; f100 = ing._f100 ?? 0;
      matched = ing.name; source = ing._estimated ? "ai" : "label";
    } else {
      // Fall back to AI-supplied per-100g (now requested in prompts)
      kcal100 = ing.kcal || 0; p100 = ing.protein || 0; c100 = ing.carbs || 0; f100 = ing.fat || 0;
      matched = null;
      source = (kcal100 || p100 || c100 || f100) ? "ai-prompt" : "none";
    }
    return {
      kcal: Math.round(kcal100 * g / 100),
      protein: Math.round(p100 * g / 100 * 10) / 10,
      carbs: Math.round(c100 * g / 100 * 10) / 10,
      fat: Math.round(f100 * g / 100 * 10) / 10,
      kcal100, p100, c100, f100,
      matched, source,
    };
  };

  // Reliable click handler — onClick (no preventDefault) avoids iOS click-cancellation issues
  // that affected the previous onPointerDown approach.
  const swapWith = (idx, prod) => {
    setIngredients(p => p.map((ing, i) => i !== idx ? ing : {
      ...ing,
      name: prod.name,
      _pinned: true, _estimated: false,
      _kcal100: prod.kcal, _p100: prod.p, _c100: prod.c, _f100: prod.f,
      kcal: prod.kcal, protein: prod.p, carbs: prod.c, fat: prod.f,
    }));
    setSwapIdx(null); setSwapSearch("");
  };

  const estimateForRow = async (idx) => {
    const ing = ingredients[idx];
    if (!ing?.name) return;
    setEstimatingIdx(idx);
    setRowErr(prev => ({...prev, [idx]: null}));
    try {
      const res = await aEstimateIngredient(ing.name, apiKey);
      setIngredients(p => p.map((x, j) => j !== idx ? x : {
        ...x,
        _pinned: true, _estimated: true,
        _kcal100: res.kcal||0, _p100: res.p||0, _c100: res.c||0, _f100: res.f||0,
        kcal: res.kcal||0, protein: res.p||0, carbs: res.c||0, fat: res.f||0,
      }));
    } catch (e) {
      setRowErr(prev => ({...prev, [idx]: String(e.message||e).slice(0,80)}));
    }
    setEstimatingIdx(null);
  };

  const editPer100 = (idx, key, val) => {
    setIngredients(p => p.map((x, j) => j !== idx ? x : {
      ...x, _pinned: true, _estimated: x._estimated || !x._pinned,
      [`_${key}100`]: parseFloat(val) || 0,
      [key === "kcal" ? "kcal" : key === "p" ? "protein" : key === "c" ? "carbs" : "fat"]: parseFloat(val) || 0,
    }));
  };

  const filteredProds = swapSearch.length > 0
    ? (products || []).filter(p => p.name.toLowerCase().includes(swapSearch.toLowerCase())).slice(0, 12)
    : (products || []).slice(0, 12);

  const totals = ingredients.reduce((acc, ing) => {
    const m = macrosFor(ing);
    return { kcal: acc.kcal + m.kcal, protein: acc.protein + m.protein, carbs: acc.carbs + m.carbs, fat: acc.fat + m.fat };
  }, { kcal: 0, protein: 0, carbs: 0, fat: 0 });

  // Status pill + colour for each row
  const statusFor = (ing, m) => {
    if (ing._canteen) return { color: C.yellow, bg: C.yellow+"15", label: "🍴 canteen estimate", border: C.yellow+"40" };
    if (ing._pinned && ing._estimated) return { color: C.blue, bg: C.blue+"15", label: "🤖 AI-estimated", border: C.blue+"50" };
    if (ing._pinned) return { color: C.lime, bg: C.lime+"18", label: "✓ label pinned: "+ing.name, border: C.lime };
    if (m.matched) return { color: C.lime, bg: C.lime+"12", label: "✓ matched label: "+m.matched, border: C.lime+"50" };
    return { color: C.yellow, bg: C.yellow+"10", label: "⚠ no label match — macros unknown", border: C.yellow+"40" };
  };

  return (
    <div>
      <div style={{fontSize:12,fontWeight:600,color:C.text,marginBottom:3}}>Confirm Ingredients</div>
      <div style={{fontSize:11,color:C.muted,marginBottom:10}}>Tap row for details · ⇄ swap · 🤖 estimate when no label</div>
      <div style={{display:"flex",flexDirection:"column",gap:7,marginBottom:10}}>
        {ingredients.map((ing, i) => {
          const m = macrosFor(ing);
          const isExpanded = expandedIdx === i;
          const isSwapping = swapIdx === i;
          const isEstimating = estimatingIdx === i;
          const st = statusFor(ing, m);
          const noMacros = m.kcal100 === 0 && m.p100 === 0 && m.c100 === 0 && m.f100 === 0;
          return (
            <div key={i} style={{background:C.bg,borderRadius:10,border:`1px solid ${st.border}`,overflow:"hidden"}}>
              {/* Main row */}
              <div style={{display:"flex",alignItems:"center",gap:6,padding:"9px 10px"}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:12,color:st.color,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{ing.name}</div>
                  <div style={{fontSize:9,color:st.color,marginTop:1,opacity:0.85}}>{st.label}</div>
                </div>
                <input type="number" inputMode="decimal" value={ing.weightG} onChange={e => setIngredients(p => p.map((x, j) => j !== i ? x : {...x, weightG: e.target.value}))}
                  style={{width:58,background:C.card,border:`1px solid ${C.lime}`,borderRadius:6,padding:"5px 6px",color:C.lime,fontSize:14,fontFamily:"monospace",fontWeight:700,outline:"none",textAlign:"right"}}/>
                <span style={{fontSize:11,color:C.muted}}>g</span>
                <button onClick={()=>{setSwapIdx(isSwapping?null:i);setSwapSearch("");setExpandedIdx(null);}}
                  style={{padding:"5px 8px",borderRadius:6,background:isSwapping?C.orange+"25":"none",border:`1px solid ${isSwapping?C.orange:C.border}`,color:isSwapping?C.orange:C.muted,fontSize:11,cursor:"pointer",flexShrink:0,lineHeight:1}}>⇄</button>
                <button onClick={()=>{setExpandedIdx(isExpanded?null:i);setSwapIdx(null);}}
                  style={{padding:"5px 8px",borderRadius:6,background:isExpanded?C.blue+"25":"none",border:`1px solid ${isExpanded?C.blue:C.border}`,color:isExpanded?C.blue:C.muted,fontSize:11,cursor:"pointer",flexShrink:0,lineHeight:1}}>{isExpanded?"▾":"▸"}</button>
              </div>
              {/* Quick actions when no match */}
              {!isSwapping && !isExpanded && noMacros && !ing._canteen && (
                <div style={{padding:"7px 10px 9px",borderTop:`1px solid ${C.border}`,display:"flex",gap:6,flexWrap:"wrap"}}>
                  <button onClick={()=>estimateForRow(i)} disabled={isEstimating} style={{flex:1,padding:"7px 8px",borderRadius:6,background:isEstimating?C.faint:C.blue+"22",border:`1px solid ${C.blue}50`,color:C.blue,fontWeight:600,cursor:isEstimating?"default":"pointer",fontSize:11}}>{isEstimating?"🤖 estimating…":"🤖 AI estimate"}</button>
                  <button onClick={()=>{setSwapIdx(i);setSwapSearch("");}} style={{flex:1,padding:"7px 8px",borderRadius:6,background:C.orange+"15",border:`1px solid ${C.orange}40`,color:C.orange,fontWeight:600,cursor:"pointer",fontSize:11}}>⇄ Pick label</button>
                  <button onClick={()=>{setExpandedIdx(i);}} style={{flex:1,padding:"7px 8px",borderRadius:6,background:"none",border:`1px solid ${C.border}`,color:C.muted,fontWeight:500,cursor:"pointer",fontSize:11}}>✎ Manual</button>
                </div>
              )}
              {rowErr[i] && <div style={{padding:"6px 10px",fontSize:11,color:"#ff8080"}}>⚠ {rowErr[i]}</div>}
              {/* Expanded macro view + manual edit */}
              {isExpanded && (
                <div style={{padding:"9px 12px 11px",borderTop:`1px solid ${C.border}`}}>
                  <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:8}}>
                    <span style={{fontFamily:"monospace",fontSize:11,color:C.lime}}>{m.kcal} kcal</span>
                    <span style={{fontFamily:"monospace",fontSize:11,color:C.blue}}>{m.protein}g P</span>
                    <span style={{fontFamily:"monospace",fontSize:11,color:C.orange}}>{m.carbs}g C</span>
                    <span style={{fontFamily:"monospace",fontSize:11,color:C.purple}}>{m.fat}g F</span>
                    <span style={{fontSize:10,color:C.muted,marginLeft:"auto"}}>{parseFloat(ing.weightG)||0}g eaten</span>
                  </div>
                  {/* Action buttons row — always visible in expanded view */}
                  <div style={{display:"flex",gap:6,marginBottom:9,flexWrap:"wrap"}}>
                    <button onClick={()=>estimateForRow(i)} disabled={isEstimating} style={{flex:1,padding:"6px 8px",borderRadius:6,background:isEstimating?C.faint:C.blue+"22",border:`1px solid ${C.blue}50`,color:C.blue,fontWeight:600,cursor:isEstimating?"default":"pointer",fontSize:10,whiteSpace:"nowrap"}}>{isEstimating?"🤖 estimating…":"🤖 AI estimate"}</button>
                    <button onClick={()=>{setSwapIdx(i);setSwapSearch("");setExpandedIdx(null);}} style={{flex:1,padding:"6px 8px",borderRadius:6,background:C.orange+"15",border:`1px solid ${C.orange}40`,color:C.orange,fontWeight:600,cursor:"pointer",fontSize:10,whiteSpace:"nowrap"}}>⇄ Swap label</button>
                    {(ing._pinned||m.matched) && <button onClick={()=>setIngredients(p=>p.map((x,j)=>j!==i?x:{...x,_pinned:false,_estimated:false,_kcal100:undefined,_p100:undefined,_c100:undefined,_f100:undefined,kcal:0,protein:0,carbs:0,fat:0}))} style={{flex:1,padding:"6px 8px",borderRadius:6,background:"none",border:`1px solid ${C.border}`,color:C.muted,fontWeight:500,cursor:"pointer",fontSize:10,whiteSpace:"nowrap"}}>🔄 Reset</button>}
                  </div>
                  <div style={{fontSize:10,color:C.muted,fontFamily:"monospace",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:5}}>per-100g (edit to override)</div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:5}}>
                    {[["kcal","kcal",C.lime],["p","P",C.blue],["c","C",C.orange],["f","F",C.purple]].map(([k,lbl,col])=>(
                      <div key={k}>
                        <div style={{fontSize:9,color:C.muted,fontFamily:"monospace",marginBottom:2}}>{lbl}/100g</div>
                        <input type="number" inputMode="decimal" value={k==="kcal"?m.kcal100:k==="p"?m.p100:k==="c"?m.c100:m.f100}
                          onChange={e=>editPer100(i,k,e.target.value)}
                          style={{width:"100%",boxSizing:"border-box",background:C.card,border:`1px solid ${C.border}`,padding:"5px 6px",borderRadius:5,color:col,fontSize:12,fontFamily:"monospace",outline:"none"}}/>
                      </div>
                    ))}
                  </div>
                </div>
              )}
              {/* Swap panel */}
              {isSwapping && (
                <div style={{padding:"8px 10px 10px",borderTop:`1px solid ${C.border}`}}>
                  <div style={{fontSize:10,color:C.orange,fontFamily:"monospace",textTransform:"uppercase",marginBottom:6}}>Pick a label:</div>
                  <input value={swapSearch} onChange={e => setSwapSearch(e.target.value)} placeholder="Search your product labels…"
                    style={{width:"100%",boxSizing:"border-box",background:C.bg,border:`1px solid ${C.border}`,borderRadius:6,padding:"7px 10px",color:C.text,fontSize:13,outline:"none",marginBottom:7}}
                    autoFocus/>
                  <div style={{display:"flex",flexDirection:"column",gap:5,maxHeight:240,overflowY:"auto"}}>
                    {filteredProds.map(prod => (
                      <button key={prod.name} type="button" onClick={() => swapWith(i, prod)}
                        style={{padding:"9px 12px",borderRadius:8,background:C.card,border:`1px solid ${C.border}`,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",userSelect:"none",textAlign:"left"}}>
                        <span style={{fontSize:13,color:C.text,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{prod.name}</span>
                        <span style={{fontFamily:"monospace",fontSize:11,color:C.muted,flexShrink:0,marginLeft:10}}>{prod.kcal}k {prod.p}P</span>
                      </button>
                    ))}
                    {filteredProds.length === 0 && <div style={{fontSize:11,color:C.muted,padding:"4px 0"}}>No labels match. Add it via Food tab → Product Labels, or use 🤖 AI estimate below.</div>}
                  </div>
                  <div style={{display:"flex",gap:6,marginTop:8}}>
                    <button onClick={()=>{setSwapIdx(null);setSwapSearch("");estimateForRow(i);}} disabled={isEstimating} style={{flex:1,padding:"8px",borderRadius:6,background:C.blue+"22",border:`1px solid ${C.blue}50`,color:C.blue,fontWeight:600,cursor:"pointer",fontSize:11}}>🤖 Use AI estimate instead</button>
                    <button onClick={()=>{setSwapIdx(null);setSwapSearch("");}} style={{padding:"8px 12px",borderRadius:6,background:"none",border:`1px solid ${C.border}`,color:C.muted,cursor:"pointer",fontSize:11}}>Cancel</button>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
      {/* Totals bar */}
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 12px",marginBottom:8,display:"flex",gap:12,alignItems:"center"}}>
        <span style={{fontSize:10,color:C.muted,flexShrink:0}}>Total</span>
        <Chip val={Math.round(totals.kcal)} label="kcal" color={C.lime}/>
        <Chip val={Math.round(totals.protein)} label="P" color={C.blue}/>
        <Chip val={Math.round(totals.carbs)} label="C" color={C.orange}/>
        <Chip val={Math.round(totals.fat)} label="F" color={C.purple}/>
      </div>
      <div style={{display:"flex",gap:8}}>
        <button onClick={onSkip} style={{flex:1,padding:"10px 0",borderRadius:10,background:C.card,border:`1px solid ${C.border}`,color:C.text,fontWeight:600,cursor:"pointer",fontSize:13}}>Skip</button>
        <button onClick={() => onConfirm(ingredients, totals)} style={{flex:2,padding:"10px 0",borderRadius:10,background:C.lime,border:"none",color:"#000",fontWeight:700,cursor:"pointer",fontSize:14}}>{confirmLabel}</button>
      </div>
    </div>
  );
}

function AddIngredientRow({onAdd,products}) {
  const [name,setName]=useState("");const [wg,setWg]=useState("");const [open,setOpen]=useState(false);
  const [suggestions,setSuggestions]=useState([]);
  const onNameChange=v=>{
    setName(v);
    if(v.length>1&&products){
      const q=v.toLowerCase();
      setSuggestions(products.filter(p=>p.name.toLowerCase().includes(q)).slice(0,4));
    } else { setSuggestions([]); }
  };
  const pick=prod=>{setName(prod.name);setSuggestions([]);};
  const submit=()=>{
    if(!name.trim()||!wg)return;
    // Find matching product for accurate macros
    const q=name.toLowerCase();
    const prod=products?.find(p=>p.name.toLowerCase().includes(q)||q.includes(p.name.toLowerCase().split(' ')[0]));
    onAdd({name:name.trim(),weightG:wg,kcal:prod?prod.kcal:0,protein:prod?prod.p:0,carbs:prod?prod.c:0,fat:prod?prod.f:0,_fromProduct:!!prod});
    setName("");setWg("");setOpen(false);setSuggestions([]);
  };
  if(!open) return(<button onClick={()=>setOpen(true)} style={{padding:"8px 0",borderRadius:8,background:"none",border:`1px dashed ${C.border}`,color:C.muted,cursor:"pointer",fontSize:12,width:"100%"}}>+ Add missing ingredient</button>);
  return(<div style={{background:C.faint,borderRadius:8,padding:"10px 12px"}}>
    <div style={{display:"flex",gap:8,alignItems:"center"}}>
      <div style={{flex:2,position:"relative"}}>
        <input value={name} onChange={e=>onNameChange(e.target.value)} placeholder="Ingredient name" style={{width:"100%",boxSizing:"border-box",background:C.bg,border:`1px solid ${C.border}`,borderRadius:6,padding:"7px 9px",color:C.text,fontSize:13,outline:"none"}}/>
        {suggestions.length>0&&<div style={{position:"absolute",top:"100%",left:0,right:0,background:C.surf,border:`1px solid ${C.border}`,borderRadius:6,zIndex:10,marginTop:2}}>
          {suggestions.map((p,i)=><button key={i} onClick={()=>pick(p)} style={{display:"block",width:"100%",padding:"7px 10px",background:"none",border:"none",color:C.text,fontSize:12,cursor:"pointer",textAlign:"left",borderBottom:i<suggestions.length-1?`1px solid ${C.border}`:"none"}}>{p.name}</button>)}
        </div>}
      </div>
      <input type="number" inputMode="decimal" value={wg} onChange={e=>setWg(e.target.value)} placeholder="g" style={{width:60,background:C.bg,border:`1px solid ${C.border}`,borderRadius:6,padding:"7px 9px",color:C.text,fontSize:13,fontFamily:"monospace",outline:"none"}}/>
      <span style={{fontSize:12,color:C.muted,flexShrink:0}}>g</span>
    </div>
    {name&&products?.find(p=>p.name.toLowerCase().includes(name.toLowerCase()))&&<div style={{fontSize:11,color:C.lime,marginTop:4}}>✓ Matched product — exact macros will be used</div>}
    {name&&!products?.find(p=>p.name.toLowerCase().includes(name.toLowerCase()))&&name.length>2&&<div style={{fontSize:11,color:C.muted,marginTop:4}}>No match in products — AI estimate will be used</div>}
    <div style={{display:"flex",gap:8,marginTop:8}}>
      <button onClick={()=>{setOpen(false);setSuggestions([]);}} style={{flex:1,padding:"7px 0",borderRadius:6,background:"none",border:`1px solid ${C.border}`,color:C.muted,cursor:"pointer",fontSize:12}}>Cancel</button>
      <button onClick={submit} disabled={!name.trim()||!wg} style={{flex:2,padding:"7px 0",borderRadius:6,background:name.trim()&&wg?C.lime:C.faint,border:"none",color:"#000",fontWeight:700,cursor:name.trim()&&wg?"pointer":"default",fontSize:12}}>Add Ingredient</button>
    </div>
  </div>);
}


// ── PrepEatPanel — gram-based, multi-prep combine ─────────────────────────────
function PrepEatPanel({activePreps,setMealPreps,mealType,onAdd,onClose}) {
  const [selected,setSelected]=useState({}); // {prepId: gramsString}
  const [extras,setExtras]=useState({name:"",kcal:"",protein:"",carbs:"",fat:""});
  const [showExtras,setShowExtras]=useState(false);
  const [logErr,setLogErr]=useState("");

  // A prep is "broken" if it has no macros and no per-100 macros saved — usually means
  // it was created before the macro fields were filled in. Let the user know rather
  // than silently logging zeros.
  const isPrepBroken = prep => {
    const hasTotals = (prep.totalKcal||0) > 0 || (prep.totalProtein||0) > 0;
    const hasPer100 = (prep.per100Kcal||0) > 0 || (prep.per100Protein||0) > 0;
    return !hasTotals && !hasPer100;
  };

  const toggle=id=>{
    setLogErr("");
    setSelected(p=>{
      if(p[id]!==undefined){const n={...p};delete n[id];return n;}
      const prep=activePreps.find(x=>x.id===id);
      const suggested=prep.suggestedG||prep.portionWeightG||Math.round((prep.remainingWeightG||prep.totalWeightG||0)/Math.max(prep.targetPortions||prep.portions||1,1));
      return{...p,[id]:String(suggested)};
    });
  };

  const macrosForPrep=(prep,grams)=>{
    const g=parseFloat(grams)||0;
    if(prep.per100Kcal&&prep.totalWeightG){
      const scale=g/100;
      return{kcal:Math.round(prep.per100Kcal*scale),protein:Math.round(prep.per100Protein*scale*10)/10,carbs:Math.round(prep.per100Carbs*scale*10)/10,fat:Math.round(prep.per100Fat*scale*10)/10};
    }
    // fallback: linear scale from total
    const total=prep.totalWeightG||0;
    if(!total)return{kcal:prep.perKcal||0,protein:prep.perProtein||0,carbs:prep.perCarbs||0,fat:prep.perFat||0};
    const ratio=g/total;
    return{kcal:Math.round((prep.totalKcal||0)*ratio),protein:Math.round((prep.totalProtein||0)*ratio*10)/10,carbs:Math.round((prep.totalCarbs||0)*ratio*10)/10,fat:Math.round((prep.totalFat||0)*ratio*10)/10};
  };

  const totals=Object.entries(selected).reduce((acc,[id,g])=>{
    const prep=activePreps.find(x=>x.id===id);if(!prep)return acc;
    const m=macrosForPrep(prep,g);
    return{kcal:acc.kcal+m.kcal,protein:acc.protein+m.protein,carbs:acc.carbs+m.carbs,fat:acc.fat+m.fat};
  },{kcal:0,protein:0,carbs:0,fat:0});
  const grandTotals={kcal:totals.kcal+(parseFloat(extras.kcal)||0),protein:totals.protein+(parseFloat(extras.protein)||0),carbs:totals.carbs+(parseFloat(extras.carbs)||0),fat:totals.fat+(parseFloat(extras.fat)||0)};

  const confirm=()=>{
    if(!Object.keys(selected).length)return;
    // Refuse to log a meal where everything is zero — that's the bug from screenshot 2
    if(grandTotals.kcal === 0 && grandTotals.protein === 0 && grandTotals.carbs === 0 && grandTotals.fat === 0){
      setLogErr("All macros are zero. The selected prep(s) appear to have no macro data — edit them in the Food tab first.");
      return;
    }
    const names=Object.entries(selected).map(([id,g])=>{
      const prep=activePreps.find(x=>x.id===id);
      const safeName = (prep?.name && prep.name.trim()) || "Meal Prep";
      return prep?`${safeName} ${g}g`:"";
    }).filter(Boolean);
    if(extras.name)names.push(extras.name);
    const label=names.join(" + ") || "Meal Prep";
    onAdd({id:Date.now(),name:label,kcal:Math.round(grandTotals.kcal),protein:Math.round(grandTotals.protein),carbs:Math.round(grandTotals.carbs),fat:Math.round(grandTotals.fat),mealType,notes:"Meal prep",time:new Date().toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"})});
    // Update remaining grams for each prep
    setMealPreps(ps=>ps.map(p=>{
      if(selected[p.id]===undefined)return p;
      const used=parseFloat(selected[p.id])||0;
      const remG=Math.max(0,(p.remainingWeightG??p.totalWeightG??0)-used);
      const totalG=p.totalWeightG||0;
      const newRemPct=totalG>0?remG/totalG:0;
      const newRem=Math.max(0,Math.round((p.targetPortions||p.portions||1)*newRemPct));
      return{...p,remainingWeightG:remG,remaining:newRem};
    }));
    onClose();
  };

  if(!activePreps.length)return(<div style={{textAlign:"center",padding:"28px 0",color:C.muted}}><div style={{fontSize:30}}>{"🍱"}</div><div style={{fontSize:13,marginTop:8}}>No active preps. Create one in the Food tab.</div></div>);

  return(<div>
    <div style={{fontSize:11,color:C.muted,marginBottom:8}}>Tap to select, enter grams eaten. Multi-select to combine.</div>
    <div style={{display:"flex",flexDirection:"column",gap:7,marginBottom:10}}>
      {activePreps.map(prep=>{
        const isSelected=selected[prep.id]!==undefined;
        const broken = isPrepBroken(prep);
        const remG=prep.remainingWeightG??prep.totalWeightG??0;
        const totalG=prep.totalWeightG||0;
        const pct=totalG>0?Math.round(remG/totalG*100):0;
        const suggested=prep.suggestedG||prep.portionWeightG||Math.round(remG/Math.max(prep.targetPortions||prep.portions||1,1));
        const preview=isSelected?macrosForPrep(prep,selected[prep.id]):{};
        const safeName = (prep.name && prep.name.trim()) || "(unnamed prep)";
        const borderCol = broken ? C.red+"55" : (isSelected?C.lime:C.border);
        return(<div key={prep.id} style={{background:C.card,border:`1px solid ${borderCol}`,borderRadius:12,padding:"10px 14px",cursor:broken?"default":"pointer",opacity:broken?0.7:1}} onClick={()=>{if(!broken)toggle(prep.id);}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:13,fontWeight:600,color:isSelected?C.lime:C.text}}>{safeName}</div>
              <div style={{fontSize:10,color:C.muted,marginTop:2}}>{Math.round(remG)}g left of {totalG}g · ~{pct}% · suggest {suggested}g/portion</div>

              {isSelected&&<span style={{fontSize:12,color:"#000",fontWeight:800}}>✓</span>}
            </div>}
          </div>
          {isSelected&&!broken&&(<div style={{marginTop:8}} onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <input type="number" inputMode="decimal" value={selected[prep.id]} onChange={e=>setSelected(p=>({...p,[prep.id]:e.target.value}))} placeholder={String(suggested)} style={{width:70,background:C.bg,border:`1px solid ${C.lime}`,borderRadius:6,padding:"6px 8px",color:C.lime,fontSize:14,fontFamily:"monospace",outline:"none",fontWeight:700}}/>
              <span style={{fontSize:12,color:C.muted}}>g</span>
              {parseFloat(selected[prep.id])>0&&<div style={{display:"flex",gap:8}}><Chip val={preview.kcal||0} label="kcal" color={C.lime}/><Chip val={preview.protein||0} label="P" color={C.blue}/></div>}
            </div>
          </div>)}
        </div>);
      })}
    </div>

    {/* Extras section */}
    <button onClick={()=>setShowExtras(p=>!p)} style={{width:"100%",padding:"8px 0",borderRadius:8,background:"none",border:`1px dashed ${C.border}`,color:C.muted,cursor:"pointer",fontSize:12,marginBottom:8}}>
      {showExtras?"▲ Hide extras":"+ Add extras (greens, sauce, etc.)"}
    </button>
    {showExtras&&<div style={{background:C.faint,borderRadius:10,padding:"10px 12px",marginBottom:10}}>
      <Field label="Name (e.g. Green beans)" value={extras.name} onChange={v=>setExtras(p=>({...p,name:v}))} placeholder="Side dish"/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:8}}>
        <Field label="Kcal" value={extras.kcal} onChange={v=>setExtras(p=>({...p,kcal:v}))} type="number" placeholder="0"/>
        <Field label="Protein g" value={extras.protein} onChange={v=>setExtras(p=>({...p,protein:v}))} type="number" placeholder="0"/>
        <Field label="Carbs g" value={extras.carbs} onChange={v=>setExtras(p=>({...p,carbs:v}))} type="number" placeholder="0"/>
        <Field label="Fat g" value={extras.fat} onChange={v=>setExtras(p=>({...p,fat:v}))} type="number" placeholder="0"/>
      </div>
    </div>}

    {/* Total preview */}
    {Object.keys(selected).length>0&&<div style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:10,padding:"10px 14px",marginBottom:10}}>
      <div style={{fontSize:10,color:C.muted,fontFamily:"monospace",textTransform:"uppercase",marginBottom:5}}>Total</div>
      <div style={{display:"flex",gap:10}}><Chip val={Math.round(grandTotals.kcal)} label="kcal" color={C.lime}/><Chip val={Math.round(grandTotals.protein)} label="P" color={C.blue}/><Chip val={Math.round(grandTotals.carbs)} label="C" color={C.orange}/><Chip val={Math.round(grandTotals.fat)} label="F" color={C.purple}/></div>
    </div>}

    {logErr&&<div style={{background:"#1e0a0a",border:"1px solid #5a1a1a",borderRadius:8,padding:"8px 12px",fontSize:12,color:"#ff8080",marginBottom:10,wordBreak:"break-word"}}>{logErr}</div>}

    <div style={{display:"flex",gap:8}}>
      <button onClick={onClose} style={{flex:1,padding:"11px 0",borderRadius:10,background:C.card,border:`1px solid ${C.border}`,color:C.text,fontWeight:600,cursor:"pointer"}}>Cancel</button>
      <button onClick={confirm} disabled={!Object.keys(selected).length} style={{flex:2,padding:"11px 0",borderRadius:10,background:Object.keys(selected).length?C.lime:C.faint,color:"#000",fontWeight:700,border:"none",cursor:Object.keys(selected).length?"pointer":"default",fontSize:15}}>Log {Object.keys(selected).length>1?"Combined Prep":"Prep"}</button>
    </div>
  </div>);
}

function AddMealSheet({products,mealPreps,setMealPreps,onAdd,onClose,apiKey}){
  const [mode,setMode]=useState("photos");const [mt,setMt]=useState("home");const [desc,setDesc]=useState("");const [imgs,setImgs]=useState([]);const [result,setResult]=useState(null);const [loading,setLoading]=useState(false);const [err,setErr]=useState(null);const [form,setForm]=useState({name:"",kcal:"",protein:"",carbs:"",fat:"",notes:""});const [mealType,setMealType]=useState("breakfast");const [gramsEaten,setGramsEaten]=useState("");const [per100,setPer100]=useState(null);const [aiNotes,setAiNotes]=useState("");
  const activePreps=mealPreps.filter(p=>p.remaining>0);

  const [ingConfirmed,setIngConfirmed]=useState(false); // when true, ingredients exist but user has moved past panel
  const analyze=async()=>{setLoading(true);setErr(null);setIngConfirmed(false);try{
    const res=await aFood(imgs,products,mt,desc,apiKey);

      const resKcal=Math.round(res.kcal)||0,resProt=Math.round(res.protein)||0,resCarbs=Math.round(res.carbs)||0,resFat=Math.round(res.fat)||0;
      // Store per-100g values for gram-based recalc

        const tg=res.totalGrams||res.estimatedGrams;
        setPer100({kcal:Math.round(resKcal/tg*100),p:Math.round(resProt/tg*100*10)/10,c:Math.round(resCarbs/tg*100*10)/10,f:Math.round(resFat/tg*100*10)/10,grams:tg});
        setGramsEaten(String(tg));

        // Estimate total grams from ingredients if available
        const ingTotal=res.ingredients?.reduce((s,i)=>s+(parseFloat(i.weightG)||0),0)||0;
        if(ingTotal>0){setPer100({kcal:Math.round(resKcal/ingTotal*100),p:Math.round(resProt/ingTotal*100*10)/10,c:Math.round(resCarbs/ingTotal*100*10)/10,f:Math.round(resFat/ingTotal*100*10)/10,grams:ingTotal});setGramsEaten(String(Math.round(ingTotal)));}
      }
      setForm({name:res.name||"",kcal:String(resKcal),protein:String(resProt),carbs:String(resCarbs),fat:String(resFat),notes:res.notes||""});setAiNotes(res.notes||"");
      // If AI returned ingredient breakdown, show confirmation step.

  // Recalculate totals from confirmed ingredient list
  const recalcFromIngredients=()=>{
    if(!ingredients)return;
    const totals=ingredients.reduce((acc,ing)=>{
      const grams=parseFloat(ing.weightG)||0;
      const scale=grams/100;
      // Look up product by fuzzy name match
      const nameLower=ing.name.toLowerCase();
      const prod=products.find(p=>{
        const pl=p.name.toLowerCase();
        // Bidirectional fuzzy match — ingredient name words in product, or product words in ingredient
        const ingWords=nameLower.split(/\s+/).filter(w=>w.length>2);
        const prodWords=pl.split(/\s+/).filter(w=>w.length>2);
        // Score: count how many meaningful words overlap
        const overlap=ingWords.filter(w=>pl.includes(w)).length + prodWords.filter(w=>nameLower.includes(w)).length;
        return overlap >= 2 || (ingWords.length===1 && pl.includes(ingWords[0])) || pl===nameLower;
      });
      // Use product macros if found (accurate), else fall back to AI estimates scaled by weight
      const kcal   = prod ? prod.kcal*scale : (ing.kcal||0)*scale;
      const protein= prod ? prod.p*scale    : (ing.protein||0)*scale;
      const carbs  = prod ? prod.c*scale    : (ing.carbs||0)*scale;
      const fat    = prod ? prod.f*scale    : (ing.fat||0)*scale;
      return{kcal:acc.kcal+kcal,protein:acc.protein+protein,carbs:acc.carbs+carbs,fat:acc.fat+fat};
    },{kcal:0,protein:0,carbs:0,fat:0});
    // Build confirmed ingredient summary for notes
    const summary = ingredients.filter(i=>parseFloat(i.weightG)>0)
      .map(i=>i.name+" "+i.weightG+"g").join(", ");
    setForm(f=>({...f,
      kcal:String(Math.round(totals.kcal)),
      protein:String(Math.round(totals.protein)),
      carbs:String(Math.round(totals.carbs)),

      notes:summary
    }));
    setIngredients(null);

  const confirm=()=>{if(result?.type==="activity"){onAdd({type:"activity_from_meal",burnedKcal:result.burnedKcal});return;}const{newProduct,...meal}={id:Date.now(),mealType,name:form.name||"Meal",kcal:parseFloat(form.kcal)||0,protein:parseFloat(form.protein)||0,carbs:parseFloat(form.carbs)||0,fat:parseFloat(form.fat)||0,notes:form.notes,time:new Date().toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"}),source:mt==="canteen"?"canteen":"home",ingredients:ingredients&&ingConfirmed?ingredients:undefined,newProduct:result?.newProduct||null};onAdd({...meal,newProduct});};
  const usePrep=prep=>{const n=prep.portions-prep.remaining+1;onAdd({id:Date.now(),name:prep.name,kcal:prep.perKcal,protein:prep.perProtein,carbs:prep.perCarbs,fat:prep.perFat,notes:`Prep ${n}/${prep.portions}`,time:new Date().toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"})});setMealPreps(ps=>ps.map(p=>p.id===prep.id?{...p,remaining:p.remaining-1}:p));};

    <div style={{marginBottom:14}}>
      <div style={{fontSize:10,color:C.muted,fontFamily:"monospace",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:6}}>Meal type</div>
      <div style={{display:"flex",gap:5}}>{[["🌅","breakfast","Breakfast"],["☀️","lunch","Lunch"],["🌙","dinner","Dinner"],["🍎","snack","Snack"],["🥤","drink","Drink"]].map(([ic,id,lbl])=>{const active=mealType===id;return(<button key={id} onClick={()=>setMealType(id)} style={{flex:1,padding:"6px 2px",borderRadius:8,border:`1px solid ${active?C.lime:C.border}`,background:active?`${C.lime}18`:C.bg,color:active?C.lime:C.muted,fontWeight:active?700:400,cursor:"pointer",fontSize:9,lineHeight:1.5,textAlign:"center"}}><div style={{fontSize:13}}>{ic}</div><div>{lbl}</div></button>);})}</div>
    </div>
    {mode==="photos"&&!result&&(<>
      <div style={{display:"flex",gap:6,marginBottom:10}}>{[["Home cooked","home"],["Canteen / Restaurant","canteen"]].map(([lbl,t])=>(<button key={t} onClick={()=>setMt(t)} style={{flex:1,padding:"8px 6px",borderRadius:8,border:`1px solid ${mt===t?C.lime:C.border}`,background:mt===t?`${C.lime}12`:C.bg,color:mt===t?C.lime:C.muted,fontWeight:mt===t?600:400,cursor:"pointer",fontSize:11}}>{lbl}</button>))}</div>
      <div style={{marginBottom:10}}>
        <div style={{fontSize:10,color:C.muted,fontFamily:"monospace",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:4}}>{mt==="canteen"?"Describe the meal (required)":"Meal name / description (optional)"}</div>
        <textarea value={desc} onChange={e=>setDesc(e.target.value)} rows={2} placeholder={mt==="canteen"?"e.g. Grilled chicken ~150g, buckwheat, salad, butter sauce on side":"e.g. Overnight oats with banana and peanut butter"} style={{width:"100%",boxSizing:"border-box",background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:"9px 11px",color:C.text,fontSize:13,outline:"none",resize:"none",fontFamily:"inherit"}}/>
      </div>
      <ImgZone imgs={imgs} setImgs={setImgs} maxPhotos={10}/>
      {err&&<div style={{background:"#1e0a0a",border:"1px solid #5a1a1a",borderRadius:8,padding:"8px 12px",fontSize:12,color:"#ff8080",margin:"8px 0",wordBreak:"break-word"}}>{err}</div>}
      <button onClick={analyze} disabled={!canAnalyze} style={{width:"100%",padding:"12px 0",borderRadius:10,background:canAnalyze?C.lime:C.faint,color:"#000",fontWeight:700,border:"none",cursor:canAnalyze?"pointer":"default",fontSize:15,marginTop:10}}>
        {loading?"Analyzing…":mt==="canteen"?"Estimate Meal":`Analyze ${imgs.length} photo${imgs.length!==1?"s":""}`}
      </button>
      {mt==="canteen"&&!desc.trim()&&<div style={{fontSize:11,color:C.muted,marginTop:5,textAlign:"center"}}>Add a description first</div>}
    </>)}
    {mode==="manual"&&!result&&(<><MacroFields form={form} setForm={setForm}/><div style={{display:"flex",gap:8,marginTop:14}}><button onClick={onClose} style={{flex:1,padding:"11px 0",borderRadius:10,background:C.card,border:`1px solid ${C.border}`,color:C.text,fontWeight:600,cursor:"pointer"}}>Cancel</button><button onClick={confirm} style={{flex:2,padding:"11px 0",borderRadius:10,background:C.lime,color:"#000",fontWeight:700,border:"none",cursor:"pointer",fontSize:15}}>Add to Log</button></div></>)}

    </>)}

function AddActSheet({onAdd,onClose,apiKey}){
  const [type,setType]=useState("run");const [dist,setDist]=useState("");const [dur,setDur]=useState("");const [kcal,setKcal]=useState("");const [imgs,setImgs]=useState([]);const [loading,setLoading]=useState(false);const [err,setErr]=useState(null);
  const est=type==="run"?Math.round((parseFloat(dist)||0)*62):type==="walk"?Math.round((parseFloat(dist)||0)*48):0;const finalKcal=parseFloat(kcal)||est;
  const scan=async()=>{if(!imgs.length)return;setLoading(true);setErr(null);try{const res=await aAct(imgs,apiKey);if(res.kcal)setKcal(String(Math.round(res.kcal)));if(res.distanceKm)setDist(String(res.distanceKm));if(res.durationMin)setDur(String(res.durationMin));if(res.actType&&["run","walk","gym"].includes(res.actType))setType(res.actType);}catch(e){setErr(String(e.message||e));}setLoading(false);};
  const confirm=()=>{if(!finalKcal)return;const labels={gym:"Gym Session",run:`Run${dist?` ${parseFloat(dist)}km`:""}`,walk:`Walk${dist?` ${parseFloat(dist)}km`:""}`};onAdd({id:Date.now(),type,label:labels[type],kcal:finalKcal,distanceKm:parseFloat(dist)||null,durationMin:parseFloat(dur)||null,time:new Date().toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"})});};
  return(<Sheet onClose={onClose} title="Log Activity"><div style={{display:"flex",gap:6,marginBottom:16}}>{[["🏋️ Gym","gym"],["🏃 Run","run"],["🚶 Walk","walk"]].map(([lbl,t])=>(<button key={t} onClick={()=>setType(t)} style={{flex:1,padding:"9px 4px",borderRadius:10,border:`1px solid ${type===t?C.lime:C.border}`,background:type===t?`${C.lime}20`:C.card,color:type===t?C.lime:C.muted,fontWeight:type===t?700:500,cursor:"pointer",fontSize:12}}>{lbl}</button>))}</div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:9,marginBottom:6}}>{(type==="run"||type==="walk")&&<Field label="Distance km" value={dist} onChange={setDist} type="number" placeholder="10"/>}<Field label="Duration min" value={dur} onChange={setDur} type="number" placeholder="45"/><Field label="Active kcal" value={kcal} onChange={setKcal} type="number" placeholder={est?String(est):"0"}/></div><div style={{fontSize:10,color:C.muted,marginBottom:12,lineHeight:1.4}}>💡 Enter <b>active calories</b> (the burn above your resting baseline). On Garmin/Apple/Strava use "Active Calories", not "Total Calories" — your daily TDEE already counts the resting burn.</div>{est>0&&!parseFloat(kcal)&&<div style={{fontSize:11,color:C.muted,fontFamily:"monospace",marginBottom:10}}>Auto-estimated: ~{est} kcal</div>}<div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"12px 14px",marginBottom:12}}><div style={{fontSize:11,color:C.muted,marginBottom:8}}>Or scan Strava / Apple Fitness / Garmin screenshot</div><ImgZone imgs={imgs} setImgs={setImgs} compact/>{imgs.length>0&&<button onClick={scan} disabled={loading} style={{width:"100%",padding:"9px 0",borderRadius:8,background:loading?C.faint:C.orange,color:"#000",fontWeight:700,border:"none",cursor:loading?"default":"pointer",fontSize:13,marginTop:8}}>{loading?"Scanning…":"Read App Screenshot"}</button>}</div>{err&&<div style={{background:"#1e0a0a",border:"1px solid #5a1a1a",borderRadius:8,padding:"8px 12px",fontSize:12,color:"#ff8080",marginBottom:10,wordBreak:"break-word"}}>{err}</div>}{finalKcal>0&&<div style={{background:"#140e03",border:"1px solid #2e1e07",borderRadius:10,padding:"10px 14px",marginBottom:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:12,color:C.muted}}>Adds to daily target</span><span style={{fontFamily:"monospace",fontSize:18,fontWeight:800,color:C.orange}}>+{finalKcal} kcal</span></div>}<div style={{display:"flex",gap:8}}><button onClick={onClose} style={{flex:1,padding:"11px 0",borderRadius:10,background:C.card,border:`1px solid ${C.border}`,color:C.text,fontWeight:600,cursor:"pointer"}}>Cancel</button><button onClick={confirm} disabled={!finalKcal} style={{flex:2,padding:"11px 0",borderRadius:10,background:finalKcal?C.lime:C.faint,color:"#000",fontWeight:700,border:"none",cursor:finalKcal?"pointer":"default",fontSize:15}}>Log Activity</button></div></Sheet>);
}

function CreatePrepSheet({products,onSave,onClose,apiKey}){
  const [name,setName]=useState("");const [imgs,setImgs]=useState([]);const [desc,setDesc]=useState("");const [result,setResult]=useState(null);const [wt,setWt]=useState("");const [portions,setPortions]=useState("4");const [form,setForm]=useState({kcal:"",protein:"",carbs:"",fat:""});const [loading,setLoading]=useState(false);const [err,setErr]=useState(null);const [prepIngredients,setPrepIngredients]=useState(null);const [ingConfirmed,setIngConfirmed]=useState(false);const [saveErr,setSaveErr]=useState("");
  const f=k=>v=>setForm(p=>({...p,[k]:v}));
  const analyze=async()=>{setLoading(true);setErr(null);setSaveErr("");setIngConfirmed(false);try{
    const res=await aPrep(imgs,products,desc,apiKey);
    // Detect empty AI response (totals all zero AND no ingredients) — surface a helpful error
    const totalsAllZero=!res.totalKcal&&!res.totalProtein&&!res.totalCarbs&&!res.totalFat;
    const noIngredients=!res.ingredients||res.ingredients.length===0;
    if(totalsAllZero&&noIngredients){
      setErr("AI couldn't read these photos. Try clearer scale shots, fewer photos, or use 'Enter manually' below.");
      setLoading(false);
      return;
    }
    setResult(res);
    setForm({kcal:String(Math.round(res.totalKcal)||""),protein:String(Math.round(res.totalProtein)||""),carbs:String(Math.round(res.totalCarbs)||""),fat:String(Math.round(res.totalFat)||"")});
    if(res.estimatedWeightG&&!wt)setWt(String(res.estimatedWeightG));
    // Show ingredient confirmation if we got a breakdown
    if(res.ingredients&&res.ingredients.length>0){
      setPrepIngredients(res.ingredients.map(ing=>({...ing,weightG:String(ing.weightG||0)})));
    }
  }catch(e){setErr(String(e.message||e));}setLoading(false);};
  const portN=parseInt(portions)||1;
  const save=()=>{
    const k=parseFloat(form.kcal)||0,p=parseFloat(form.protein)||0,carb=parseFloat(form.carbs)||0,fat=parseFloat(form.fat)||0;
    const n=parseInt(portions)||1,w=parseFloat(wt)||0;
    // Block silent zero-saves (the bug from the screenshot)
    if(k===0&&p===0&&carb===0&&fat===0){
      setSaveErr("All macros are zero — analyze photos or fill in totals first.");
      return;
    }
    if(w<=0){
      setSaveErr("Total weight must be greater than 0.");
      return;
    }
    setSaveErr("");
    // Always have a non-empty name — fall back to first words of description, then "Meal Prep"
    const finalName = (name && name.trim()) || (desc.trim().split(/[,.]/)[0].trim().slice(0,40)) || "Meal Prep";
    const per100k=Math.round(k/w*100),per100p=Math.round(p/w*100*10)/10,per100c=Math.round(carb/w*100*10)/10,per100f=Math.round(fat/w*100*10)/10;
    const suggestedG=Math.round(w/n);
    onSave({id:Date.now(),name:finalName,totalKcal:k,totalProtein:p,totalCarbs:carb,totalFat:fat,
      totalWeightG:w,remainingWeightG:w,targetPortions:n,
      per100Kcal:per100k,per100Protein:per100p,per100Carbs:per100c,per100Fat:per100f,
      suggestedG,
      // legacy fields for backward compat
      portions:n,remaining:n,portionWeightG:suggestedG,
      perKcal:Math.round(k/n),perProtein:Math.round(p/n),perCarbs:Math.round(carb/n),perFat:Math.round(fat/n),
      createdDate:TODAY(),notes:result?.notes||""});
  };
  const totalsZero=!parseFloat(form.kcal)&&!parseFloat(form.protein)&&!parseFloat(form.carbs)&&!parseFloat(form.fat);
  // Render decision: panel vs form
  const showPanel = prepIngredients && !ingConfirmed;
  const showForm  = result && (ingConfirmed || !prepIngredients);
  return(<Sheet onClose={onClose} title="Create Meal Prep">
    <Field label="Prep Name" value={name} onChange={setName} placeholder="e.g. Chicken rice bowl"/>
    <div style={{marginTop:12}}><ImgZone imgs={imgs} setImgs={setImgs} maxPhotos={10}/></div>
    <div style={{marginTop:10}}><div style={{fontSize:10,color:C.muted,fontFamily:"monospace",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:4}}>Description (optional but helps)</div><textarea value={desc} onChange={e=>setDesc(e.target.value)} rows={2} placeholder="e.g. 500g chicken, 200g dry rice, peas, soy sauce" style={{width:"100%",boxSizing:"border-box",background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:"9px 11px",color:C.text,fontSize:13,outline:"none",resize:"none",fontFamily:"inherit"}}/></div>

    {/* Prominent analyze button — appears as soon as photos are uploaded, before result */}
    {imgs.length>0&&!result&&!showPanel&&<button onClick={analyze} disabled={loading} style={{width:"100%",padding:"14px 0",borderRadius:10,background:loading?C.faint:C.lime,color:"#000",fontWeight:800,border:"none",cursor:loading?"default":"pointer",fontSize:15,marginTop:12,boxShadow:loading?"none":`0 0 12px ${C.lime}40`}}>{loading?"Analyzing — this can take 20-30s with many photos…":`🔍 Analyze ${imgs.length} photo${imgs.length!==1?"s":""}`}</button>}
    {err&&<div style={{background:"#1e0a0a",border:"1px solid #5a1a1a",borderRadius:8,padding:"8px 12px",fontSize:12,color:"#ff8080",margin:"10px 0",wordBreak:"break-word"}}>{err}</div>}

    {showPanel?(<div style={{marginTop:12}}><IngredientConfirmPanel ingredients={prepIngredients} setIngredients={setPrepIngredients} products={products} apiKey={apiKey} confirmLabel="Use These Weights →" onSkip={()=>setIngConfirmed(true)} onConfirm={(ings,totals)=>{const totalG=ings.reduce((s,i)=>s+(parseFloat(i.weightG)||0),0);setForm({kcal:String(Math.round(totals.kcal)),protein:String(Math.round(totals.protein)),carbs:String(Math.round(totals.carbs)),fat:String(Math.round(totals.fat))});if(!wt&&totalG>0)setWt(String(Math.round(totalG)));setIngConfirmed(true);}}/></div>):!result?(<>
      {/* Manual fallback — clearly demoted vs analyze */}
      {imgs.length===0&&<div style={{textAlign:"center",fontSize:11,color:C.muted,marginTop:14,marginBottom:6}}>Upload photos for AI analysis, or skip to manual entry below</div>}
      <button onClick={()=>setResult(true)} style={{width:"100%",padding:"9px 0",borderRadius:10,background:"none",border:`1px solid ${C.border}`,color:C.muted,fontWeight:500,cursor:"pointer",fontSize:13,marginTop:imgs.length?6:0}}>{imgs.length?"Skip AI · Enter manually":"Enter macros manually"}</button>
    </>):(<>
      {prepIngredients&&<button onClick={()=>setIngConfirmed(false)} style={{width:"100%",padding:"8px 0",borderRadius:8,background:"none",border:`1px solid ${C.border}`,color:C.muted,fontWeight:500,cursor:"pointer",fontSize:12,marginTop:12,marginBottom:0}}>← Adjust ingredients</button>}
      <div style={{marginTop:12,display:"grid",gridTemplateColumns:"1fr 1fr",gap:9}}>
        <Field label="Total Kcal" value={form.kcal} onChange={f("kcal")} type="number" placeholder="0"/>
        <Field label="Total Protein g" value={form.protein} onChange={f("protein")} type="number" placeholder="0"/>
        <Field label="Total Carbs g" value={form.carbs} onChange={f("carbs")} type="number" placeholder="0"/>
        <Field label="Total Fat g" value={form.fat} onChange={f("fat")} type="number" placeholder="0"/>
        <Field label="Final cooked weight g" value={wt} onChange={setWt} type="number" placeholder="1200"/>
        <Field label="Portions" value={portions} onChange={setPortions} type="number" placeholder="4"/>
      </div>
      <div style={{fontSize:10,color:C.muted,marginTop:5,lineHeight:1.5}}>💡 If you cooked the meal, weigh the finished container and put that here — it determines portion size. Macros are calculated from ingredient weights and don't change.</div>
      {totalsZero&&<div style={{background:"#1a1400",border:`1px solid ${C.yellow}40`,borderRadius:8,padding:"8px 12px",marginTop:8,fontSize:12,color:C.yellow}}>⚠ Macros are all zero — fill them in or re-analyze before saving.</div>}
      {parseFloat(form.kcal)>0&&portN>0&&(<div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"10px 14px",marginTop:10}}><div style={{fontSize:11,color:C.muted,marginBottom:4}}>Per portion ({portN})</div><div style={{display:"flex",gap:10}}><Chip val={(parseFloat(form.kcal)||0)/portN} label="kcal" color={C.lime}/><Chip val={(parseFloat(form.protein)||0)/portN} label="P" color={C.blue}/><Chip val={(parseFloat(form.carbs)||0)/portN} label="C" color={C.orange}/><Chip val={(parseFloat(form.fat)||0)/portN} label="F" color={C.purple}/></div></div>)}
      {saveErr&&<div style={{background:"#1e0a0a",border:"1px solid #5a1a1a",borderRadius:8,padding:"8px 12px",fontSize:12,color:"#ff8080",marginTop:10,wordBreak:"break-word"}}>{saveErr}</div>}
      <div style={{display:"flex",gap:8,marginTop:14}}>
        <button onClick={onClose} style={{flex:1,padding:"11px 0",borderRadius:10,background:C.card,border:`1px solid ${C.border}`,color:C.text,fontWeight:600,cursor:"pointer"}}>Cancel</button>
        <button onClick={save} style={{flex:2,padding:"11px 0",borderRadius:10,background:totalsZero?C.faint:C.lime,color:"#000",fontWeight:700,border:"none",cursor:"pointer",fontSize:15}}>Save Prep</button>
      </div>
    </>)}
  </Sheet>);
}
// ── Today Tab ─────────────────────────────────────────────────────────────────
function TodayTab({dayData,setDayData,mealPreps,setMealPreps,products,setProducts,profile,latestWeight,weights,setWeights,onGoToSettings}){
  const [modal,setModal]=useState(null);const [wInput,setWInput]=useState("");
  const [expandedMealId,setExpandedMealId]=useState(null);
  const [editingMealId,setEditingMealId]=useState(null);
  const extraBurn=(dayData.activities||[]).reduce((s,a)=>s+a.kcal,0)+(dayData.burnedExtra||0);
  const hasLoggedAct=(dayData.activities||[]).length>0||(dayData.burnedExtra||0)>0;
  const dt=getDT(profile,dayData.dayType,latestWeight,extraBurn,hasLoggedAct);
  const maint=getMaint(profile,dayData.dayType,latestWeight,extraBurn,hasLoggedAct);
  const tot=dayData.meals.reduce((a,m)=>({kcal:a.kcal+m.kcal,protein:a.protein+m.protein,carbs:a.carbs+m.carbs,fat:a.fat+m.fat}),{kcal:0,protein:0,carbs:0,fat:0});
  const remKcal=dt.kcal-tot.kcal,remProt=dt.protein-tot.protein;
  const profileOK=profile.birthday&&profile.heightCm;const gc=gCol(profile.goal);
  const activePreps=mealPreps.filter(p=>p.remaining>0);
  const todayW=weights.find(w=>w.date===TODAY());const prevW=weights.find(w=>w.date!==TODAY());
  const wDelta=todayW&&prevW?todayW.weight-prevW.weight:null;
  const logWeight=()=>{const w=parseFloat(wInput);if(!w)return;const e={date:TODAY(),weight:w};setWeights(p=>[e,...p.filter(x=>x.date!==e.date)].sort((a,b)=>b.date.localeCompare(a.date)));setWInput("");};
  const handleAdd=entry=>{
    if(entry.type==="activity_from_meal"){setDayData(p=>({...p,burnedExtra:(p.burnedExtra||0)+entry.burnedKcal,goalMode:profile.goal}));}
    else{const{newProduct,...meal}=entry;setDayData(p=>({...p,meals:[...p.meals,meal],goalMode:profile.goal}));if(newProduct)setProducts(p=>p.find(x=>x.name.toLowerCase()===newProduct.name.toLowerCase())?p:[...p,newProduct]);}
    setModal(null);
  };
  const updateMeal=updated=>{setDayData(p=>({...p,meals:p.meals.map(m=>m.id===updated.id?updated:m)}));setEditingMealId(null);};
  const deleteMeal=id=>{setDayData(p=>({...p,meals:p.meals.filter(m=>m.id!==id)}));setEditingMealId(null);setExpandedMealId(null);};
  const toggleTag=tagId=>{const tags=dayData.tags||[];setDayData(p=>({...p,tags:tags.includes(tagId)?tags.filter(t=>t!==tagId):[...tags,tagId]}));};
  return(<div style={{height:"100%",position:"relative"}}>
    <div style={{height:"100%",overflowY:"auto",padding:"0 16px 90px"}}>
      <div style={{padding:"18px 0 8px"}}>
        <div style={{fontSize:11,color:C.muted,fontFamily:"monospace",letterSpacing:"0.06em"}}>{new Date().toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long"}).toUpperCase()}</div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontSize:26,fontWeight:800,color:C.text,letterSpacing:"-0.03em",lineHeight:1.15}}>Today</div>
          {profile.goal&&<div style={{fontSize:11,background:`${gc}20`,color:gc,padding:"4px 10px",borderRadius:20,fontWeight:700}}>{profile.goal==="cut"?"Cut":profile.goal==="bulk"?"Bulk":"Maintain"}</div>}
        </div>
      </div>

      {/* Weight card */}
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"10px 14px",marginBottom:10}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
          <span style={{fontSize:11,color:C.muted,fontFamily:"monospace",textTransform:"uppercase",letterSpacing:"0.08em"}}>Weight today</span>
          {todayW&&<div style={{display:"flex",alignItems:"baseline",gap:6}}><span style={{fontFamily:"monospace",fontSize:18,fontWeight:800,color:C.lime}}>{todayW.weight.toFixed(2)}</span><span style={{fontSize:12,color:C.muted}}>kg</span>{wDelta!==null&&<span style={{fontFamily:"monospace",fontSize:12,color:wDelta<0?C.lime:C.red}}>{wDelta<0?"↓":"↑"}{Math.abs(wDelta).toFixed(2)}</span>}</div>}
        </div>
        <div style={{display:"flex",gap:8}}>
          <input type="number" inputMode="decimal" step="0.05" placeholder={todayW?"Update weight…":"e.g. 75.00"} value={wInput} onChange={e=>setWInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&logWeight()} style={{flex:1,background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:"7px 10px",color:C.text,fontSize:14,fontFamily:"monospace",outline:"none"}}/>
          <button onClick={logWeight} style={{padding:"7px 14px",borderRadius:8,background:C.lime,border:"none",color:"#000",fontWeight:700,cursor:"pointer",fontSize:12}}>Log</button>
        </div>

      {/* Maintenance */}
      {maint&&<div style={{marginBottom:10,background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"7px 14px",display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:11,color:C.muted}}>Maintenance {maint} kcal</span><span style={{fontFamily:"monospace",fontSize:12,color:C.text,fontWeight:600}}>Target: {dt.kcal}{profile.goal==="cut"?` (−${maint-dt.kcal})`:profile.goal==="bulk"?` (+${dt.kcal-maint})`:""}</span></div>}

          <span style={{fontSize:13,color:C.text}}>{a.type==="gym"?"🏋️":a.type==="run"?"🏃":"🚶"} {a.label}{a.durationMin?` · ${a.durationMin}min`:""}</span>
          <span style={{fontFamily:"monospace",fontSize:13,fontWeight:700,color:C.orange}}>+{Math.round(a.kcal)} kcal</span>

        <div style={{display:"flex",gap:5}}>{Object.entries(DAY_TYPES).map(([key,val])=>{const active=dayData.dayType===key;const tKcal=getDT(profile,key,latestWeight,0,false).kcal;return(<button key={key} onClick={()=>setDayData(p=>({...p,dayType:key,goalMode:profile.goal}))} style={{flex:1,padding:"7px 3px",borderRadius:10,border:`1px solid ${active?C.lime:C.border}`,background:active?`${C.lime}18`:C.card,color:active?C.lime:C.muted,fontWeight:active?700:400,cursor:"pointer",fontSize:9.5,lineHeight:1.4,textAlign:"center"}}><div style={{fontSize:14}}>{val.icon}</div><div>{val.label}</div><div style={{fontFamily:"monospace",fontSize:10,opacity:0.75,marginTop:1}}>{tKcal}</div></button>);})}</div>
      </div>

      <div style={{background:C.card,borderRadius:14,padding:"16px 8px 14px",border:`1px solid ${C.border}`,marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-around"}}><Ring value={tot.kcal} max={dt.kcal} color={C.lime} label="kcal"/><Ring value={tot.protein} max={dt.protein} color={C.blue} label="protein"/><Ring value={tot.carbs} max={dt.carbs} color={C.orange} label="carbs"/><Ring value={tot.fat} max={dt.fat} color={C.purple} label="fat"/></div>

        </div>

          <polyline points={wSpark.map((d,i)=>wpx(i)+","+wpy(d.weight)).join(" ")} fill="none" stroke={C.lime+"50"} strokeWidth={1.5} strokeLinecap="round" strokeLinejoin="round"/>
          <polyline points={wSpark.map((d,i)=>wpx(i)+","+wpy(d.weight)).join(" ")} fill="none" stroke={C.lime} strokeWidth={2} strokeLinecap="round" strokeLinejoin="round"/>
          {wSpark.map((d,i)=>{const isFirst=i===0;const isLast=i===wSpark.length-1;const showLabel=isFirst||isLast||i%Math.ceil(wSpark.length/4)===0;return(<g key={i}><circle cx={wpx(i)} cy={wpy(d.weight)} r={isLast?4:2.5} fill={isLast?C.lime:C.lime+"80"}/>{showLabel&&<text x={wpx(i)} y={wpy(d.weight)-7} textAnchor={i===0?"start":i===wSpark.length-1?"end":"middle"} fontSize={8} fill={C.muted} fontFamily="monospace">{d.weight.toFixed(1)}</text>}</g>);})}
        </svg>)}
        {wSpark.length<4&&wSpark.length>0&&<div style={{fontSize:11,color:C.muted,marginBottom:6,fontFamily:"monospace"}}>Log {4-wSpark.length} more weight{4-wSpark.length!==1?"s":""} to see trend graph</div>}
        <div style={{display:"flex",gap:8,marginBottom:8}}>

            :<div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:11,color:C.muted}}>{new Date(e.date+"T12:00:00").toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short"})}</span><div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontFamily:"monospace",fontSize:12,fontWeight:700,color:i===0?C.lime:C.text}}>{e.weight.toFixed(2)} kg</span><button onClick={()=>{setEditWIdx(i);setEditWVal(String(e.weight));}} style={{background:"none",border:`1px solid ${C.border}`,color:C.muted,fontSize:10,cursor:"pointer",padding:"2px 5px",borderRadius:4}}>✎</button><button onClick={()=>setWeights(p=>p.filter((_,j)=>j!==i))} style={{background:"none",border:"none",color:C.faint,fontSize:13,cursor:"pointer",padding:"0 2px",lineHeight:1}}>×</button></div></div>
          }</div>))}
        </div>
      </div>
      <div style={{display:"flex",gap:6,marginBottom:14}}>{[["Today","today"],["Past Activity","history"]].map(([lbl,v])=>(<button key={v} onClick={()=>setView(v)} style={{flex:1,padding:"9px 0",borderRadius:10,border:`1px solid ${view===v?C.orange:C.border}`,background:view===v?`${C.orange}20`:C.card,color:view===v?C.orange:C.muted,fontWeight:view===v?700:500,cursor:"pointer",fontSize:12}}>{lbl}</button>))}</div>
      {view==="today"&&(<>{totalBurned>0&&<div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:"14px 18px",marginBottom:14}}><div style={{fontSize:11,color:C.muted,fontFamily:"monospace",textTransform:"uppercase",letterSpacing:"0.08em"}}>Total burn bonus today</div><div style={{fontSize:40,fontWeight:900,fontFamily:"monospace",color:C.orange,lineHeight:1.1,marginTop:4}}>+{Math.round(totalBurned)}</div><div style={{fontSize:12,color:C.muted,marginTop:2}}>kcal added to daily target</div></div>}<div style={{display:"flex",flexDirection:"column",gap:7}}>{activities.map(a=><div key={a.id} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"10px 14px",display:"flex",alignItems:"center",gap:10}}><span style={{fontSize:22}}>{a.type==="gym"?"🏋️":a.type==="run"?"🏃":"🚶"}</span><div style={{flex:1,minWidth:0}}><div style={{display:"flex",alignItems:"baseline",gap:8}}><span style={{fontSize:14,fontWeight:600,color:C.text}}>{a.label}</span><span style={{fontSize:10,color:C.muted,fontFamily:"monospace"}}>{a.time}</span></div><div style={{display:"flex",gap:10,marginTop:4}}><span style={{fontFamily:"monospace",fontSize:12,color:C.orange}}>{Math.round(a.kcal)} kcal</span>{a.distanceKm&&<span style={{fontFamily:"monospace",fontSize:11,color:C.muted}}>{a.distanceKm}km</span>}{a.durationMin&&<span style={{fontFamily:"monospace",fontSize:11,color:C.muted}}>{a.durationMin}min</span>}</div></div><button onClick={()=>delActivity(a.id)} style={{background:"none",border:"none",cursor:"pointer",color:C.faint,fontSize:18,padding:"0 2px",lineHeight:1}}>×</button></div>)}{!activities.length&&<div style={{textAlign:"center",padding:"36px 0",color:C.muted}}><div style={{fontSize:32}}>{"🏋️"}</div><div style={{fontSize:14,marginTop:8}}>No activities today.</div></div>}</div></>)}

// ── Food Tab (Preps + Products) ───────────────────────────────────────────────
function FoodTab({mealPreps,setMealPreps,products,setProducts,profile}){
  const [modal,setModal]=useState(false);const [editPrep,setEditPrep]=useState(null);const [showProd,setShowProd]=useState(false);
  const [search,setSearch]=useState("");const [showAdd,setShowAdd]=useState(false);const [editPIdx,setEditPIdx]=useState(null);
  const [pForm,setPForm]=useState({name:"",kcal:"",p:"",c:"",f:""});const [scanImgs,setScanImgs]=useState([]);const [scanning,setScanning]=useState(false);const [scanErr,setScanErr]=useState(null);
  const pff=k=>v=>setPForm(p=>({...p,[k]:v}));
  const active=mealPreps.filter(p=>p.remaining>0);const done=mealPreps.filter(p=>p.remaining===0);
  const addProduct=()=>{const np={name:pForm.name,kcal:parseFloat(pForm.kcal)||0,p:parseFloat(pForm.p)||0,c:parseFloat(pForm.c)||0,f:parseFloat(pForm.f)||0};if(!np.name)return;setProducts(prev=>prev.find(x=>x.name.toLowerCase()===np.name.toLowerCase())?prev:[...prev,np]);setPForm({name:"",kcal:"",p:"",c:"",f:""});setScanImgs([]);setShowAdd(false);setEditPIdx(null);};
  const startEditP=i=>{const p=products[i];setPForm({name:p.name,kcal:String(p.kcal),p:String(p.p),c:String(p.c),f:String(p.f)});setEditPIdx(i);setShowAdd(false);};
  const saveEditP=()=>{const np={name:pForm.name,kcal:parseFloat(pForm.kcal)||0,p:parseFloat(pForm.p)||0,c:parseFloat(pForm.c)||0,f:parseFloat(pForm.f)||0};if(!np.name)return;setProducts(prev=>prev.map((x,i)=>i===editPIdx?np:x));setPForm({name:"",kcal:"",p:"",c:"",f:""});setEditPIdx(null);};
  const scanLabelFn=async()=>{setScanning(true);setScanErr(null);try{const res=await aLabel(scanImgs,profile.apiKey);if(res._unreadable){setPForm(f=>({...f,name:res.name||f.name}));setScanErr("Label was not clear enough to read — product name detected: \""+res.name+"\". Please enter macros manually.");}else{setPForm({name:res.name||"",kcal:String(Math.round(res.kcal)||""),p:String(res.p||""),c:String(res.c||""),f:String(res.f||"")});}}catch(e){setScanErr(String(e.message||e));}setScanning(false);};
  const filtered=products.filter(p=>p.name.toLowerCase().includes(search.toLowerCase()));
  const PrepCard=({prep})=>{
    const totalG = prep.totalWeightG || 0;
    const remG = Math.round(prep.remainingWeightG ?? totalG);
    const eatenG = Math.round(totalG - remG);
    const suggestedG = prep.suggestedG || prep.portionWeightG || 0;
    const remPortionsApprox = suggestedG > 0 ? (remG / suggestedG).toFixed(1) : "?";
    const isActive = remG > 0;
    return(<div style={{background:C.card,border:`1px solid ${isActive?C.border:C.dim}`,borderRadius:12,padding:"12px 14px",opacity:isActive?1:0.55}}>

        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4,flexWrap:"wrap"}}>
            <span style={{fontSize:14,fontWeight:600,color:C.text}}>{prep.name}</span>
            {isActive
              ? <span style={{fontSize:10,background:`${C.lime}20`,color:C.lime,padding:"2px 8px",borderRadius:20,fontFamily:"monospace",fontWeight:700}}>{remG}g left</span>
              : <span style={{fontSize:10,background:C.dim,color:C.muted,padding:"2px 8px",borderRadius:20,fontFamily:"monospace"}}>done</span>}
          </div>
          <div style={{fontSize:11,color:C.muted,marginBottom:6}}>

            {totalG}g total · {new Date(prep.createdDate+"T12:00:00").toLocaleDateString("en-GB",{day:"numeric",month:"short"})}
          </div>
          <div style={{display:"flex",gap:10,marginBottom:6,flexWrap:"wrap"}}>
            <Chip val={prep.perKcal} label="kcal" color={C.lime}/>
            <Chip val={prep.perProtein} label="P" color={C.blue}/>
            <Chip val={prep.perCarbs} label="C" color={C.orange}/>
            <Chip val={prep.perFat} label="F" color={C.purple}/>
            <span style={{fontSize:10,color:C.muted,marginLeft:"auto",fontFamily:"monospace"}}>per {suggestedG||0}g portion</span>
          </div>
          <div style={{height:4,background:C.dim,borderRadius:2}}>
