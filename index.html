function calcAge(b){if(!b)return null;return Math.floor((Date.now()-new Date(b))/(365.25*24*3600*1000));}
function getTDEE(profile,weight){
  const age=calcAge(profile?.birthday);if(!age||!profile?.heightCm||!weight)return null;
  const bmr=profile.sex==="female"?10*weight+6.25*profile.heightCm-5*age-161:10*weight+6.25*profile.heightCm-5*age+5;
  const lev=ACT_LEVELS.find(l=>l.id===(profile.activityLevel||"light"));
  return Math.round(bmr*(lev?.m||1.35));
}
const DAY_BURN={rest:0,gym:300,run_short:400,run_long:600};
const FB={rest:{kcal:1700,protein:140,carbs:165,fat:55},gym:{kcal:2000,protein:140,carbs:200,fat:60},run_short:{kcal:1950,protein:140,carbs:195,fat:58},run_long:{kcal:2150,protein:140,carbs:220,fat:62}};
// Compute the total "above-TDEE" burn for the day. TDEE already includes baseline activity
// from the activity multiplier; DAY_BURN is the additional burn expected for a planned hard
// day. If the user logged actual activities, we use the larger of (logged, planned) so that
// partial-logging doesn't silently lower the target. extraBurn here is the total kcal of
// logged activities + any manual burnedExtra.
function dayBurnTotal(dayType, extraBurn, hasLoggedActivity) {
  const planned = DAY_BURN[dayType] || 0;
  const logged = extraBurn || 0;
  if (!hasLoggedActivity) return planned;
  // User logged activity — use the larger of what they actually burned vs the planned baseline.
  // This prevents the bug where logging only a short walk on a "Gym day" drops the target.
  return Math.max(logged, planned);
}
// Daily-steps TDEE adjustment.
// Your activity level already ASSUMES a baseline step count (the multiplier bakes it in).
// When you log actual steps, we adjust TDEE by the difference from that baseline — up if you
// walked more than assumed, down if less. This can be positive OR negative.
//
// Energy per step ≈ bodyweight(kg) × 0.0005 kcal (so ~0.033 kcal/step at 66kg, the standard
// ~0.04 kcal/step figure for a ~70-80kg person). The previous formula multiplied by weight
// AND used 0.04, overcounting ~65×.
const STEP_BASELINE = { sedentary:2000, desk:3000, light:6500, moderate:10000, active:12000 };
function stepsKcal(steps, activityLevel, weight) {
  // 0 / blank steps = "not logged" → no adjustment, use the activity multiplier as-is.
  if (!steps || steps <= 0) return 0;
  const baseline = STEP_BASELINE[activityLevel] ?? 6500;
  const delta = steps - baseline; // signed: negative if below your assumed baseline
  const kcalPerStep = (weight||70) * 0.0005;
  return Math.round(delta * kcalPerStep);
}
function getDT(profile,dayType,weight,extraBurn=0,hasLoggedActivity=false,dailySteps=0){
  const tdee=getTDEE(profile,weight);if(!tdee)return FB[dayType]||FB.rest;
  const burn = dayBurnTotal(dayType, extraBurn, hasLoggedActivity);
  const stepBonus = stepsKcal(dailySteps, profile.activityLevel||"sedentary", weight);
  const base=tdee+burn+stepBonus;
  const adj=GOAL_DEFICIT[profile.goalSubmode||profile.goal||"cut"]??GOAL_DEFICIT[profile.goal||"cut"]??-400;
  const kcal=Math.max(1200,Math.round(base+adj));
  const pPerKg={cut:2.2,bulk:1.8,maintain:2.0}[profile.goal||"cut"];
  const protein=Math.max(130,Math.round((weight||70)*pPerKg));
  const fat=Math.max(40,Math.round(kcal*0.27/9));
  const carbs=Math.max(50,Math.round((kcal-protein*4-fat*9)/4));
  return{kcal,protein,carbs,fat};
}
function getMaint(profile,dayType,weight,extraBurn=0,hasLoggedActivity=false,dailySteps=0){
  const tdee=getTDEE(profile,weight);if(!tdee)return null;
  const stepBonus = stepsKcal(dailySteps, profile.activityLevel||"sedentary", weight);
  return Math.round(tdee + dayBurnTotal(dayType, extraBurn, hasLoggedActivity) + stepBonus);
}
// Trend over the last ~21 days (or up to 14 entries if you weigh more often).
// Requires at least 4 entries spanning at least 3 days. Returns kg/week (negative = losing).
// Linear regression over a set of {date, weight} entries.
// Returns kg/week (negative = losing weight).
// Much more robust than start-minus-end: a flat period followed by a fast drop
// no longer averages out to near-zero.
function linRegTrend(entries) {
  if (!entries || entries.length < 2) return null;
  const xs = entries.map(e => new Date(e.date+"T12:00:00").getTime() / (7*24*3600*1000)); // weeks since epoch
  const ys = entries.map(e => e.weight);
  const n = xs.length;
  const mx = xs.reduce((a,b)=>a+b,0)/n;
  const my = ys.reduce((a,b)=>a+b,0)/n;
  const ssXX = xs.reduce((a,x)=>a+(x-mx)**2,0);
  const ssXY = xs.reduce((a,x,i)=>a+(x-mx)*(ys[i]-my),0);
  if (ssXX === 0) return null;
  return ssXY / ssXX; // kg per week
}

function weeklyTrend(weights) {
  // Medium-term trend: last 21 days, min 4 entries, max 14 entries, linear regression.
  if (weights.length < 2) return null;
  const cutoffMs = Date.now() - 21*24*3600*1000;
  let recent = weights.filter(w => new Date(w.date+"T12:00:00").getTime() >= cutoffMs);
  if (recent.length < 4) recent = weights.slice(0, Math.min(weights.length, 8));
  recent = recent.slice(0, 14);
  if (recent.length < 2) return null;
  return linRegTrend(recent);
}

function shortTrend(weights) {
  // Short-term trend: last 7 days, min 2 entries, linear regression.
  // Shown alongside weeklyTrend so user can see both recent pace and medium-term pace.
  if (weights.length < 2) return null;
  const cutoffMs = Date.now() - 7*24*3600*1000;
  let recent = weights.filter(w => new Date(w.date+"T12:00:00").getTime() >= cutoffMs);
  if (recent.length < 2) return null;
  return linRegTrend(recent);
}

const store = {
  async get(k, d=null) {
    if (typeof window.storage !== "undefined") {
      try { const r = await window.storage.get(k); return r ? JSON.parse(r.value) : d; } catch {}
    }
    try { const v = localStorage.getItem("fit_"+k); return v ? JSON.parse(v) : d; } catch { return d; }
  },
  async set(k, v) {
    const s = JSON.stringify(v);
    if (typeof window.storage !== "undefined") {
      try { await window.storage.set(k, s); } catch {}
    }
    try { localStorage.setItem("fit_"+k, s); } catch {}
  },
};

// Resize image to max 1024px on longest side before encoding (phone photos are ~4000px)
async function resizeImg(dataUrl, maxPx=1024) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, maxPx / Math.max(img.width, img.height));
      const w = Math.round(img.width * scale), h = Math.round(img.height * scale);
      const c = document.createElement("canvas"); c.width = w; c.height = h;
      c.getContext("2d").drawImage(img, 0, 0, w, h);
      resolve(c.toDataURL("image/jpeg", 0.82));
    };
    img.onerror = () => resolve(dataUrl);
    img.src = dataUrl;
  });
}
async function prepImgs(imgs) {
  const out = [];
  for (const img of imgs.slice(0, 15)) {
    const resized = await resizeImg(img.preview);
    out.push({ data: resized.split(",")[1], mt: "image/jpeg", preview: resized });
  }
  return out;
}

function extractJSON(text) {
  if (!text) throw new Error("Empty response");
  const clean = text.trim().replace(/^```json\s*/,"").replace(/^```\s*/,"").replace(/\s*```$/,"").trim();
  try { return JSON.parse(clean); } catch {}
  const start = text.indexOf("{"); const end = text.lastIndexOf("}");
  if (start !== -1 && end > start) { try { return JSON.parse(text.slice(start, end+1)); } catch {} }
  const m = text.match(/\{[^{}]*(?:\{[^{}]*\}[^{}]*)*\}/);
  if (m) { try { return JSON.parse(m[0]); } catch {} }
  // AI refused but may have mentioned product name — return partial so UI can show it
  const nameMatch = text.match(/["*]{0,2}([A-Z][\w\s&éàü\-]{3,50})["*]{0,2}/);
  const name = nameMatch ? nameMatch[1].trim() : "";
  // If it's a label read that failed, return empty label response so user can fill manually
  if (text.toLowerCase().includes("cannot read") || text.toLowerCase().includes("can\'t read") || text.toLowerCase().includes("unable to")) {
    return { name: name||"", kcal:0, p:0, c:0, f:0, _unreadable:true };
  }
  throw new Error("Could not parse AI response: " + text.slice(0,120));
}

const inClaudeAI = () => { try { return typeof window.storage !== "undefined"; } catch { return false; } };

const VISION_MODEL = "claude-sonnet-4-6";
const TEXT_MODEL   = "claude-haiku-4-5-20251001"; // text-only calls
async function callAI(content, apiKey, model, maxTokens) {
  // Claude.ai artifact proxy: no extra headers, just Content-Type + .json() response
  // Standalone with API key: add auth headers
  const headers = { "Content-Type": "application/json" };
  if (apiKey && !inClaudeAI()) {
    headers["x-api-key"] = apiKey;
    headers["anthropic-version"] = "2023-06-01";
    headers["anthropic-dangerous-direct-browser-access"] = "true";
  }
  const body = JSON.stringify({ model: model||VISION_MODEL, max_tokens: maxTokens||1500, messages: [{ role: "user", content }] });
  // Use the exact pattern from Claude.ai artifact docs: fetch then .json()
  let data;
  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", { method: "POST", headers, body });
    data = await response.json();
  } catch(e) {
    throw new Error("Connection error: " + e.message);
  }
  if (data.error) throw new Error("API: " + (data.error.message || JSON.stringify(data.error)));
  if (!data.content) throw new Error("No content in response: " + JSON.stringify(data).slice(0,100));
  const text = data.content.find(b => b.type === "text")?.text || "";
  return extractJSON(text);
}

// Same as callAI but returns the raw text response (for free-form questions, advice, etc.)
async function callAIText(content, apiKey, model, maxTokens) {
  const headers = { "Content-Type": "application/json" };

    headers["x-api-key"] = apiKey;
    headers["anthropic-version"] = "2023-06-01";
    headers["anthropic-dangerous-direct-browser-access"] = "true";
  }

  if (!data.content) throw new Error("No content in response: " + JSON.stringify(data).slice(0,100));

      + "  • Single-serve item with NO scale photo → use package size only if plausibly eaten whole.\n\n"
      + "OTHER RULES:\n"
      + "1. DESCRIPTION PRIORITY: if the description names a specific product or flavour, match it EXACTLY from known products list.\n"

// Free-form coach Q&A. Bundles user context (profile, weight trend, recent meals/activities,
// products, day-type targets) so the AI can answer with personalization.
async function aCoach({question, context, history}, apiKey) {
  const sys = "You are a personal fitness and nutrition coach for the user. You have access to their tracking data below. Give concise, evidence-based, practical advice tailored to THEIR specifics (current weight trend, goal, day type, recent intake/activities, available foods). Avoid generic platitudes. Do NOT include medical disclaimers unless the user asks something genuinely clinical. Use metric units only (grams, kg, km, kcal). Keep responses focused — typically 2-5 short paragraphs or a tight bulleted list. Don't be preachy. If the user's question is unclear, ask one clarifying question.\n\nUSER CONTEXT:\n" + context;
  const messages = [];
  // Include up to last 3 turns of history
  if (history && history.length) {
    for (const h of history.slice(-6)) {
      messages.push({ role: h.role, content: h.content });
    }
  }
  messages.push({ role: "user", content: question });
  // Use the messages API directly with a system prompt
  const headers = { "Content-Type": "application/json" };
  if (apiKey && !inClaudeAI()) {
    headers["x-api-key"] = apiKey;
    headers["anthropic-version"] = "2023-06-01";
    headers["anthropic-dangerous-direct-browser-access"] = "true";
  }
  const body = JSON.stringify({ model: VISION_MODEL, max_tokens: 1500, system: sys, messages });
  const response = await fetch("https://api.anthropic.com/v1/messages", { method:"POST", headers, body });
  const data = await response.json();
  if (data.error) throw new Error("API: " + (data.error.message || JSON.stringify(data.error)));
  if (!data.content) throw new Error("No content in response");
  return data.content.find(b => b.type === "text")?.text || "";
}

function Field({label,value,onChange,type="text",placeholder="",disabled=false}){
  const isNum = type === "number";
  // For numeric fields: use type="text" + inputMode="decimal" + a regex filter.
  // type="number" causes iOS Safari to drop "." entries on some locale settings, and Chrome
  // strips leading zeros / mishandles partial input. text+inputMode gives the decimal pad
  // without the strict native number parsing.
  const handleChange = e => {
    let v = e.target.value;
    if (isNum) {
      // Allow only digits, one dot or comma, optional leading minus
      v = v.replace(/,/g, ".");
      // Strip anything that's not digit/dot/minus, and collapse multiple dots
      v = v.replace(/[^0-9.\-]/g, "");
      const firstDot = v.indexOf(".");
      if (firstDot !== -1) v = v.slice(0, firstDot+1) + v.slice(firstDot+1).replace(/\./g, "");
      // Minus only allowed at position 0
      v = v.replace(/(?!^)-/g, "");
    }
    onChange(v);
  };
  return(<div>{label&&<div style={{fontSize:10,color:C.muted,fontFamily:"monospace",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:4}}>{label}</div>}
    <input type={isNum?"text":type} inputMode={isNum?"decimal":undefined} pattern={isNum?"[0-9]*[.]?[0-9]*":undefined} value={value} onChange={handleChange} placeholder={placeholder} disabled={disabled}
      style={{display:"block",width:"100%",boxSizing:"border-box",background:disabled?C.card:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:"9px 11px",color:disabled?C.muted:C.text,fontSize:14,outline:"none",fontFamily:isNum?"monospace":"inherit"}}/>
  </div>);
}

// ── IngredientConfirmPanel — shared between meal log and meal prep ─────────────
// Stop words: modifiers/brands/adjectives that should NOT be used to match foods on their own.
// Two ingredients sharing only stop words ("frozen blueberries" vs "frozen peas") must NOT match.
const STOP_WORDS = new Set([
  // Generic modifiers
  "frozen","fresh","raw","cooked","natural","organic","light","skinless","sliced","whole","reduced",
  "free","with","and","the","plain","style","mix","ice","cream","sour","mild","spicy","grilled","baked",
  "lean","brand","new","of","for","large","small","medium","extra",
  // Brand names from this user's product set
  "lidl","pilos","kania","kikkoman","nixe","crownfield","insanefits","julian","bakery","barebells",
  "propud","prowhey","hellmann","hellmanns","kedainiu","baresa","pikon","della","sante","freshona",
  "rimi","malsena","fitspo","selected","vemondo","bio",
]);
// Preparation-state words: when ONE name has these but the other doesn't, the foods are
// different products (e.g. "minced chicken" ≠ "breaded chicken"). Strong score penalty.
const PREP_WORDS = new Set([
  "breaded","minced","ground","raw","cooked","fried","grilled","baked","smoked","marinated",
  "pickled","cured","boiled","steamed","roasted","mashed","crispy","crunchy","dried",
]);
// Strip parens, punctuation, accents — produce comparable tokens
const normName = s => (s||"").toLowerCase()
  .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
  .replace(/[(),.!?:;\-+%]/g, " ")
  .replace(/\s+/g, " ").trim();

function IngredientConfirmPanel({ingredients, setIngredients, products, onConfirm, onSkip, confirmLabel="Confirm Weights →", apiKey}) {
  const [expandedIdx, setExpandedIdx] = useState(null);
  const [swapIdx, setSwapIdx] = useState(null);
  const [swapSearch, setSwapSearch] = useState("");
  const [estimatingIdx, setEstimatingIdx] = useState(null);
  const [rowErr, setRowErr] = useState({});
  // Add-ingredient state: pick a label OR enter manually
  const [addMode, setAddMode] = useState(null); // null | "label" | "manual"
  const [addSearch, setAddSearch] = useState("");
  const [addPickedProd, setAddPickedProd] = useState(null);
  const [addPickedG, setAddPickedG] = useState("");
  const [addManual, setAddManual] = useState({name:"",weightG:"",kcal:"",protein:"",carbs:"",fat:""});

  // Match ingredient name to a product label using SPECIFIC food words, not modifiers.
  // Rules:
  //   1. Exact normalized match wins.
  //   2. If both names contain "specific" words (non-stop), at least one must overlap.
  //   3. Specific word overlaps score 4× more than stop-word overlaps.
  //   4. Final score must clear a meaningful threshold.
  const bestMatch = (ingName) => {
    if (!products?.length) return null;
    const nl = normName(ingName);
    if (!nl) return null;
    // Pass 1: exact normalized match
    for (const p of products) {
      if (normName(p.name) === nl) return p;
    }
    const tokens = s => s.split(" ").filter(w => w.length > 2);
    const ingToks = tokens(nl);
    const ingSpecific = ingToks.filter(w => !STOP_WORDS.has(w));
    const ingPrep = ingToks.filter(w => PREP_WORDS.has(w));
    let best = null, bestScore = 0;
    for (const p of products) {
      const pl = normName(p.name);
      const prodToks = tokens(pl);
      const prodSpecific = prodToks.filter(w => !STOP_WORDS.has(w));
      const prodPrep = prodToks.filter(w => PREP_WORDS.has(w));
      // Critical guard: if both names have specific words, at least one must match.
      // This blocks "frozen blueberries" → "frozen peas" via the shared modifier "frozen".
      if (ingSpecific.length > 0 && prodSpecific.length > 0) {
        const anySpecificOverlap = ingSpecific.some(w =>
          prodSpecific.some(pw => pw === w || (w.length >= 5 && pw.includes(w)) || (pw.length >= 5 && w.includes(pw)))
        );
        if (!anySpecificOverlap) continue;
      }
      let score = 0;
      for (const w of ingSpecific) {
        for (const pw of prodSpecific) {
          if (pw === w) score += w.length * 4;
          else if (w.length >= 5 && pw.includes(w)) score += w.length * 2;
          else if (pw.length >= 5 && w.includes(pw)) score += pw.length * 2;
        }
      }
      // Stop-word overlap = small bonus only
      for (const w of ingToks) {
        if (STOP_WORDS.has(w) && prodToks.includes(w)) score += 1;
      }
      // Preparation mismatch penalty: if one name has prep words like "minced" / "breaded"
      // and the other doesn't share them, the products are likely distinct.
      // Example: "minced breast chicken" should NOT match "Lidl Breaded Chicken Breast".
      if (ingPrep.length > 0 || prodPrep.length > 0) {
        const prepOverlap = ingPrep.filter(w => prodPrep.includes(w)).length;
        if (prepOverlap === 0) score -= 30;
      }
      if (score > bestScore) { bestScore = score; best = p; }
    }
    return bestScore >= 12 ? best : null;
  };

  const macrosFor = (ing) => {
    const g = parseFloat(ing.weightG) || 0;
    // Canteen: never auto-match. Pinned: user-chosen. Otherwise: try fuzzy match.
    const prod = (ing._canteen || ing._pinned) ? null : bestMatch(ing.name);
    let kcal100, p100, c100, f100, matched, source;
    if (prod) {
      kcal100 = prod.kcal; p100 = prod.p; c100 = prod.c; f100 = prod.f;
      matched = prod.name; source = "label";
    } else if (ing._pinned) {
      kcal100 = ing._kcal100 ?? 0; p100 = ing._p100 ?? 0; c100 = ing._c100 ?? 0; f100 = ing._f100 ?? 0;
      matched = ing.name; source = ing._estimated ? "ai" : "label";
    } else {
      // Fall back to AI-supplied per-100g (now requested in prompts)
      kcal100 = ing.kcal || 0; p100 = ing.protein || 0; c100 = ing.carbs || 0; f100 = ing.fat || 0;
      matched = null;
      source = (kcal100 || p100 || c100 || f100) ? "ai-prompt" : "none";
    }
    return {
      kcal: Math.round(kcal100 * g / 100),
      protein: Math.round(p100 * g / 100 * 10) / 10,
      carbs: Math.round(c100 * g / 100 * 10) / 10,
      fat: Math.round(f100 * g / 100 * 10) / 10,
      kcal100, p100, c100, f100,
      matched, source,
    };
  };

  // Reliable click handler — onClick (no preventDefault) avoids iOS click-cancellation issues
  // that affected the previous onPointerDown approach.
  const swapWith = (idx, prod) => {
    setIngredients(p => p.map((ing, i) => i !== idx ? ing : {
      ...ing,
      name: prod.name,
      _pinned: true, _estimated: false,
      _kcal100: prod.kcal, _p100: prod.p, _c100: prod.c, _f100: prod.f,
      kcal: prod.kcal, protein: prod.p, carbs: prod.c, fat: prod.f,
    }));
    setSwapIdx(null); setSwapSearch("");
  };

  const estimateForRow = async (idx) => {
    const ing = ingredients[idx];
    if (!ing?.name) return;
    setEstimatingIdx(idx);
    setRowErr(prev => ({...prev, [idx]: null}));
    try {
      const res = await aEstimateIngredient(ing.name, apiKey);
      setIngredients(p => p.map((x, j) => j !== idx ? x : {
        ...x,
        _pinned: true, _estimated: true,
        _kcal100: res.kcal||0, _p100: res.p||0, _c100: res.c||0, _f100: res.f||0,
        kcal: res.kcal||0, protein: res.p||0, carbs: res.c||0, fat: res.f||0,
      }));
    } catch (e) {
      setRowErr(prev => ({...prev, [idx]: String(e.message||e).slice(0,80)}));
    }
    setEstimatingIdx(null);
  };

  const editPer100 = (idx, key, val) => {
    setIngredients(p => p.map((x, j) => j !== idx ? x : {
      ...x, _pinned: true, _estimated: x._estimated || !x._pinned,
      [`_${key}100`]: parseFloat(val) || 0,
      [key === "kcal" ? "kcal" : key === "p" ? "protein" : key === "c" ? "carbs" : "fat"]: parseFloat(val) || 0,
    }));
  };

  const filteredProds = swapSearch.length > 0
    ? (products || []).filter(p => p.name.toLowerCase().includes(swapSearch.toLowerCase())).slice(0, 12)
    : (products || []).slice(0, 12);

  const totals = ingredients.reduce((acc, ing) => {
    const m = macrosFor(ing);
    return { kcal: acc.kcal + m.kcal, protein: acc.protein + m.protein, carbs: acc.carbs + m.carbs, fat: acc.fat + m.fat };
  }, { kcal: 0, protein: 0, carbs: 0, fat: 0 });

  // Status pill + colour for each row
  const statusFor = (ing, m) => {
    if (ing._canteen) return { color: C.yellow, bg: C.yellow+"15", label: "🍴 canteen estimate", border: C.yellow+"40" };
    if (ing._pinned && ing._estimated) return { color: C.blue, bg: C.blue+"15", label: "🤖 AI-estimated", border: C.blue+"50" };
    if (ing._pinned) return { color: C.lime, bg: C.lime+"18", label: "✓ label pinned: "+ing.name, border: C.lime };
    if (m.matched) return { color: C.lime, bg: C.lime+"12", label: "✓ matched label: "+m.matched, border: C.lime+"50" };
    return { color: C.yellow, bg: C.yellow+"10", label: "⚠ no label match — macros unknown", border: C.yellow+"40" };
  };

  // Detect AI defaulting: if 2+ ingredients (excluding scoops/single-serve) share an
  // identical round number (50, 100, 150, 200), the AI probably guessed instead of reading scales.
  const suspiciousWeights = (() => {
    const wts = ingredients.map(i => parseFloat(i.weightG) || 0).filter(w => w > 0);
    if (wts.length < 2) return false;
    const counts = {};
    for (const w of wts) {
      // Only count "round" weights (multiples of 25, ending in 0 or 5)
      if (w % 25 === 0 && w >= 50) counts[w] = (counts[w] || 0) + 1;
    }
    return Object.values(counts).some(n => n >= 2);
  })();

  return (
    <div>
      <div style={{fontSize:12,fontWeight:600,color:C.text,marginBottom:3}}>Confirm Ingredients</div>
      <div style={{fontSize:11,color:C.muted,marginBottom:4}}>Tap row for details · ⇄ swap · 🤖 estimate when no label</div>
      {suspiciousWeights
        ? <div style={{fontSize:11,color:"#ff8080",marginBottom:10,lineHeight:1.4,background:"#1e0a0a",border:`1px solid #5a1a1a`,borderRadius:6,padding:"7px 10px",fontWeight:500}}>⚠ Multiple ingredients share the same round weight — the AI likely guessed instead of reading your scales. Check each row against your photos and correct the grams before confirming.</div>
        : <div style={{fontSize:10,color:C.yellow,marginBottom:10,lineHeight:1.4,background:C.yellow+"10",border:`1px solid ${C.yellow}30`,borderRadius:6,padding:"6px 9px"}}>⚠ Verify each weight matches what your scale showed in the photo. Package labels list the package size (e.g. 180g pack), not what you ate.</div>
      }
      <div style={{display:"flex",flexDirection:"column",gap:7,marginBottom:10}}>
        {ingredients.map((ing, i) => {
          const m = macrosFor(ing);
          const isExpanded = expandedIdx === i;
          const isSwapping = swapIdx === i;
          const isEstimating = estimatingIdx === i;
          const st = statusFor(ing, m);
          const noMacros = m.kcal100 === 0 && m.p100 === 0 && m.c100 === 0 && m.f100 === 0;
          return (
            <div key={i} style={{background:C.bg,borderRadius:10,border:`1px solid ${st.border}`,overflow:"hidden"}}>
              {/* Main row */}
              <div style={{display:"flex",alignItems:"center",gap:6,padding:"9px 10px"}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:12,color:st.color,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{ing.name}</div>
                  <div style={{fontSize:9,color:st.color,marginTop:1,opacity:0.85}}>{st.label}</div>
                  {ing._scaleRead && (() => {
                    const wG = parseFloat(ing.weightG) || 0;
                    const sR = parseFloat(String(ing._scaleRead).replace(/[^\d.]/g,"")) || 0;
                    // Threshold lowered to 5% — catches errors like 105 vs 108, 12 vs 15
                    const mismatch = sR > 0 && wG > 0 && Math.abs(wG - sR) / Math.max(wG, sR) > 0.05;
                    const uncertain = !!ing.weightUncertain;
                    const warn = mismatch || uncertain;
                    return (<div style={{fontSize:9,marginTop:2,fontFamily:"monospace",color:warn?"#ff8080":C.muted}}>{warn?"⚠ ":""}AI read scale as: {ing._scaleRead}g{mismatch?" — looks off, please verify":uncertain?" — AI flagged as uncertain, please verify":""}</div>);
                  })()}
                </div>
                <input type="text" inputMode="decimal" pattern="[0-9]*[.]?[0-9]*" value={ing.weightG} onChange={e => setIngredients(p => p.map((x, j) => j !== i ? x : {...x, weightG: e.target.value}))}
                  style={{width:58,background:C.card,border:`1px solid ${C.lime}`,borderRadius:6,padding:"5px 6px",color:C.lime,fontSize:14,fontFamily:"monospace",fontWeight:700,outline:"none",textAlign:"right"}}/>
                <span style={{fontSize:11,color:C.muted}}>g</span>
                <button onClick={()=>{setSwapIdx(isSwapping?null:i);setSwapSearch("");setExpandedIdx(null);}}
                  style={{padding:"5px 8px",borderRadius:6,background:isSwapping?C.orange+"25":"none",border:`1px solid ${isSwapping?C.orange:C.border}`,color:isSwapping?C.orange:C.muted,fontSize:11,cursor:"pointer",flexShrink:0,lineHeight:1}}>⇄</button>
                <button onClick={()=>{setExpandedIdx(isExpanded?null:i);setSwapIdx(null);}}
                  style={{padding:"5px 8px",borderRadius:6,background:isExpanded?C.blue+"25":"none",border:`1px solid ${isExpanded?C.blue:C.border}`,color:isExpanded?C.blue:C.muted,fontSize:11,cursor:"pointer",flexShrink:0,lineHeight:1}}>{isExpanded?"▾":"▸"}</button>
              </div>
              {/* Quick actions when no match */}
              {!isSwapping && !isExpanded && noMacros && !ing._canteen && (
                <div style={{padding:"7px 10px 9px",borderTop:`1px solid ${C.border}`,display:"flex",gap:6,flexWrap:"wrap"}}>
                  <button onClick={()=>estimateForRow(i)} disabled={isEstimating} style={{flex:1,padding:"7px 8px",borderRadius:6,background:isEstimating?C.faint:C.blue+"22",border:`1px solid ${C.blue}50`,color:C.blue,fontWeight:600,cursor:isEstimating?"default":"pointer",fontSize:11}}>{isEstimating?"🤖 estimating…":"🤖 AI estimate"}</button>
                  <button onClick={()=>{setSwapIdx(i);setSwapSearch("");}} style={{flex:1,padding:"7px 8px",borderRadius:6,background:C.orange+"15",border:`1px solid ${C.orange}40`,color:C.orange,fontWeight:600,cursor:"pointer",fontSize:11}}>⇄ Pick label</button>
                  <button onClick={()=>{setExpandedIdx(i);}} style={{flex:1,padding:"7px 8px",borderRadius:6,background:"none",border:`1px solid ${C.border}`,color:C.muted,fontWeight:500,cursor:"pointer",fontSize:11}}>✎ Manual</button>
                </div>
              )}
              {rowErr[i] && <div style={{padding:"6px 10px",fontSize:11,color:"#ff8080"}}>⚠ {rowErr[i]}</div>}
              {/* Expanded macro view + manual edit */}
              {isExpanded && (
                <div style={{padding:"9px 12px 11px",borderTop:`1px solid ${C.border}`}}>
                  <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:8}}>
                    <span style={{fontFamily:"monospace",fontSize:11,color:C.lime}}>{m.kcal} kcal</span>
                    <span style={{fontFamily:"monospace",fontSize:11,color:C.blue}}>{m.protein}g P</span>
                    <span style={{fontFamily:"monospace",fontSize:11,color:C.orange}}>{m.carbs}g C</span>
                    <span style={{fontFamily:"monospace",fontSize:11,color:C.purple}}>{m.fat}g F</span>
                    <span style={{fontSize:10,color:C.muted,marginLeft:"auto"}}>{parseFloat(ing.weightG)||0}g eaten</span>
                  </div>
                  {/* Action buttons row — always visible in expanded view */}
                  <div style={{display:"flex",gap:6,marginBottom:9,flexWrap:"wrap"}}>
                    <button onClick={()=>estimateForRow(i)} disabled={isEstimating} style={{flex:1,padding:"6px 8px",borderRadius:6,background:isEstimating?C.faint:C.blue+"22",border:`1px solid ${C.blue}50`,color:C.blue,fontWeight:600,cursor:isEstimating?"default":"pointer",fontSize:10,whiteSpace:"nowrap"}}>{isEstimating?"🤖 estimating…":"🤖 AI estimate"}</button>
                    <button onClick={()=>{setSwapIdx(i);setSwapSearch("");setExpandedIdx(null);}} style={{flex:1,padding:"6px 8px",borderRadius:6,background:C.orange+"15",border:`1px solid ${C.orange}40`,color:C.orange,fontWeight:600,cursor:"pointer",fontSize:10,whiteSpace:"nowrap"}}>⇄ Swap label</button>
                    {(ing._pinned||m.matched) && <button onClick={()=>setIngredients(p=>p.map((x,j)=>j!==i?x:{...x,_pinned:false,_estimated:false,_kcal100:undefined,_p100:undefined,_c100:undefined,_f100:undefined,kcal:0,protein:0,carbs:0,fat:0}))} style={{flex:1,padding:"6px 8px",borderRadius:6,background:"none",border:`1px solid ${C.border}`,color:C.muted,fontWeight:500,cursor:"pointer",fontSize:10,whiteSpace:"nowrap"}}>🔄 Reset</button>}
                  </div>
                  <div style={{fontSize:10,color:C.muted,fontFamily:"monospace",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:5}}>per-100g (edit to override)</div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:5}}>
                    {[["kcal","kcal",C.lime],["p","P",C.blue],["c","C",C.orange],["f","F",C.purple]].map(([k,lbl,col])=>(
                      <div key={k}>
                        <div style={{fontSize:9,color:C.muted,fontFamily:"monospace",marginBottom:2}}>{lbl}/100g</div>
                        <input type="text" inputMode="decimal" pattern="[0-9]*[.]?[0-9]*" value={k==="kcal"?m.kcal100:k==="p"?m.p100:k==="c"?m.c100:m.f100}
                          onChange={e=>editPer100(i,k,e.target.value)}
                          style={{width:"100%",boxSizing:"border-box",background:C.card,border:`1px solid ${C.border}`,borderRadius:5,padding:"5px 6px",color:col,fontSize:12,fontFamily:"monospace",outline:"none"}}/>
                      </div>
                    ))}
                  </div>
                </div>
              )}
              {/* Swap panel */}
              {isSwapping && (
                <div style={{padding:"8px 10px 10px",borderTop:`1px solid ${C.border}`}}>
                  <div style={{fontSize:10,color:C.orange,fontFamily:"monospace",textTransform:"uppercase",marginBottom:6}}>Pick a label:</div>
                  <input value={swapSearch} onChange={e => setSwapSearch(e.target.value)} placeholder="Search your product labels…"
                    style={{width:"100%",boxSizing:"border-box",background:C.bg,border:`1px solid ${C.border}`,borderRadius:6,padding:"7px 10px",color:C.text,fontSize:13,outline:"none",marginBottom:7}}
                    autoFocus/>
                  <div style={{display:"flex",flexDirection:"column",gap:5,maxHeight:240,overflowY:"auto"}}>
                    {filteredProds.map(prod => (
                      <button key={prod.name} type="button" onClick={() => swapWith(i, prod)}
                        style={{padding:"9px 12px",borderRadius:8,background:C.card,border:`1px solid ${C.border}`,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",userSelect:"none",textAlign:"left"}}>
                        <span style={{fontSize:13,color:C.text,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{prod.name}</span>
                        <span style={{fontFamily:"monospace",fontSize:11,color:C.muted,flexShrink:0,marginLeft:10}}>{prod.kcal}k {prod.p}P</span>
                      </button>
                    ))}
                    {filteredProds.length === 0 && <div style={{fontSize:11,color:C.muted,padding:"4px 0"}}>No labels match. Add it via Food tab → Product Labels, or use 🤖 AI estimate below.</div>}
                  </div>
                  <div style={{display:"flex",gap:6,marginTop:8}}>
                    <button onClick={()=>{setSwapIdx(null);setSwapSearch("");estimateForRow(i);}} disabled={isEstimating} style={{flex:1,padding:"8px",borderRadius:6,background:C.blue+"22",border:`1px solid ${C.blue}50`,color:C.blue,fontWeight:600,cursor:"pointer",fontSize:11}}>🤖 Use AI estimate instead</button>
                    <button onClick={()=>{setSwapIdx(null);setSwapSearch("");}} style={{padding:"8px 12px",borderRadius:6,background:"none",border:`1px solid ${C.border}`,color:C.muted,cursor:"pointer",fontSize:11}}>Cancel</button>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
      {/* Add ingredient — pick label or manual */}
      <div style={{marginBottom:10}}>
        {!addMode&&<div style={{display:"flex",gap:6}}>
          <button onClick={()=>{setAddMode("label");setAddSearch("");setAddPickedProd(null);setAddPickedG("");}} style={{flex:1,padding:"7px 0",borderRadius:7,background:"none",border:`1px dashed ${C.lime}50`,color:C.lime,cursor:"pointer",fontSize:11,fontWeight:600}}>🏷️ Add from label</button>
          <button onClick={()=>{setAddMode("manual");setAddManual({name:"",weightG:"",kcal:"",protein:"",carbs:"",fat:""});}} style={{flex:1,padding:"7px 0",borderRadius:7,background:"none",border:`1px dashed ${C.border}`,color:C.muted,cursor:"pointer",fontSize:11}}>✎ Add manually</button>
        </div>}
        {addMode==="label"&&<div style={{background:C.faint,borderRadius:10,padding:"10px 12px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <span style={{fontSize:11,color:C.muted,fontFamily:"monospace",textTransform:"uppercase"}}>Pick a label</span>
            <button onClick={()=>{setAddMode(null);setAddPickedProd(null);}} style={{fontSize:11,color:C.muted,background:"none",border:"none",cursor:"pointer"}}>✕</button>
          </div>
          {!addPickedProd?(<>
            <input value={addSearch} onChange={e=>setAddSearch(e.target.value)} placeholder="Search labels…" style={{width:"100%",boxSizing:"border-box",background:C.bg,border:`1px solid ${C.border}`,borderRadius:6,padding:"7px 10px",color:C.text,fontSize:13,outline:"none",marginBottom:7}} autoFocus/>
            <div style={{display:"flex",flexDirection:"column",gap:5,maxHeight:200,overflowY:"auto"}}>
              {(products||[]).filter(p=>!addSearch||p.name.toLowerCase().includes(addSearch.toLowerCase())).slice(0,12).map(prod=>(
                <button key={prod.name} type="button" onClick={()=>{setAddPickedProd(prod);setAddPickedG((prod.servingG||prod.packageG)?String(prod.servingG||prod.packageG):"100");}} style={{padding:"7px 11px",borderRadius:7,background:C.card,border:`1px solid ${C.border}`,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",textAlign:"left"}}>
                  <span style={{fontSize:12,color:C.text,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{prod.name}</span>
                  <span style={{fontFamily:"monospace",fontSize:10,color:C.muted,flexShrink:0,marginLeft:8}}>{prod.kcal}k {prod.p}P</span>
                </button>
              ))}
              {(products||[]).filter(p=>!addSearch||p.name.toLowerCase().includes(addSearch.toLowerCase())).length===0&&<div style={{fontSize:11,color:C.muted,padding:"4px 0"}}>No labels match.</div>}
            </div>
          </>):(<div>
            <div style={{fontSize:12,color:C.lime,marginBottom:5,fontWeight:600}}>{addPickedProd.name}</div>
            <div style={{fontSize:10,color:C.muted,marginBottom:6,fontFamily:"monospace"}}>{addPickedProd.kcal} kcal · {addPickedProd.p}g P · {addPickedProd.c}g C · {addPickedProd.f}g F per 100g</div>
            <div style={{display:"flex",gap:7,alignItems:"center"}}>
              <input type="text" inputMode="decimal" pattern="[0-9]*[.]?[0-9]*" value={addPickedG} onChange={e=>setAddPickedG(e.target.value.replace(",","."))} placeholder="100" style={{width:80,background:C.bg,border:`1px solid ${C.lime}`,borderRadius:6,padding:"6px 9px",color:C.lime,fontSize:14,fontFamily:"monospace",fontWeight:700,outline:"none"}} autoFocus/>
              <span style={{fontSize:11,color:C.muted}}>g</span>
            </div>
            <div style={{display:"flex",gap:6,marginTop:8}}>
              <button onClick={()=>setAddPickedProd(null)} style={{flex:1,padding:"7px 0",borderRadius:6,background:"none",border:`1px solid ${C.border}`,color:C.muted,cursor:"pointer",fontSize:11}}>← Back</button>
              <button onClick={()=>{
                const g=parseFloat(addPickedG)||0;if(g<=0)return;
                setIngredients(p=>[...p,{name:addPickedProd.name,weightG:String(g),kcal:addPickedProd.kcal,protein:addPickedProd.p,carbs:addPickedProd.c,fat:addPickedProd.f,_pinned:true}]);
                setAddMode(null);setAddPickedProd(null);setAddPickedG("");
              }} disabled={!parseFloat(addPickedG)} style={{flex:2,padding:"7px 0",borderRadius:6,background:parseFloat(addPickedG)?C.lime:C.faint,border:"none",color:"#000",fontWeight:700,cursor:parseFloat(addPickedG)?"pointer":"default",fontSize:12}}>+ Add ingredient</button>
            </div>
          </div>)}
        </div>}
        {addMode==="manual"&&<div style={{background:C.faint,borderRadius:10,padding:"10px 12px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <span style={{fontSize:11,color:C.muted,fontFamily:"monospace",textTransform:"uppercase"}}>Manual ingredient</span>
            <button onClick={()=>setAddMode(null)} style={{fontSize:11,color:C.muted,background:"none",border:"none",cursor:"pointer"}}>✕</button>
          </div>
          <Field label="Name" value={addManual.name} onChange={v=>setAddManual(p=>({...p,name:v}))} placeholder="ingredient"/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7,marginTop:7}}>
            <Field label="Weight g" value={addManual.weightG} onChange={v=>setAddManual(p=>({...p,weightG:v}))} type="number"/>
            <Field label="Kcal /100g" value={addManual.kcal} onChange={v=>setAddManual(p=>({...p,kcal:v}))} type="number"/>
            <Field label="Protein /100g" value={addManual.protein} onChange={v=>setAddManual(p=>({...p,protein:v}))} type="number"/>
            <Field label="Carbs /100g" value={addManual.carbs} onChange={v=>setAddManual(p=>({...p,carbs:v}))} type="number"/>
          </div>
          <Field label="Fat /100g" value={addManual.fat} onChange={v=>setAddManual(p=>({...p,fat:v}))} type="number"/>
          <button onClick={()=>{
            const g=parseFloat(addManual.weightG)||0;if(g<=0||!addManual.name)return;
            setIngredients(p=>[...p,{name:addManual.name,weightG:String(g),kcal:parseFloat(addManual.kcal)||0,protein:parseFloat(addManual.protein)||0,carbs:parseFloat(addManual.carbs)||0,fat:parseFloat(addManual.fat)||0,_pinned:true,_estimated:true}]);
            setAddMode(null);
          }} disabled={!addManual.name||!parseFloat(addManual.weightG)} style={{width:"100%",marginTop:8,padding:"8px 0",borderRadius:7,background:(addManual.name&&parseFloat(addManual.weightG))?C.lime:C.faint,border:"none",color:"#000",fontWeight:700,cursor:(addManual.name&&parseFloat(addManual.weightG))?"pointer":"default",fontSize:12}}>+ Add ingredient</button>
        </div>}
      </div>
      {/* Totals bar */}
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 12px",marginBottom:8,display:"flex",gap:12,alignItems:"center"}}>
        <span style={{fontSize:10,color:C.muted,flexShrink:0}}>Total</span>
        <Chip val={Math.round(totals.kcal)} label="kcal" color={C.lime}/>
        <Chip val={Math.round(totals.protein)} label="P" color={C.blue}/>
        <Chip val={Math.round(totals.carbs)} label="C" color={C.orange}/>
        <Chip val={Math.round(totals.fat)} label="F" color={C.purple}/>
      </div>
      <div style={{display:"flex",gap:8}}>
        <button onClick={onSkip} style={{flex:1,padding:"10px 0",borderRadius:10,background:C.card,border:`1px solid ${C.border}`,color:C.text,fontWeight:600,cursor:"pointer",fontSize:13}}>Skip</button>
        <button onClick={() => onConfirm(ingredients, totals)} style={{flex:2,padding:"10px 0",borderRadius:10,background:C.lime,border:"none",color:"#000",fontWeight:700,cursor:"pointer",fontSize:14}}>{confirmLabel}</button>
      </div>
    </div>
  );
}

function AddIngredientRow({onAdd,products}) {
  const [name,setName]=useState("");const [wg,setWg]=useState("");const [open,setOpen]=useState(false);
  const [suggestions,setSuggestions]=useState([]);
  const onNameChange=v=>{
    setName(v);
    if(v.length>1&&products){
      const q=v.toLowerCase();
      setSuggestions(products.filter(p=>p.name.toLowerCase().includes(q)).slice(0,4));
    } else { setSuggestions([]); }
  };
  const pick=prod=>{setName(prod.name);setSuggestions([]);};
  const submit=()=>{
    if(!name.trim()||!wg)return;
    // Find matching product for accurate macros
    const q=name.toLowerCase();
    const prod=products?.find(p=>p.name.toLowerCase().includes(q)||q.includes(p.name.toLowerCase().split(' ')[0]));
    onAdd({name:name.trim(),weightG:wg,kcal:prod?prod.kcal:0,protein:prod?prod.p:0,carbs:prod?prod.c:0,fat:prod?prod.f:0,_fromProduct:!!prod});
    setName("");setWg("");setOpen(false);setSuggestions([]);
  };
  if(!open) return(<button onClick={()=>setOpen(true)} style={{padding:"8px 0",borderRadius:8,background:"none",border:`1px dashed ${C.border}`,color:C.muted,cursor:"pointer",fontSize:12,width:"100%"}}>+ Add missing ingredient</button>);
  return(<div style={{background:C.faint,borderRadius:8,padding:"10px 12px"}}>
    <div style={{display:"flex",gap:8,alignItems:"center"}}>
      <div style={{flex:2,position:"relative"}}>
        <input value={name} onChange={e=>onNameChange(e.target.value)} placeholder="Ingredient name" style={{width:"100%",boxSizing:"border-box",background:C.bg,border:`1px solid ${C.border}`,borderRadius:6,padding:"7px 9px",color:C.text,fontSize:13,outline:"none"}}/>
        {suggestions.length>0&&<div style={{position:"absolute",top:"100%",left:0,right:0,background:C.surf,border:`1px solid ${C.border}`,borderRadius:6,zIndex:10,marginTop:2}}>
          {suggestions.map((p,i)=><button key={i} onClick={()=>pick(p)} style={{display:"block",width:"100%",padding:"7px 10px",background:"none",border:"none",color:C.text,fontSize:12,cursor:"pointer",textAlign:"left",borderBottom:i<suggestions.length-1?`1px solid ${C.border}`:"none"}}>{p.name}</button>)}
        </div>}
      </div>
      <input type="text" inputMode="decimal" pattern="[0-9]*[.]?[0-9]*" value={wg} onChange={e=>setWg(e.target.value)} placeholder="g" style={{width:60,background:C.bg,border:`1px solid ${C.border}`,borderRadius:6,padding:"7px 9px",color:C.text,fontSize:13,fontFamily:"monospace",outline:"none"}}/>
      <span style={{fontSize:12,color:C.muted,flexShrink:0}}>g</span>
    </div>
    {name&&products?.find(p=>p.name.toLowerCase().includes(name.toLowerCase()))&&<div style={{fontSize:11,color:C.lime,marginTop:4}}>✓ Matched product — exact macros will be used</div>}
    {name&&!products?.find(p=>p.name.toLowerCase().includes(name.toLowerCase()))&&name.length>2&&<div style={{fontSize:11,color:C.muted,marginTop:4}}>No match in products — AI estimate will be used</div>}
    <div style={{display:"flex",gap:8,marginTop:8}}>
      <button onClick={()=>{setOpen(false);setSuggestions([]);}} style={{flex:1,padding:"7px 0",borderRadius:6,background:"none",border:`1px solid ${C.border}`,color:C.muted,cursor:"pointer",fontSize:12}}>Cancel</button>
      <button onClick={submit} disabled={!name.trim()||!wg} style={{flex:2,padding:"7px 0",borderRadius:6,background:name.trim()&&wg?C.lime:C.faint,border:"none",color:"#000",fontWeight:700,cursor:name.trim()&&wg?"pointer":"default",fontSize:12}}>Add Ingredient</button>
    </div>
  </div>);
}


// ── PrepEatPanel — gram-based, multi-prep combine ─────────────────────────────
function PrepEatPanel({activePreps,setMealPreps,mealType,onAdd,onClose,products,apiKey}) {
  const [selected,setSelected]=useState({}); // {prepId: gramsString}
  // portionMode tracks whether each selected prep is in "g" or "portions" input mode
  const [portionMode,setPortionMode]=useState({}); // {prepId: "g"|"portions"}
  // extras: array of {id, source: "label"|"manual", name, weightG, kcal, p, c, f, _per100?}
  const [extras,setExtras]=useState([]);
  const [extrasMode,setExtrasMode]=useState(null); // null | "pick" | "manual" | "photo"
  const [pickSearch,setPickSearch]=useState("");
  const [pickedProd,setPickedProd]=useState(null); // selected product when in pick mode
  const [pickedG,setPickedG]=useState("");
  const [manualForm,setManualForm]=useState({name:"",kcal:"",protein:"",carbs:"",fat:"",weightG:""});
  const [photoIngs,setPhotoIngs]=useState(null); // ingredients returned from photo analysis
  const [photoImgs,setPhotoImgs]=useState([]);
  const [photoDesc,setPhotoDesc]=useState("");
  const [photoLoading,setPhotoLoading]=useState(false);
  const [photoErr,setPhotoErr]=useState(null);
  const [logErr,setLogErr]=useState("");

  // A prep is "broken" if it has no macros and no per-100 macros saved — usually means
  // it was created before the macro fields were filled in. Let the user know rather
  // than silently logging zeros.
  const isPrepBroken = prep => {
    const hasTotals = (prep.totalKcal||0) > 0 || (prep.totalProtein||0) > 0;
    const hasPer100 = (prep.per100Kcal||0) > 0 || (prep.per100Protein||0) > 0;
    return !hasTotals && !hasPer100;
  };

  const toggle=id=>{
    setLogErr("");
    setSelected(p=>{
      if(p[id]!==undefined){
        const n={...p};delete n[id];
        // Also clear portionMode for this prep
        setPortionMode(pm=>{const nm={...pm};delete nm[id];return nm;});
        return n;
      }
      const prep=activePreps.find(x=>x.id===id);
      const remGrams=prep.remainingWeightG??prep.totalWeightG??0;
      const remPortions=Math.max(prep.remaining||1,1);
      const suggested=Math.round(remGrams/remPortions);
      return{...p,[id]:String(suggested)};
    });
  };

  // Convert portions input → grams for macros calculation
  const gramsForSelected=(prep,val,mode)=>{
    if(mode==="portions"){
      const portions=parseFloat(val)||0;
      const remGrams=prep.remainingWeightG??prep.totalWeightG??0;
      const remPortions=Math.max(prep.remaining||1,1);
      const gramsPerPortion=remPortions>0?remGrams/remPortions:0;
      return Math.round(portions*gramsPerPortion);
    }
    return parseFloat(val)||0;
  };

  const macrosForPrep=(prep,grams)=>{
    const g=parseFloat(grams)||0;
    if(prep.per100Kcal&&prep.totalWeightG){
      const scale=g/100;
      return{kcal:Math.round(prep.per100Kcal*scale),protein:Math.round(prep.per100Protein*scale*10)/10,carbs:Math.round(prep.per100Carbs*scale*10)/10,fat:Math.round(prep.per100Fat*scale*10)/10};
    }
    // fallback: linear scale from total
    const total=prep.totalWeightG||0;
    if(!total)return{kcal:prep.perKcal||0,protein:prep.perProtein||0,carbs:prep.perCarbs||0,fat:prep.perFat||0};
    const ratio=g/total;
    return{kcal:Math.round((prep.totalKcal||0)*ratio),protein:Math.round((prep.totalProtein||0)*ratio*10)/10,carbs:Math.round((prep.totalCarbs||0)*ratio*10)/10,fat:Math.round((prep.totalFat||0)*ratio*10)/10};
  };

  const totals=Object.entries(selected).reduce((acc,[id,val])=>{
    const prep=activePreps.find(x=>String(x.id)===id);if(!prep)return acc;
    const g=gramsForSelected(prep,val,portionMode[id]||"g");
    const m=macrosForPrep(prep,g);
    return{kcal:acc.kcal+m.kcal,protein:acc.protein+m.protein,carbs:acc.carbs+m.carbs,fat:acc.fat+m.fat};
  },{kcal:0,protein:0,carbs:0,fat:0});
  const extrasTotals = extras.reduce((a,e)=>({kcal:a.kcal+(parseFloat(e.kcal)||0),protein:a.protein+(parseFloat(e.protein)||0),carbs:a.carbs+(parseFloat(e.carbs)||0),fat:a.fat+(parseFloat(e.fat)||0)}),{kcal:0,protein:0,carbs:0,fat:0});
  const grandTotals={kcal:totals.kcal+extrasTotals.kcal,protein:totals.protein+extrasTotals.protein,carbs:totals.carbs+extrasTotals.carbs,fat:totals.fat+extrasTotals.fat};

  const confirm=()=>{
    if(!Object.keys(selected).length&&extras.length===0)return;
    if(grandTotals.kcal === 0 && grandTotals.protein === 0 && grandTotals.carbs === 0 && grandTotals.fat === 0){
      setLogErr("All macros are zero. The selected prep(s) appear to have no macro data — edit them in the Food tab first.");
      return;
    }
    const names=Object.entries(selected).map(([id,val])=>{
      const prep=activePreps.find(x=>String(x.id)===id);
      const g=gramsForSelected(prep,val,portionMode[id]||"g");
      const safeName = (prep?.name && prep.name.trim()) || "Meal Prep";
      const mode=portionMode[id]||"g";
      return prep?(mode==="portions"?`${safeName} ${val}pc (${g}g)`:`${safeName} ${g}g`):"";
    }).filter(Boolean);
    extras.forEach(e=>{ if(e.name) names.push(e.name + (e.weightG?" "+e.weightG+"g":"")); });
    const label=names.join(" + ") || (extras.length>0?"Snack from labels":"Meal Prep");
    const meal={id:Date.now(),name:label,kcal:Math.round(grandTotals.kcal),protein:Math.round(grandTotals.protein),carbs:Math.round(grandTotals.carbs),fat:Math.round(grandTotals.fat),mealType,notes:Object.keys(selected).length>0?"Meal prep":"Logged from labels",time:new Date().toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"})};
    onAdd(meal);
    // Update remaining grams for each prep
    setMealPreps(ps=>ps.map(p=>{
      if(selected[p.id]===undefined)return p;
      const used=gramsForSelected(p,selected[p.id],portionMode[p.id]||"g");
      const remG=Math.max(0,(p.remainingWeightG??p.totalWeightG??0)-used);
      const totalG=p.totalWeightG||0;
      const newRemPct=totalG>0?remG/totalG:0;
      const newRem=Math.max(0,Math.round((p.targetPortions||p.portions||1)*newRemPct));
      return{...p,remainingWeightG:remG,remaining:newRem};
    }));
    onClose();
  };

  return(<div>
    {activePreps.length===0
      ? <div style={{background:C.faint,borderRadius:10,padding:"12px 14px",marginBottom:10,textAlign:"center"}}><div style={{fontSize:22,marginBottom:4}}>🍱</div><div style={{fontSize:12,color:C.muted}}>No active preps — but you can still log labels below.</div></div>
      : <div style={{fontSize:11,color:C.muted,marginBottom:8}}>Tap a prep to select, enter grams eaten. Multi-select to combine.</div>}
    <div style={{display:"flex",flexDirection:"column",gap:7,marginBottom:10}}>
      {activePreps.map(prep=>{
        const isSelected=selected[prep.id]!==undefined;
        const broken = isPrepBroken(prep);
        const remG=prep.remainingWeightG??prep.totalWeightG??0;
        const totalG=prep.totalWeightG||0;
        const pct=totalG>0?Math.round(remG/totalG*100):0;
        const suggested=Math.round(remG/Math.max(prep.remaining||1,1));
        const preview=isSelected?macrosForPrep(prep,selected[prep.id]):{};
        const safeName = (prep.name && prep.name.trim()) || "(unnamed prep)";
        const borderCol = broken ? C.red+"55" : (isSelected?C.lime:C.border);
        return(<div key={prep.id} style={{background:C.card,border:`1px solid ${borderCol}`,borderRadius:12,padding:"10px 14px",cursor:broken?"default":"pointer",opacity:broken?0.7:1}} onClick={()=>{if(!broken)toggle(prep.id);}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:13,fontWeight:600,color:isSelected?C.lime:C.text}}>{safeName}</div>
              <div style={{fontSize:10,color:C.muted,marginTop:2}}>{Math.round(remG)}g left of {totalG}g · ~{pct}% · suggest {suggested}g/portion</div>
              {/* Macro preview per portion or per 100g — so user can spot broken preps */}
              {!broken && <div style={{display:"flex",gap:8,marginTop:4}}>
                <Chip val={prep.perKcal||0} label="kcal/portion" color={C.lime}/>
                <Chip val={prep.perProtein||0} label="P" color={C.blue}/>
                <Chip val={prep.perCarbs||0} label="C" color={C.orange}/>
                <Chip val={prep.perFat||0} label="F" color={C.purple}/>
              </div>}
              {broken && <div style={{fontSize:11,color:C.red,marginTop:4}}>⚠ This prep has no macro data — edit it in Food tab before logging.</div>}
              <div style={{height:3,background:C.dim,borderRadius:2,marginTop:4}}><div style={{height:"100%",width:`${pct}%`,background:C.lime,borderRadius:2}}/></div>
            </div>
            {!broken && <div style={{width:20,height:20,borderRadius:"50%",border:`2px solid ${isSelected?C.lime:C.border}`,background:isSelected?C.lime:"none",display:"flex",alignItems:"center",justifyContent:"center",marginLeft:10,flexShrink:0}}>
              {isSelected&&<span style={{fontSize:12,color:"#000",fontWeight:800}}>✓</span>}
            </div>}
          </div>
          {isSelected&&!broken&&(<div style={{marginTop:8}} onClick={e=>e.stopPropagation()}>
            {/* g / portions toggle */}
            <div style={{display:"flex",gap:4,marginBottom:6}}>
              {[["g","Grams"],["portions","Portions"]].map(([mode,lbl])=>{
                const act=(portionMode[prep.id]||"g")===mode;
                return(<button key={mode} onClick={()=>{
                  setPortionMode(pm=>({...pm,[prep.id]:mode}));
                  // Reset input to sensible default for the new mode
                  if(mode==="portions"){
                    setSelected(p=>({...p,[prep.id]:"1"}));
                  } else {
                    const remGrams=prep.remainingWeightG??prep.totalWeightG??0;
                    const remP=Math.max(prep.remaining||1,1);
                    setSelected(p=>({...p,[prep.id]:String(Math.round(remGrams/remP))}));
                  }
                }} style={{flex:1,padding:"4px 0",borderRadius:6,border:`1px solid ${act?C.lime:C.border}`,background:act?`${C.lime}18`:C.bg,color:act?C.lime:C.muted,fontWeight:act?700:400,cursor:"pointer",fontSize:10}}>{lbl}</button>);
              })}
            </div>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <input type="text" inputMode="decimal" pattern="[0-9]*[.]?[0-9]*"
                value={selected[prep.id]}
                onChange={e=>setSelected(p=>({...p,[prep.id]:e.target.value}))}
                placeholder={(portionMode[prep.id]||"g")==="portions"?"1":String(suggested)}
                style={{width:70,background:C.bg,border:`1px solid ${C.lime}`,borderRadius:6,padding:"6px 8px",color:C.lime,fontSize:14,fontFamily:"monospace",outline:"none",fontWeight:700}}/>
              <span style={{fontSize:12,color:C.muted}}>
                {(portionMode[prep.id]||"g")==="portions"
                  ? `pc · ${gramsForSelected(prep,selected[prep.id],"portions")}g`
                  : "g"}
              </span>
              {(()=>{const g=gramsForSelected(prep,selected[prep.id],portionMode[prep.id]||"g");const pv=g>0?macrosForPrep(prep,g):{};return g>0&&(<div style={{display:"flex",gap:8}}><Chip val={pv.kcal||0} label="kcal" color={C.lime}/><Chip val={pv.protein||0} label="P" color={C.blue}/><Chip val={pv.carbs||0} label="C" color={C.orange}/><Chip val={pv.fat||0} label="F" color={C.purple}/></div>);})()}
            </div>
          </div>)}
        </div>);
      })}
    </div>

    {/* Extras section — pick from labels, take photo, or enter manually */}
    <div style={{marginBottom:8}}>
      {extras.length>0&&<div style={{display:"flex",flexDirection:"column",gap:5,marginBottom:8}}>
        {extras.map((e,i)=>(<div key={e.id} style={{background:C.faint,border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 11px",display:"flex",alignItems:"center",gap:8}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:12,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.source==="label"?"🏷️ ":e.source==="photo"?"📸 ":"✎ "}{e.name||"unnamed"}</div>
            <div style={{display:"flex",gap:8,marginTop:2}}>
              {e.weightG>0&&<span style={{fontSize:10,color:C.muted,fontFamily:"monospace"}}>{Math.round(e.weightG)}g</span>}
              <span style={{fontSize:10,color:C.lime,fontFamily:"monospace"}}>{Math.round(e.kcal||0)} kcal</span>
              <span style={{fontSize:10,color:C.blue,fontFamily:"monospace"}}>{Math.round(e.protein||0)}P</span>
              <span style={{fontSize:10,color:C.orange,fontFamily:"monospace"}}>{Math.round(e.carbs||0)}C</span>
              <span style={{fontSize:10,color:C.purple,fontFamily:"monospace"}}>{Math.round(e.fat||0)}F</span>
            </div>
          </div>
          <button onClick={()=>setExtras(p=>p.filter((_,j)=>j!==i))} style={{background:"none",border:"none",color:C.faint,fontSize:15,cursor:"pointer",padding:"0 2px",lineHeight:1}}>×</button>
        </div>))}
      </div>}
      {!extrasMode&&<div style={{display:"flex",gap:6}}>
        <button onClick={()=>{setExtrasMode("pick");setPickSearch("");setPickedProd(null);setPickedG("");}} style={{flex:1,padding:"8px 0",borderRadius:8,background:"none",border:`1px dashed ${C.border}`,color:C.muted,cursor:"pointer",fontSize:11}}>🏷️ Pick label</button>
        <button onClick={()=>{setExtrasMode("photo");setPhotoImgs([]);setPhotoIngs(null);setPhotoErr(null);setPhotoDesc("");}} style={{flex:1,padding:"8px 0",borderRadius:8,background:"none",border:`1px dashed ${C.border}`,color:C.muted,cursor:"pointer",fontSize:11}}>📸 Photo</button>
        <button onClick={()=>{setExtrasMode("manual");setManualForm({name:"",kcal:"",protein:"",carbs:"",fat:"",weightG:""});}} style={{flex:1,padding:"8px 0",borderRadius:8,background:"none",border:`1px dashed ${C.border}`,color:C.muted,cursor:"pointer",fontSize:11}}>✎ Manual</button>
      </div>}
      {extrasMode==="pick"&&<div style={{background:C.faint,borderRadius:10,padding:"10px 12px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <span style={{fontSize:11,color:C.muted,fontFamily:"monospace",textTransform:"uppercase"}}>Pick a label</span>
          <button onClick={()=>{setExtrasMode(null);setPickedProd(null);}} style={{fontSize:11,color:C.muted,background:"none",border:"none",cursor:"pointer"}}>✕</button>
        </div>
        {!pickedProd?(<>
          <input value={pickSearch} onChange={e=>setPickSearch(e.target.value)} placeholder="Search your product labels…" style={{width:"100%",boxSizing:"border-box",background:C.bg,border:`1px solid ${C.border}`,borderRadius:6,padding:"7px 10px",color:C.text,fontSize:13,outline:"none",marginBottom:7}} autoFocus/>
          <div style={{display:"flex",flexDirection:"column",gap:5,maxHeight:240,overflowY:"auto"}}>
            {(products||[]).filter(p=>!pickSearch||p.name.toLowerCase().includes(pickSearch.toLowerCase())).slice(0,15).map(prod=>(
              <button key={prod.name} type="button" onClick={()=>{setPickedProd(prod);setPickedG(prod.servingG||prod.packageG?String(prod.servingG||prod.packageG):"100");}} style={{padding:"8px 11px",borderRadius:7,background:C.card,border:`1px solid ${C.border}`,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",textAlign:"left"}}>
                <span style={{fontSize:12,color:C.text,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{prod.name}</span>
                <span style={{fontFamily:"monospace",fontSize:10,color:C.muted,flexShrink:0,marginLeft:8}}>{prod.kcal}k {prod.p}P</span>
              </button>
            ))}
            {(products||[]).filter(p=>!pickSearch||p.name.toLowerCase().includes(pickSearch.toLowerCase())).length===0&&<div style={{fontSize:11,color:C.muted,padding:"4px 0"}}>No labels match.</div>}
          </div>
        </>):(<div>
          <div style={{fontSize:12,color:C.lime,marginBottom:4,fontWeight:600}}>{pickedProd.name}</div>
          <div style={{fontSize:10,color:C.muted,marginBottom:6,fontFamily:"monospace"}}>{pickedProd.kcal} kcal · {pickedProd.p}g P · {pickedProd.c}g C · {pickedProd.f}g F per 100g</div>
          {(pickedProd.servingG||pickedProd.packageG)&&<div style={{fontSize:10,color:C.lime,marginBottom:6,fontStyle:"italic"}}>🍽 Usual serving: {pickedProd.servingG||pickedProd.packageG}g</div>}
          {!(pickedProd.servingG||pickedProd.packageG)&&<div style={{fontSize:10,color:C.muted,marginBottom:6}}>Serving: {pickedProd.servingG||pickedProd.packageG}g <button type="button" onClick={()=>setPickedG(String(pickedProd.servingG||pickedProd.packageG))} style={{background:"none",border:`1px solid ${C.border}`,color:C.lime,fontSize:9,cursor:"pointer",padding:"1px 6px",borderRadius:4,marginLeft:4}}>use</button></div>}
          <div style={{display:"flex",gap:7,alignItems:"center",marginBottom:8}}>
            <input type="text" inputMode="decimal" pattern="[0-9]*[.]?[0-9]*" value={pickedG} onChange={e=>setPickedG(e.target.value.replace(",","."))} placeholder="100" autoFocus style={{width:70,background:C.bg,border:`1px solid ${C.lime}`,borderRadius:6,padding:"6px 9px",color:C.lime,fontSize:14,fontFamily:"monospace",fontWeight:700,outline:"none"}}/>
            <span style={{fontSize:11,color:C.muted}}>g</span>
            {(()=>{const g=parseFloat(pickedG)||0;const s=g/100;return g>0&&<div style={{display:"flex",gap:7,marginLeft:"auto"}}><Chip val={Math.round(pickedProd.kcal*s)} label="kcal" color={C.lime}/><Chip val={Math.round(pickedProd.p*s*10)/10} label="P" color={C.blue}/></div>;})()}
          </div>
          <div style={{display:"flex",gap:6}}>
            <button onClick={()=>setPickedProd(null)} style={{flex:1,padding:"7px 0",borderRadius:6,background:"none",border:`1px solid ${C.border}`,color:C.muted,cursor:"pointer",fontSize:11}}>← Back</button>
            <button onClick={()=>{const g=parseFloat(pickedG)||0;if(g<=0)return;const s=g/100;setExtras(p=>[...p,{id:Date.now(),source:"label",name:pickedProd.name,weightG:g,kcal:pickedProd.kcal*s,protein:pickedProd.p*s,carbs:pickedProd.c*s,fat:pickedProd.f*s}]);setExtrasMode(null);setPickedProd(null);setPickedG("");}} disabled={!parseFloat(pickedG)} style={{flex:2,padding:"7px 0",borderRadius:6,background:parseFloat(pickedG)?C.lime:C.faint,border:"none",color:"#000",fontWeight:700,cursor:parseFloat(pickedG)?"pointer":"default",fontSize:12}}>Add Extra</button>
          </div>
        </div>)}
      </div>}
      {extrasMode==="photo"&&<div style={{background:C.faint,borderRadius:10,padding:"10px 12px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <span style={{fontSize:11,color:C.muted,fontFamily:"monospace",textTransform:"uppercase"}}>Photo extras</span>
          <button onClick={()=>{setExtrasMode(null);setPhotoIngs(null);setPhotoImgs([]);}} style={{fontSize:11,color:C.muted,background:"none",border:"none",cursor:"pointer"}}>✕</button>
        </div>

function AddMealSheet({products,mealPreps,setMealPreps,onAdd,onClose,apiKey,initialMode}){

function AddActSheet({onAdd,onClose,apiKey}){
  const [type,setType]=useState("run");const [dist,setDist]=useState("");const [dur,setDur]=useState("");const [kcal,setKcal]=useState("");const [imgs,setImgs]=useState([]);const [loading,setLoading]=useState(false);const [err,setErr]=useState(null);
  const est=type==="run"?Math.round((parseFloat(dist)||0)*62):type==="walk"?Math.round((parseFloat(dist)||0)*48):0;const finalKcal=parseFloat(kcal)||est;
  const scan=async()=>{if(!imgs.length)return;setLoading(true);setErr(null);try{const res=await aAct(imgs,apiKey);if(res.kcal)setKcal(String(Math.round(res.kcal)));if(res.distanceKm)setDist(String(res.distanceKm));if(res.durationMin)setDur(String(res.durationMin));if(res.actType&&["run","walk","gym"].includes(res.actType))setType(res.actType);}catch(e){setErr(String(e.message||e));}setLoading(false);};
  const confirm=()=>{if(!finalKcal)return;const labels={gym:"Gym Session",run:`Run${dist?` ${parseFloat(dist)}km`:""}`,walk:`Walk${dist?` ${parseFloat(dist)}km`:""}`};onAdd({id:Date.now(),type,label:labels[type],kcal:finalKcal,distanceKm:parseFloat(dist)||null,durationMin:parseFloat(dur)||null,time:new Date().toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"})});};
  return(<Sheet onClose={onClose} title="Log Activity"><div style={{display:"flex",gap:6,marginBottom:type==="walk"?6:16}}>{[["🏋️ Gym","gym"],["🏃 Run","run"],["🚶 Walk","walk"]].map(([lbl,t])=>(<button key={t} onClick={()=>setType(t)} style={{flex:1,padding:"9px 4px",borderRadius:10,border:`1px solid ${type===t?C.lime:C.border}`,background:type===t?`${C.lime}20`:C.card,color:type===t?C.lime:C.muted,fontWeight:type===t?700:500,cursor:"pointer",fontSize:12}}>{lbl}</button>))}</div>
    {type==="walk"&&<div style={{fontSize:11,color:C.muted,marginBottom:12,lineHeight:1.5,display:"flex",alignItems:"flex-start",gap:6}}><span style={{flexShrink:0}}>ⓘ</span><span>For a <b style={{color:C.text}}>deliberate walk</b> — a separate outing you went on. Don't also count those steps in Daily Steps. Use Daily Steps only for incidental movement (errands, around home) that doesn't get its own activity entry.</span></div>}<div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:9,marginBottom:6}}>{(type==="run"||type==="walk")&&<Field label="Distance km" value={dist} onChange={setDist} type="number" placeholder="10"/>}<Field label="Duration min" value={dur} onChange={setDur} type="number" placeholder="45"/><Field label="Active kcal" value={kcal} onChange={setKcal} type="number" placeholder={est?String(est):"0"}/></div><div style={{fontSize:10,color:C.muted,marginBottom:12,lineHeight:1.4}}>💡 Enter <b>active calories</b> (the burn above your resting baseline). On Garmin/Apple/Strava use "Active Calories", not "Total Calories" — your daily TDEE already counts the resting burn.</div>{est>0&&!parseFloat(kcal)&&<div style={{fontSize:11,color:C.muted,fontFamily:"monospace",marginBottom:10}}>Auto-estimated: ~{est} kcal</div>}<div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"12px 14px",marginBottom:12}}><div style={{fontSize:11,color:C.muted,marginBottom:8}}>Or scan Strava / Apple Fitness / Garmin screenshot</div><ImgZone imgs={imgs} setImgs={setImgs} compact/>{imgs.length>0&&<button onClick={scan} disabled={loading} style={{width:"100%",padding:"9px 0",borderRadius:8,background:loading?C.faint:C.orange,color:"#000",fontWeight:700,border:"none",cursor:loading?"default":"pointer",fontSize:13,marginTop:8}}>{loading?"Scanning…":"Read App Screenshot"}</button>}</div>{err&&<div style={{background:"#1e0a0a",border:"1px solid #5a1a1a",borderRadius:8,padding:"8px 12px",fontSize:12,color:"#ff8080",marginBottom:10,wordBreak:"break-word"}}>{err}</div>}{finalKcal>0&&<div style={{background:"#140e03",border:"1px solid #2e1e07",borderRadius:10,padding:"10px 14px",marginBottom:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:12,color:C.muted}}>Adds to daily target</span><span style={{fontFamily:"monospace",fontSize:18,fontWeight:800,color:C.orange}}>+{finalKcal} kcal</span></div>}<div style={{display:"flex",gap:8}}><button onClick={onClose} style={{flex:1,padding:"11px 0",borderRadius:10,background:C.card,border:`1px solid ${C.border}`,color:C.text,fontWeight:600,cursor:"pointer"}}>Cancel</button><button onClick={confirm} disabled={!finalKcal} style={{flex:2,padding:"11px 0",borderRadius:10,background:finalKcal?C.lime:C.faint,color:"#000",fontWeight:700,border:"none",cursor:finalKcal?"pointer":"default",fontSize:15}}>Log Activity</button></div></Sheet>);

function CreatePrepSheet({products,onSave,onClose,apiKey}){
  const [name,setName]=useState("");const [imgs,setImgs]=useState([]);const [desc,setDesc]=useState("");const [result,setResult]=useState(null);const [wt,setWt]=useState("");const [portions,setPortions]=useState("4");const [form,setForm]=useState({kcal:"",protein:"",carbs:"",fat:""});const [loading,setLoading]=useState(false);const [err,setErr]=useState(null);const [prepIngredients,setPrepIngredients]=useState(null);const [ingConfirmed,setIngConfirmed]=useState(false);const [saveErr,setSaveErr]=useState("");
  // Label-builder: user picks labels manually instead of (or alongside) photos
  const [buildMode,setBuildMode]=useState(null); // null | "labels"
  const [pickSearch,setPickSearch]=useState("");
  const [pickedProd,setPickedProd]=useState(null);
  const [pickedG,setPickedG]=useState("");
  const [labelIngs,setLabelIngs]=useState([]); // [{id, name, weightG, kcal100, p100, c100, f100}]
  const f=k=>v=>setForm(p=>({...p,[k]:v}));
  const analyze=async()=>{setLoading(true);setErr(null);setSaveErr("");setIngConfirmed(false);try{
    const res=await aPrep(imgs,products,desc,apiKey);
    const totalsAllZero=!res.totalKcal&&!res.totalProtein&&!res.totalCarbs&&!res.totalFat;
    const noIngredients=!res.ingredients||res.ingredients.length===0;
    if(totalsAllZero&&noIngredients){
      setErr("AI couldn't estimate macros from the description/photos. Try more detail in the description (e.g. \"400g cooked chicken breast\"), or use 'Enter manually' below.");
      setLoading(false);
      return;
    }
    setResult(res);
    setForm({kcal:String(Math.round(res.totalKcal)||""),protein:String(Math.round(res.totalProtein)||""),carbs:String(Math.round(res.totalCarbs)||""),fat:String(Math.round(res.totalFat)||"")});
    if(res.estimatedWeightG&&!wt)setWt(String(res.estimatedWeightG));
    if(res.ingredients&&res.ingredients.length>0){
      setPrepIngredients(res.ingredients.map(ing=>({...ing,weightG:String(ing.weightG||0)})));
    }
  }catch(e){setErr(String(e.message||e));}setLoading(false);};
  const portN=parseInt(portions)||1;
  const save=()=>{
    const k=parseFloat(form.kcal)||0,p=parseFloat(form.protein)||0,carb=parseFloat(form.carbs)||0,fat=parseFloat(form.fat)||0;
    const n=parseInt(portions)||1;
    let w=parseFloat(wt)||0;
    if(k===0&&p===0&&carb===0&&fat===0){
      setSaveErr("All macros are zero — analyze or fill in totals first.");
      return;
    }
    if(w<=0){w = Math.max(50, Math.round(k / 1.3));}
    setSaveErr("");
    const finalName = (name && name.trim()) || (desc.trim().split(/[,.]/)[0].trim().slice(0,40)) || "Meal Prep";
    const per100k=Math.round(k/w*100),per100p=Math.round(p/w*100*10)/10,per100c=Math.round(carb/w*100*10)/10,per100f=Math.round(fat/w*100*10)/10;
    const suggestedG=Math.round(w/n);
    onSave({id:Date.now(),name:finalName,totalKcal:k,totalProtein:p,totalCarbs:carb,totalFat:fat,
      totalWeightG:w,remainingWeightG:w,targetPortions:n,
      per100Kcal:per100k,per100Protein:per100p,per100Carbs:per100c,per100Fat:per100f,
      suggestedG,portions:n,remaining:n,portionWeightG:suggestedG,
      perKcal:Math.round(k/n),perProtein:Math.round(p/n),perCarbs:Math.round(carb/n),perFat:Math.round(fat/n),
      createdDate:TODAY(),notes:result?.notes||""});
  };
  const totalsZero=!parseFloat(form.kcal)&&!parseFloat(form.protein)&&!parseFloat(form.carbs)&&!parseFloat(form.fat);
  const showPanel = prepIngredients && !ingConfirmed;

  return(<Sheet onClose={onClose} title="Create Meal Prep">

      <div style={{flex:1}}><Field label="Portions" value={portions} onChange={setPortions} type="number" placeholder="4"/></div>
    </div>

    {/* Photos — optional now */}
